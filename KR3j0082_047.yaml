body:
  text: 祕書監巨鹿男臣魏徵等奉敕撰袁子正書抱朴子袁子正書袁淮禮政治國之大體有四一曰仁義二曰禮制三曰法令四曰刑罰四本者具則帝王之功立矣所謂仁者愛人者也愛人父母之行也為民父母故能興天下之利也所謂義者能辨物理者也物得理故能除天下之害也興利除害者則賢人之業也夫仁義禮制者治之本也法令刑罰者治之末也無本者不立無末者不成夫禮教之治先之以仁義示之以敬讓使民遷善日用而不知也儒者見其如此因謂治國不須刑法不知刑法承其下而後仁義興於上也法令者賞善禁淫居治之要會商韓見其如此因曰治國不待仁義不知仁義為之體故法令行於下也是故導之以德齊之以禮則民有耻導之以政齊之以刑則民苟免是治之貴賤者也先仁而後法先教而後刑是治之先後者也夫遠物難明而近理易知故禮讓緩而刑罰急是治之緩急也夫仁者使人有德不能使人知禁禮者使人知禁不能使人必仁故本之者仁明之者禮也必行之者刑罰也先王為禮以達人之性理刑以承禮之所不足故以仁義為不足以治者不知人性者也是故失教失教者無本也以刑法為不可用者是不知情僞者也是故失威失威者不禁也故有刑法而無仁義久則民忽民忽則怒也有仁義而無刑法則民慢民慢則姧起也故曰本之以仁成之以法使兩通而無偏重則治之至也夫仁義雖弱而持久刑殺雖強而速亡自然之治也經國先王之制立爵五等所以立蕃屏利後嗣者也是故國治而萬世安秦以列國之勢而并天下於是去五等之爵而置郡縣雖有親子母弟皆為匹夫及其衰一夫大呼而天下去及至漢家見亡秦之以孤特亡也於是大封子弟或連城數十廓地千里自關巳東皆為王國力多而權重故亦有七國之難魏興以新承大亂之後民人損減不可則以古治於是封建侯王皆使寄地空名而無其實王國使有老兵百餘人以衛其國雖有王侯之號而力儕於匹夫縣隔千里之外無朝聘之儀鄰國無會同之制諸侯遊獵不得過三十里又為設防輔監國之官以司察之王侯皆思為布衣不能得既違宗國蕃屏之義又虧親戚骨肉之恩昔武王既克殷下車而封子弟同姓之國五十餘然亦卜世三十卜年七百至乎王赧之後海內無主三十餘年故諸侯之治則輔車相持翼戴天子以禮征伐雖有亂君暴主若吳楚之君者不過恣睢其國惡能為天下害乎周以千乘之賦封諸侯今也曾無一城之田何周室之奢泰而今日之儉少也豈古今之道不同而今日之勢然哉未之思耳夫物莫不有弊聖人者豈能無衰能審終始之道取其長者而巳今雖不能盡建五等猶宜封諸親戚使少有土地制朝聘會同之義以合親戚之恩講禮以明其職業黜陟以討其不然如是則國有常守兵有常強保世延祚長久而有家矣設官古者三公論王職六卿典事業事大者官大事小者官小今三公之官或無事或職小又有貴重之官無治事之實此官虛設者也秦漢置丞相九卿之官以治萬機其後天子不能與公卿造事外之而置尚書又外之而置中書轉相重纍稍執機事制百官之本公卿之職遂輕則失體矣又有兵士而封侯者古之尊貴者以職大故貴今列侯無事未有無職而空貴者也世衰禮廢五等散亡故有賜爵封侯之賞既公且侯失其制今有卿相之才居三公之位修其治政以安寧國家未必封侯也而今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寧天下也安寧天下者不爵斬一將之功者封侯失封賞之意矣夫離古意制外內不一小大錯貿轉相重纍是以人執異端窺欲無極此治道之所患也先王置官各有分職使各以其屬達之於王自己職事則是非精練百官奏則下情不塞先王之道也政略夫有不急之官則有不急之祿國之蛑賊也明主設官使人當於事人當於事則吏少而民多民多則歸農者衆吏少則所奉者寡使吏祿厚則養足則無求於民無求於民姦䡄息矣祿足以代耕則一心於職一心於職則政理政理則民不擾民不擾則不亂其農矣養生有制送終有度嫁娶宴享皆有分節衣服食味皆有品袠明設其禮而嚴其禁如是則國無違法之民財無無用之費矣此富民之大略也非先王之法行不得行非先王之法言不得道名不可以虛求貴不可以僞得有天下坦然知所去就矣本行而不本名責義而不責功行莫大於孝敬義莫大於忠信則天下之人知所以措身矣此教之大略也夫禮設則民貴行分明則事不錯民貴行則所治寡事不錯則下靜一此富民致治之道也禮重而刑輕則士勸愛施而罰必則民服士勸則忠信之人至民服則犯法者寡德全則教誠教誠則感神行深則著厚著厚則流遠尚義則同利者相覆尚法則貴公者相刻相刻則無親相覆則無疏措禮則政平政平則民誠設術則政險政險則民僞此禮義法術之情也論兵夫為政失道可思而更也兵者存亡之機一死不可復生也故曰天下難事在於兵今有人於此力舉重鼎氣蓋三軍一怒而三軍之士皆震世俗見若人者謂之能用兵矣然以吾觀之此亡國之兵也夫有氣者志先其謀無䇿而徑往怒心一奮天下若無人焉不量其力而輕天下之物偏遇可以幸勝有數者禦之則必死矣凡用兵正體不備不可以全勝故善用兵者我謂之死則民盡死我謂之生則民盡生我使之勇則民盡勇我使之怯則民盡怯能死而不能生能勇而不能怯此兵之半非全勝者也夫用戰有四有大體者難與持久有威刑者難與爭險善柔者待之以重善任勢者禦之以堅用兵能使民堅重者則可與之赴湯火可與之避患難進不可詭退不可追所在而民安盡地而守固疑間不能入權譎不能設也堅重者備物者也備物者無偏形無偏形故其變無不之也故禮與法首尾也文與武本末故禮正而後法明文用而後武法故用兵不知先為政則亡國之兵也用人有四一曰以功業期之二曰與天下同利三曰樂人之勝己四曰因才而處任以功業期之則人盡其能與天下同利則民樂其業樂人勝己則下無隱情因才擇任則衆物備舉人各有能有不能也是以智者不以一能求衆善不以一過掩衆美不遺小類不弃小力故能有為也夫治天下者其所以行之在一一者何也曰公而巳矣故公者所以攻天下之邪屏讒慝之萌兵者傾危之物死生之機一物不至則衆亂興矣故以仁聚天下之心以公塞天下之隙心公而隙塞則民專而可用矣公心明故賢才至一公則萬事通一私則萬事閉兵者死生之機也是故貴公王子主失有王子者著主失之書子張甚善之為袁子稱之曰夫人之所以貴於大人者非為其官爵也以其言忠信行篤敬人主授之不虛人臣受之不妄也若居其位不論其能賞其身不議其功則私門之路通而公正之道塞矣凡世之所患非患人主之有過失也患有過欲改而不能得也是何也夫姦臣之事君固欲苟悅其心夫物未嘗無似象似象之言漫潤之諛非明者不能察也姦臣因以似象之言而為之容說人主不能别也是而悅之惑亂其心舉動日繆而常自以為得道此有國之常患也夫佞邪之言柔順而有文忠正之言簡直而多逆使忠臣之言是也人主固弗快之矣今姦臣之言巳掩於人主不自以為非忠臣以逆忤之言說之人主方以為誣妄何其言之見聽哉是以大者刳腹小者見奴忠臣涉危死而言不見聽姦臣饗榮利而言見悅則天下奚蹈夫危死而不用去夫榮樂而見聽哉故有被髮而為狂有竄伏於窟穴此古今之常也凡姦臣者好為難成之事以徼幸成功之利而能先得人主之心上之人不能審察而悅其巧言則見其賞而不見其罰矣為人臣有禮未必尊無禮未必卑則姦臣知所以事主矣雖有今日之失必知明日所以復之塗也故人主賞罰一不當則邪人為巧滋生其為姦滋甚知者雖見其非而不敢言為將不用也夫先王之道遠而難明當世之法近而易知凡人莫不違其疏而從其親見其小而暗其大今賢者固遠主矣而執遠而難明之物姦人固近主矣而執近而易知之理則忠正之言奚時而得達哉故主蔽於上姦成於下國亡而家破伍子胥為吳破楚令闔閭霸及夫差立鴟夷而浮之江樂毅為燕王破強齊報大耻及惠王立而驅逐之夫二子之於國家可謂有功矣夫差惠王足以知之矣然猶不免於危死者人主不能常明而忠邪之道異故也又況於草茅孤遠之臣而無二子之功涉姦邪之門經傾險之塗欲其身達不亦難哉今人雖有子産之賢而無子皮之舉有解狐之德而無祁奚之直亦何由得達而進用哉故有祁奚之直而無宣子之聽有子皮之賢而無當國之權則雖荊山之璞猶且見瓦耳故有管仲之賢有鮑叔之友必遇桓公而後達有陳平之智有無知之友必遇高祖而後聽桓公高祖不可遇雖有二子之才夫奚得用哉厚德恃門戶之閉以禁盜者不如明其刑也明其刑不如厚其德也故有教禁有刑禁有物禁聖人者兼而用之故民知耻而無過行也不能止民惡心而欲以刀鋸禁其外雖日刑人於市不能制也明者知制之在於本故退而修德為男女之禮妃匹之合則不淫矣為廉耻之教知足之分則不盜矣以賢制爵令民德厚矣故聖人貴恆恆者德之固也聖人久於其道而天下化成未有不恆而可以成德無德而可以持久者也用賢治國有四一曰尚德二曰考能三曰賞功四曰罰罪四者明則國治矣夫論士不以其德而以其舊考能不以其才而以其久而求下之貴上不可得也賞可以勢求罰可以力避而求下之無姦不可得也為官長非苟相君也治天下也用賢非以役之尚德也行之以公故天下歸之故明王之使人有五一曰以大體期之二曰要其成功三曰忠信不疑四曰至公無私五曰與天下同憂以大體期之則臣自重要其成功則臣勤懼忠信不疑則臣盡節至公無私則臣盡情與天下同憂則臣盡死夫唯信而後可以使人昔者齊威王使章子將而伐魏人言其反者三威王不應也自是之後為齊將者無有自疑之心是以兵強於終始也唯君子為能信一不信則終身之行廢矣故君子重之漢高祖山東之匹夫也無有咫尺之土十室之聚能任天下之智力舉大體而不苛故王天下莫之能禦也項籍楚之世將有重於民橫行天下然而卒死東城者何也有一范增不能用意忌多疑不信大臣故也寬則得衆用賢則多功信則人歸之悅近孔子曰為上不寬吾何以觀之苛政甚於猛虎詩人疾掊克在位是以聖人體德居簡而以虛受人夫有德則謙謙則能讓虛則寬寬則愛物世俗以公刻為能以苛察為明以忌諱為深三物具則國危矣故禮法欲其簡禁令欲其約事業欲其希簡則易明約則易從希則有功此聖賢之務也漢高祖山東之匹夫也起兵之日天下英賢奔走而歸之賢士輻湊而樂為之用是以王天下而莫之能禦唯其以簡節寬大受天下之物故也是故寬則得衆虛則受物信則不疑不忌諱則下情達而人心安夫高祖非能舉必當也唯以其心曠故人不疑況乎以至公處物而以聰明治人乎堯先親九族文王刑于寡妻物莫不由內及外由大信而結由易簡而上安由仁厚而下親今諸侯王國之制無一成之田一旅之衆獨坐空宮之中民莫見其面其所以防禦之備甚於仇讎內無公族之輔外無藩屏之援是以兄弟無睦親之教百姓無光明之德弊薄之俗興忠厚之禮衰近者不親遠者不附人主孤立於上而本根無庇蔭之助此天下之大患也聖人者以仁義為本以大信持之根深而基厚故風雨不愆伏也貴公治國之道萬端所以行之在一一者何曰公而已矣唯公心而後可以有國唯公心可以有家唯公心可以有身身也者為國之本也公也者為身之本也夫私人之所欲而治之所甚惡也欲為國者一不欲為國者萬凡有國而以私臨之則國分為萬矣故立天子所以治天下也置三公所以佐其王也觀事故而立制瞻民心而立法制不可以輕重輕重即頗邪法不可以私倚私倚即姦起古之人有當市繁之時而竊人金者人問其故曰吾徒見金不見人也故其愛者必有大迷宋人有子甚醜而以勝曾上之美故心倚於私者即所知少也亂於色者即目不别精粗沈於聲者則耳不别淸濁偏於受者即心不别是非是以聖人節欲去私故能與物無尤與人無爭也明主知其然也雖有天下之大四海之富而不敢私其親故百姓超然背私而向公公道行即邪利無所隱矣向公即百姓之所道者一向私即百姓之所道者萬一向公則明不勞而姦自息一向私則繁刑罰而姦不禁故公之為道言甚約而用之甚博治亂治國之要有三一曰食二曰兵三曰信三者國之急務存亡之機明主之所重也民之所惡者莫如死豈獨百姓之心然雖堯舜亦然民困衣食將死亡而望其奉法從教不可得也夫唯君子而後能固窮故有國而不務食是責天下之人而為君子之行也伯夷餓死於首陽之山傷性也管仲分財自取多傷義也夫有伯夷之節故可以不食而死有管仲之才故可以不讓而取然死不如生爭不如讓故有民而國貧者則君子傷道小人傷行矣君子傷道則教虧小人傷行則姦起夫民者君之所求用也民富則所求盡得民貧則所求盡失用而不得故無強兵求而皆失故無興國明主知為國之不可以不富也故率民於農富國有八政一曰儉以足用二曰時以生利三曰貴農賤商四曰常民之業五曰出入有度六曰以貨均財七曰抑談說之士八曰塞朋黨之門夫儉則能廣時則農修貴農則穀重賤商則貨輕有常則民一有度則不散貨布則并兼塞抑談說之士則百姓不淫塞朋黨之門則天下歸本知此八者國雖小必王不知此八者國雖大必亡凡上之所以能制其下者以有利權也貧者能富之之謂利有罪者能罰之之謂權今為國不明其威禁使刑賞利祿一出於巳則國貧而家富離上而趣下矣夫處至貴之上有一國之富不可以不明其威刑而納公實之言此國之所以治亂也至貴者人奪之至富者人取之是以明君不敢恃其尊以道為尊不敢恃其強以法為強親道不親人故天下皆親也愛義不愛近故萬里為近也天下同道萬里一心是故以人治人以國治國以天下治天下聖王之道也凡有國者患在壅塞故不可以不公患在虛巧故不可以不實患在詐僞故不可以不信三者明則國安三者不明則國危苟功之所在雖疏遠必賞苟罪之所在雖親近必罰辨智無所橫其辭左右無所開其說君子卿大夫其敬懼如布衣之慮故百姓蹈法而無徼幸之心君制而臣從令行而禁止壅塞之路閉而人主安太山矣夫禮者所以正君子也法者所以治小人也治在於君子功在於小人故為國而不以禮則君子不讓制民而不以法則小人不懼君子不讓則治不立小人不懼則功不成是以聖人之法使貴賤不同禮賢愚不同法毀法者誅有罪者罰爵位以其才行不計本末刑賞以其功過不計輕重言必出於公實行必落於法理是以百姓樂義不敢為非也太上使民知道其次使民知心其下使民不得為非使民知道者德也使民知心者義也使民不得為非者威禁也威禁者賞必行刑必斷之謂也此三道者治天下之具也欲王而王欲霸而霸欲強而強在人主所志也損益夫服物不稱則貴賤無等於是富者踰侈貧者不及小人乘君子之器賈豎襲卿士之服被文繡佩銀黃重門而玉食其中左右叱咄頤指而使是故有財者光榮無財者卑辱上接卿相下雄齊民珍寶旁流而刑放於賄下而法侵能無虧乎世治天地之道貴大聖人之道貴寬無分寸之曲至直也以是繩之則工不足於材矣無纖分之短至善也以是規之則人主不足於人矣故凡用人者不求備於一人桓公之於寧戚也知之矣夫有近會者無遠期今之為法曰選舉之官不得見人曰以絶姦私也夫處深宮之中而選天下之人以為明奚從而知之夫交接人之道不可絶也故聖人求所以治交而不求絶交人莫問不交以人禁人足以私禁私也先王之用人不然不論貴賤不禁交遊以德底爵以能底官以功底録貝賞罰以待其歸雖使之遊誰敢離道哉刑法禮法明則民無私慮事業專則民無邪僞百官具則民不要功故有國者為法欲其正也事業欲其久也百官欲其常也天下之事以次為爵祿以次進士君子以精德顯夫德有次則行修官有次則人靜事有次則民安農夫思其疆畔百工思其規矩士君子思其德行羣臣百官思其分職上之人思其一道侵官無所由離業無所至夫然故天下之道正而民一夫變化者聖人之事也非常者上智之任也此入於權道非賢者之所窺也才智至明而好為異事者亂之端也是以聖人甚惡奇功天下有可赦之心而有可赦之罪無可赦之心而無可赦之罪明王之不赦罪非樂殺而惡生也以為樂生之實在於此物也夫思可赦之法則法出入法出入則姦邪得容其議姦邪得容其議則法日亂犯罪者多而私議並興則雖欲無赦不可巳夫數賞則賢能不勸數赦則罪人徼幸明主知之故不為也夫可赦之罪千百之一也得之於一而傷之於萬治道不取也故先王知赦罪不可為也故所俘虜一斷之於法務求所以立法而不求可赦之法也法立令行則民不犯法法不立令不行則民多觸死故曰能殺而後能生能斷而後仁立國之治亂在於定法定法則民心定移法則民心移法者所以正之事者也一出而正再出而邪三出而亂法出而不正是無法也法正而不行是無君也是以明君將有行也必先求之於心慮先定而後書之於策言出而不可易也令下而不反也如陰陽之動如四時之行如風雨之施所至而化所育而長夫天之不可逆者時也君之不可逆者法也使四時而可逆則非天也法令而可違是非君也今有十人彍弩於百萬之衆未有不震怖者也夫十矢之不能殺百萬人可知也然一軍皆震者以為唯無向則巳所中必死也明君正其禮明其法嚴其刑持滿不發以牧萬民犯禮者死逆法者誅賞無不信刑無不必則暴亂之人莫敢試矣故中人必死一矢可以懼萬人有罪必誅一刑可以禁天下是以明君重法愼令人主人主莫不欲得賢而用之而所用者不免於不肖莫不欲得姦而除之而所除者不免於罰賢若是者賞罰之不當任使之所由也人主之所賞非謂其不可賞也必以為當矣人主之所罪非以為不可罰也必以為信矣智不能見是非之理明不能察浸潤之言所任者不必智所用者不必忠故有賞賢罰暴之名而有戮能養姦之實此天下之大患也致賢雖有離婁之目不能兩視而明蘷曠之耳不能兩聽而聰仲尼之智不能兩慮而察夫以天下之至明至智猶不能參聽而俱存之而況於凡人乎故以目雖至明有所不知以因雖凡人無所不得故善學者假先王以論道善因者借外智以接物故假人之目以視奚適夫兩見假人之耳以聽奚適夫兩聞假人之智以慮奚適夫兩察故夫處天下之大道而智不窮興天下之大業而慮不竭統齊羣言之類而口不勞兼聽古今之辨而志不倦者其唯用賢乎明賞罰夫干祿者唯利所在智足以取當世而不能日月不違仁當其用智以禦世賢者有不如也聖人明於此道故張仁義以開天下之門抑情僞以塞天下之戶相賞罰以隨之賞足榮而罰可畏智者知榮辱之必至是故勸善之心生而不䡄之姦息賞一人而天下知所從罰一人而天下知所避明開塞之路使百姓曉然知䡄疏之所由是以賢者不憂知者不懼干祿者不邪是故仁者安仁智者利仁畏罪者強仁天下盡為仁明法之謂死者人之所甚惡也殺人者仁人之所不忍也人之於利欲有犯死罪而為之先王制肉刑斷人之體徹膳去樂咨嗟而行之者不得巳也刑不斷則不威避親貴則法日弊如是則姦不禁而犯罪者多惠施一人之身而傷天下生也聖人計之於利害故行之不疑是故刑殺者乃愛人之心也涕泣而行之故天下明其仁也雖貴重不得免故天下知其斷也仁見故民不怨立斷下不犯聖王之所以禁姦也先王制為八議赦宥之差斷之以三槐九棘之聽服念五六日至于旬時全正義也而後斷之仁心如此之厚故至刑可為也抱朴子葛洪酒誡抱朴子曰目之所好不可從也耳之所樂不可不愼也鼻之所喜不可任也口之所嗜不可隨也心之所欲不可恣也故惑目者必逸容鮮藻也惑耳者必妍音淫聲也惑鼻者必芷蕙芬馥也惑口者必珍羞嘉旨也惑心者必勢利功名也五者畢惑則或承之禍為身患者不亦信哉是以其抑情也劇乎隄防之備決其御性也過乎腐轡之乘奔故能內保永年外免舋纍也夫酒醴之近味生病之毒物無豪鋒之細益有丘山之巨損君子以之敗德小人以之速罪耽之惑之鮮不及禍世之士人亦知其然既莫能絶又不肯節縱口心之近欲輕名灾之根原似熱腸之恣冷雖適己而身危小大亂喪亦罔非酒然而俗人是酣是湎其初筵也抑抑濟濟言希容整詠湛露之厭厭歌在鎬之愷樂舉萬壽之觴誦溫克之義日未移晷體輕耳熱流離海螺之器並用滿酌罰餘之令遂急醉而不出拔轄投井於是口涌鼻溢濡首及亂屢舞仙仙舍其座遷載號載呶如沸如羹或爭辭尚勝或啞啞獨笑或無對而談或嘔吐機筵或顚蹶梁倡或冠脫帶解貞良者流華督之顧盻怯愞者效慶忌之蕃捷遲重者蓬轉而波擾整肅者鹿踊而魚躍口訥於寒暑者皆撫掌以諧聲謙卑而不競者悉禆瞻以高交廉耻之儀毀而荒錯之疢發闒茸之性露而傲狠之態出精濁神亂臧否顚倒或奔車走馬赴坑谷而不憚以九折之坂為蟻封也或登危踏頽雖墮墜而不覺以呂梁之淵為牛迹也或肆忿於器物或酌醟於妻子加枉酷於臣僕用剡鋒乎六畜熾火烈於室廬遷威怒於路人加暴害於士友褻嚴主以夷戮者有矣犯凶人而受困者有矣言雖尚辭煩而叛理拜伏徒多勞而非敬臣子失禮於君親之前幼賤悖慢於老宿之座謂淸談為詆詈以忠告為侵巳於是白刃抽而忘思難之慮棒杖奮而罔顧乎先後構灑血之讎招大辟之禍以少凌長則邦黨加重責矣辱人父兄則子弟將推刃矣發人所諱則壯士不能堪矣計數深刻則醒者不能恕矣起衆患於須臾結百痾於膏肓奔駟不能追既往之悔思改而無自反之蹊蓋知者所深防而庸人所不免也其為禍敗不可勝載然而歡集莫之或釋舉白盈耳不論能否料瀝霤於小餘以稽遲為輕己傾筐注於所敬殷勤變而成薄勸之不持督之不盡惡色醜音所由而發也夫風經府藏使人忽恍或遇斯疾莫不憂懼吞苦忍痛欲其速愈至於醉之病性何異於兹而獨居密以逃風不能割情以節酒若畏酒如畏風憎醉如憎病則荒沈之咎塞而流連之失止矣夫風之為病猶展攻治酒之為變在乎呼吸及其悶亂若存若亡視泰山如彈丸見蒼海如盤盂仰譁天墮俯呼地陷臥待虎狼投井赴火而不謂惡也夫用身之如此亦安能惜敬恭之禮護喜怒之失哉昔儀狄既疏大禹以興糟丘酒池辛癸以亡豐侯得罪以戴樽銜杯景升荒壞以三雅之爵趙武之失衆子反之誅戮灌夫之滅族季布之疏斥子建之免退徐邈之禁言皆是物也世人之好之樂之者甚多而戒之畏之者至少彼衆我寡良針安施且願君子節之而巳疾謬抱朴子曰世故繼有禮教斯頽敬讓莫崇傲慢成俗疇類飮會或蹲或踞暑夏之月露首袒體盛務唯在樗蒲彈碁所論極於聲色之間舉足不離綺襦紈袴之側游步不去勢利酒客之門不聞淸言講道之言專以醜辭嘲弄為先以如此者為高遠以不爾者為騃野於是馳逐之庸民偶俗之近人慕之者猶宵蟲之赴明燭學之者猶輕毛之應飈風嘲戲之言或上及祖考或下逮婦女往者務其深焉報者恐不重焉唱之者不慮見答之後患和之者耻於言輕之不塞以不應者為拙劣以先止者為負敗如此交惡之辭焉得默哉其有才思者之為之也猶善於依因機會言微理舉雅而可笑中而不傷若夫疏拙者之為之也則枉曲直湊使人愕然妍之與蚩其於宜絶豈唯無益而巳哉乃有使酒之客及於難侵之性不能堪之拂衣拔棘而手足相及醜言加於所尊歡心變而成讎絶交壞厚構隙致禍以杯螺相擲者有矣以陰私相訐者有矣昔陳靈之被矢灌氏之泯族匪降自天口實為之樞機之發榮辱之主三緘之戒豈欺我哉激電不能追既往之失辭班輪不能磨斯言之既玷雖不能三思而吐情談猶可息謔調以杜禍萌也然而迷謬者無自見之明觸情者諱逆耳之規恢美而無直亮之針艾群惑而無指南以自反諂媚小人歡笑以贊善面從之徒拊節以稱功益使惑者不覺其非自謂有端晏之捷過人之辨而不寤斯乃招患之旌召害之符也豈徒減其方策之令問虧其沒世之德音而巳哉然敢為此者非必篤顧也率多冠蓋之後勢援之門素頗力行善事以竊虛名名既粗立本情便放或假財色以交權豪或因時運以叨榮位或以㛰姻而成貴戚故并毀譽以合威柄器盈志溢態發病出黨成交廣道通步高淸論所不能復制繩墨所不能復彈遂成鷹頭之蠅廟垣之鼠所未及者則低眉掃地以奉望之其下者作威作福以鞚御之故勝己者則不得聞聞亦陽不知也減己者則不敢言言亦不能禁也刺驕蓋勞謙虛己則附之者衆驕慢倨傲則去之者多矣附之者衆則安之徵也去之者多則危之診也存亡之機於是乎在輕而為之不亦蔽哉自尊重之道乃在乎以貴下賤卑以自牧也非此之謂也乃衰薄之弊俗膏肓之廢疾安共為之可悲者也不修善事即為惡人無事於大則為小人紂為無道見稱獨夫仲尼陪臣謂為素王即君子不在乎富貴矣今為犯禮之行而不喜聞遄死之譏是負豕而憎人說其臭投泥而諱人言其汚也夫節士不能使人敬之而志不可奪也不能使人不憎之而道不可屈也不能令人不辱之而榮在我也不能令人不擯之而操之不可改也故分定計決勸沮不能干樂天知命憂懼不能入困瘁而益堅窮否而不悔誠能用心如此者亦安肯草靡萍浮效禮之所弃者之所為哉俗之傷破人倫劇於寇賊之來不能經久其所損壞一時而巳若夫貴門子孫及在位之士不惜典刑而皆科頭袒體踞見賔客毀辱天官又移染庸民後生晚出見彼或巳經淸資或叨竊虛名而躬自為之則凡夫便謂立身當世莫此之為美也夫守禮防者苦且難而其人多窮賤焉恣驕放者樂且易而為者皆速達焉於是俗人莫不委此而就彼矣世間或有少無淸白之操業長以買官而富貴或亦其所知足以自飾也其黨與足以相引也而無行之子便指以為證曰彼縱情恣欲而不妨其赫奕矣此整身履道而不免於貧賤矣而不知榮顯者有幸而頓淪者不遇皆不由其行也博喻抱朴子曰民財匱矣而求不巳下力極矣而役不休欲怨歎之不生規其寧之惟永猶斷根以續枝剜背以禆腹刻目以廣明割耳以開聰也抱朴子曰法無一定而慕權宜之隨時功不倍前而好屢變以偶俗猶剸高馬以適卑車削跗踝以就褊履斷長劔以赴短鞞剖尺璧以納促匣也抱朴子曰禁令不明而嚴刑以靜亂廟算不精而窮兵以侵鄰猶釤禾以計蝗蟲伐木以殺蛣蝎減食以中蚤蝨撤舍以逐雀鼠也廣譬抱朴子曰三辰蔽於天則淸景暗於地根苃蹶於此則柯條瘁於彼道失於近則禍及於遠政繆於上而民困於下抱朴子曰貴遠而賤近者常人之用情也信耳而疑目者古今之所患也是以秦王歎息於韓非之書而想其為人漢武慷慨於相如之文而恨不同世及既得之終不能拔或納讒而誅之或放之乎穴散此蓋葉公之好僞形見真龍而失色也羣書治要卷第五十終

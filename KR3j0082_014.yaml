front:
  text: 羣書治要卷第十六
  hash: sha256:7f4939c2457faa26ddf67f9123bb072c254869eaac8729b20723df5009ef92d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_014-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰漢書四傳酈食其陳留人也好讀書身長八尺人皆謂之狂生自謂我非狂沛公至高陽傳舍使人召食其至入謁沛公方踞牀令兩女子洗而見食其食其入卽長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎沛公罵曰豎儒夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐謝之漢王據守敖倉而使食其說齊王曰王知天下之所歸乎曰不知也天下何歸曰歸漢齊王曰先生何以言之曰漢王與項王約先入咸陽者王之項王背約不與而遷殺義帝漢王起蜀漢之兵擊三秦出關而責義帝之負處收天下之兵立諸侯之後降城卽以侯其將得賂則以分其士與天下同其利豪英賢才皆樂爲之用諸侯之兵四面而至蜀漢之粟方舩而下項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘戰勝而不得其賞㧞城而不得其封非項氏莫得用事爲人刻印刓而不能授刓斷無復廉鍔也攻城得賂積財而不能賞天下叛之賢材怨之而莫爲之用故天下之士歸於漢王可坐而策也夫漢王發蜀漢定三秦渉西河之水援上黨之兵下井陘破北魏此黃帝之兵非人之力天之福也今巳據敖倉之粟塞成皐之險守白馬之津杜太行之阨拒飛狐之口天下後服者先亡矣王疾下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣廼聽食其罷歷下兵守戰備陸賈楚人也有口辯常居左右時時前說稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且文武並用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅趙氏秦之先造父封於趙城其後曰趙氏向使秦巳并天下行仁義法先聖陛下安得而有之高帝不懌有慙色謂賈曰試爲我著秦所以失天下吾所以得之者及古成敗之國事賈凡著十二篇毎奏一篇高帝未甞不稱善稱其書曰新語呂大后時王諸呂諸呂擅權欲劫少主危劉氏右丞相陳平患之賈曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分權不分爲社稷計在兩君掌握耳平因結謀於大尉勃卒誅諸呂安劉氏立文帝賈之謀也婁敬齊人也漢五年戍隴西過雒陽高帝在焉敬脫輓輅輅以木當胸挽重輦車也見齊人虞將軍曰臣願見上言便宜虞將軍入言上上召見問敬說曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周之先自后稷積德累善十餘世及武王伐紂不期會孟津上八百諸侯遂滅殷成王卽位周公之屬傅相焉廼營成周都雒以爲此天下中諸侯四方納貢職道里鈞矣有德則易以王無德則易以亡凡居此者欲令周務以德致人不欲阻險令後世驕奢以虐民也及周之衰分而爲二天下莫朝周不能制非德薄形勢弱也今陛下起豐沛收卒三千人卷蜀漢定三秦與項籍大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絕傷痍者未起而欲比隆成康之時臣竊以爲不侔矣且夫秦地被山帶河四塞以爲固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬭不搤其亢亢㗋嚨也拊其背未能全勝今陛下入關而都按秦之故此亦搤天下之亢而拊其背也高帝卽日駕西都關中於是賜姓劉氏拜爲郞中號曰奉春君漢七年韓王信反高帝自往擊至晉陽聞信與匈奴欲擊漢上使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸畜使者十輩來皆言匈奴易擊上使敬復往還執曰兩國相擊此宜夸矜見所長今臣往徒見羸胔老弱此必欲見短伏奇兵以爭利愚以爲匈奴不可擊也是時漢兵三十餘萬衆兵巳業行上怒罵敬曰齊虜以舌得官廼今妄言沮吾軍械繫敬廣武遂往至平城匈奴果出奇兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城廼封敬二千戶號建信侯叔孫通薛人也爲太子太傅高帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年爲天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食啖食無菜茹爲啖其可背哉陛下必欲廢嫡而立少臣願先伏誅以頸血汚地高帝曰公罷矣吾特戲耳通曰太子天下本本壹搖天下震動奈何以天下戲高帝曰吾聽公蒯通范陽人也韓信定齊地自立爲齊假王通知天下權在於信說信曰今劉項分爭使人肝腦塗地流離中野不可勝數非天下賢聖其勢固不能息天下之禍當今之時兩主懸命於足下足下爲漢則漢勝與楚則楚勝方今爲足下計莫若兩利而俱存之參分天下鼎足而立其勢莫敢先動蓋聞天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢王遇我厚吾豈可見利而背恩乎遂謝通通說不聽惶恐乃陽狂爲巫天下旣定後信以罪廢爲淮陰侯謀反誅臨死歎曰悔不用蒯通之言高帝聞之召通通至上欲亨之曰若敎韓信反何也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿以鹿喩帝位也天下共逐之高材者先得天下匈匈爭欲爲陛下所爲顧力不能可殫誅邪上廼赦之至齊悼惠王時曹參爲相禮下賢人請通爲客初齊處士東郭先生梁石君入深山隱居通廼見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下卽欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未甞卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以爲上賓賈誼洛陽人也孝文時爲梁懷王太傅是時匈奴強侵邊天下初定制度疏闊諸侯王僭擬地過古制淮南濟北王皆爲逆誅誼數上疏陳政事多所欲匡建其大略曰臣竊惟事勢可爲痛哭者一可爲流涕者二可爲長太息者六若其他背理而傷道者難徧以疏擧進言者皆曰天下巳安巳治矣臣獨以爲未也曰安且治者非愚則䛕皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之勢何以異此陛下何不壹令臣得孰數之於前因陳治安之策試詳擇焉夫使爲治勞智慮苦身體乏鐘鼓之樂勿爲可也樂與今同而加之以諸侯䡄道兵革不動民保首領匈奴賓服四荒向風百姓素朴獄訟衰息天下順治生爲明帝没爲明神名譽之美垂於無窮建久安之勢成長治之業以承祖廟以奉六親至孝也以幸天下以育羣生至仁也立經陳紀輕重同得後可以爲萬世法程雖有愚幼不肖之嗣猶得蒙業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也臣謹稽之天地驗之往古按之當今之務日夜念之至孰也雖使禹舜復生爲陛下計無以易此夫樹國固必相疑之勢也樹國於險固諸侯強大則必與天子有相疑之勢也下數被其殃上數爽其憂甚非所以安上而全下今或親弟謀爲東帝淮南厲王長也親兄之子西向而擊謂齊悼惠王子興居爲濟北王反欲擊取滎陽天子春秋鼎盛鼎方行義未過德澤有加焉猶尚如是況莫大諸侯權力且十此者乎然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之爲邪此時而欲爲治安雖堯舜不治也今令此道順而全安甚易不肯早爲巳廼墮骨肉之屬而抗剄之抗其頭而剄之也豈有異秦之季世乎夫以天子之位乘今之時因天之助尚憚以危爲安以亂爲治假設天下如曩時淮陰侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙盧綰王燕陳狶在代令此六七公者皆亡恙當是時而陛下卽天子位能自安乎臣有以知陛下之不能也天下殽亂高皇帝與諸公並起諸公幸者廼爲中涓其次僅得舍人材之不逮至遠也高皇帝以明聖威武卽天子位割膏腴之地以王諸公多者百餘城少者三四十縣德至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自高皇帝不能以是一歲爲安故臣知陛下之不能也臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽恭王王梁靈王王燕厲王王淮南六七貴人皆無恙當是時陛下卽位能爲治乎臣又知陛下之不能也若此諸王雖名爲臣實皆有布衣昆弟之心慮無不帝制而天子自爲者擅爵人赦死辠甚者或戴黃屋令不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者爲御史大夫奏淮南厲王誅也適啓其口匙首巳陷其匈矣陛下雖賢誰與領此故疏者必危親者必亂巳然之效也其異姓負強而動者漢巳幸而勝之矣又不易其所以然同姓襲是跡而動旣有徵矣殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛坥一朝解十二牛而芒刄不頓者所排擊剝割皆衆理解也至於髖髀之所非斤則斧夫仁義恩厚人主之芒刄也權勢法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刄臣以爲不缺則折胡不用之淮南濟北勢不可也二國皆反誅何不施之仁恩勢不可故也臣竊跡前事大抵強者先反淮陰王楚最強則最先反韓王信倚胡則又反貫高因趙資則又反陳狶兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙廼在二萬五千戶耳功少而最完勢疏而最忠非獨性異人亦形勢然也曩令樊酈絳灌據數十城而王今雖巳殘亡可也令信越之倫列爲徹侯而居雖至今存可然則天下之大計可知也欲諸王之皆忠附則莫若令如長沙王欲臣子之勿𦵔醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則無邪心令海內之勢如身之使臂臂之使指莫不制從諸侯之君不敢有異心雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各爲若干國使其子孫各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以爲國空而置之須其子孫生者擧使君之天子無所利焉誠以定治而已故天下咸知陛下之廉地制壹定宗室子孫莫慮不王下無背叛之心上無誅伐之志天下咸知陛下之仁法立而不犯令行而不逆細民向善大臣致順故天下咸知陛下之義當時大治後世誦聖陛下誰憚而久不爲此天下之勢方病大瘇腫足曰瘇一脛之大幾如要一指之大幾如股平居不可屈伸失今不治必爲錮疾後雖有扁鵲不能爲巳可痛哭者此病是也天下之勢方倒懸凡天子者天下之首也蠻夷者天下之足也今匈奴嫚娒侵掠至不敬也爲天下患至無巳也而漢歲致金絮采繒以奉之足反居上首顧居下倒懸如此莫之能解猶爲國有人乎可爲流涕者此也今民賣僮者僮謂隷妾爲之繡衣絲履偏諸緣內之閑中閑賣奴婢闌也是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸是古天子之服也今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得爲帝服倡優下賤得爲后飾然而天下不屈者殆未有也夫俗至大不敬也至無等也至冐上也進計者猶曰無爲可爲長太息者此也商君遺禮義弃仁恩并心於進取秦俗日敗故秦人家富子壯則出分家貧子壯則出贅出作贅壻借父耰鉏慮有德色假其父鉏而惪之母取箕箒立而誶語誶猶責也抱哺其子與公倂倨其慈子嗜利不同禽獸者無幾耳然并心而赴時者猶曰蹷六國兼天下功成求得矣終不知反廉愧之節仁義之厚衆掩寡知欺愚勇威怯壯凌衰其亂至矣是以大賢起之威震海內德從天下曩之爲秦者今轉而爲漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上無制度弃禮誼捐廉耻日甚殺父兄盜者剟寢戶之簾剟取也搴兩廟之器搴取也兩廟高祖惠帝廟也白晝大都之中剽吏而奪之金矯僞者出幾十萬石粟吏矯僞徵發盈出十萬石粟賦六百餘萬錢乘傳而行郡國此其無行義之尤至者也而大臣特以簿書不報期會之間以爲大故至於俗流失世壞敗因恬而不知怪夫移風易俗使天下囘心而向道類非俗吏之所能爲也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊爲陛下惜之夫立君臣等上下使父子有禮六親有紀父母兄弟妻子此非天之所爲人之所設也人之所設不爲不立不植則僵不修則壞管子曰禮義廉耻是謂四維四維不張國乃滅亡使管子愚人也則可管子而少知治體則是豈可不爲寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三歲而社稷爲墟今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君臣上下有差父子六親各得其宜姦人無所幾幸此業壹定世世常安若夫經制不定是猶渡江河無維檝中流而遇風波舩必覆矣可爲長大息者此也夏爲天子十有餘世殷爲天子二十餘世周爲天子三十餘世秦爲天子二世而亡人性不甚相遠也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子廼生固擧以禮使士負之有司齊肅端冕見于天也過闕則下過廟則趍孝子之道也故自爲赤子而敎固巳行矣昔者成王幼在繦緥之中召公爲大保周公爲太傅太公爲太師保保其身體傅傅之德義師導之敎訓此三公職也於是爲置三少少保少傅少師是與太子宴者也故廼孩提有識三公三少明孝仁禮義以導習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子廼生而見正事聞正言行正道左右前後皆正人夫習與正人居之不能無正猶生長楚之鄕不能不楚言也孔子曰少成若天性習貫如自然太子旣冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦箴諫大夫進謀士傳民語習與智長故切而不媿化與心成故中道若性春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和鸞在衡和在軾歩中采齊趍中肆夏樂詩也歩則歌之以中節所以明有度也其於禽獸見其生不食其死聞其聲不食其肉故遠庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也至秦而不然其俗固非貴辭讓也所上者吿訐也固非貴禮義也所上者刑罸也使趙高傅胡亥而敎之獄所習者非斬劓人則夷人之三族也故胡亥今日卽位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若刈草菅然豈唯胡亥之性惡哉彼其所以導之者非其理故也鄙諺曰不習爲吏視巳成事又曰前車覆後車誡夫三代之所以長久者其巳事可知也夫存亡之變治亂之機其要在是矣夫天下之命懸於太子太子之善在於早諭敎與選左右夫心未濫而先諭敎則化易成也開於道術智誼之指則敎之力也若其服習積貫貫習也則左右而巳臣故曰選左右早諭敎最急夫敎得而左右正則太子正矣太子正而天下定矣若夫慶賞以勸善刑罸以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地豈顧不用哉孔子曰聽訟吾猶人也必也使無訟乎爲人主計者莫如先審取舍取舍之極定於內而安危之萠應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罸治之者積刑罸刑罸積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或導之以德敎或敺之以法令導之以德敎德敎洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百歲而弗失秦王持天下十餘歲則大敗此無他故矣湯武之定取舍審而秦王之定取舍不審也夫天下大器今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被子孫數十世此天下所共聞也秦王置天下於法令刑罸德澤無一有而怨毒盈於世人憎惡之如仇讎禍幾及身子孫誅絕此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令敎化之不如刑罸人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庶如地古者聖王制爲等列內有公卿大夫士外有公侯伯子男等級分明而天子加焉故其尊不可及也鄙諺曰欲投鼠忌器尚憚不投恐傷其器況貴臣之近主乎廉耻禮節以治君子故有賜死而無戮辱是以黥劓之辠不及大夫顧其離主上不遠也君之寵臣雖或有過刑戮之罪不加其身者尊君故也所以體貌大臣而厲其節也今自王侯三公之貴皆天子之所改容而禮之古天子之所謂伯父伯舅也而今與衆庶同黥劓髠刖笞傌棄市之法然則堂不無陛乎被戮辱者不泰迫乎廉耻不行大臣無廼握重權大官而有徒隷無耻之心乎今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司冦編之徒官司冦小吏詈罵而榜笞之殆非所以令衆庶見也夫天子之所甞敬衆庶之所甞寵死而死耳賤人安得如此而頓辱之哉故主上遇其大臣如遇犬馬彼將犬馬自爲也如遇官徒彼將官徒自爲也故古者禮不及庶人刑不至大夫所以厲寵臣之節也其有大罪者聞命則北面再拜跪而自裁上不使人捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自熹嬰以廉耻故人矜以節行上設廉耻禮義以遇其臣而臣不以節行報其上者則非人類也故爲人臣者利不苟就害不苟去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者比物此志也比謂比方使忠臣以死社稷之志比於金城彼且爲我死故吾得與之俱生彼且爲我亡故吾得與之俱存爲我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉耻行禮誼之所致也主上何喪焉此之不爲而顧彼之久行彼亡國也故曰可爲長太息者此也爰盎字絲楚人也孝文時爲中郞將從覇陵上欲西馳下峻阪盎攬轡上曰將軍怯邪盎曰臣聞千金子不垂堂百金子不騎衡騎倚也聖主不乘危不徼幸今陛下騁六飛六馬之疾若飛也馳不測山有如馬驚車敗陛下縱自輕奈高廟太后何上乃止上幸上林皇后愼夫人從其在禁中常同坐及坐郞署盎卻愼夫人坐愼夫人怒不肯坐上亦怒起盎因前說曰臣聞尊卑有序則上下和今陛下旣巳立后愼夫人廼妾妾主豈可以同坐哉且陛下幸之則厚賜之陛下所以爲愼夫人適所以禍之獨不見人豕乎戚夫人也於是上廼悅入語愼夫人夫人賜盎金五十斤然盎亦以數直諫不得久居中調爲隴西都尉調選也仁愛士卒皆爭爲死晁錯潁川人也以文學爲太子家令是時匈奴強數冦邊上發兵以禦之錯上言兵事曰臣聞兵法有必勝之將由此觀之安邊境立功名在於良將不可不擇也臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石經川丘阜草木所在此歩兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地也歩兵十不當一平陵相遠川谷居間仰高臨下此弓弩之地也短兵百不當一兩陣相近平地淺草可前可後此長㦸之地也劍楯三不當一萑葦竹蕭草木蒙蘢支葉茂接此矛鋋之地也長㦸二不當一曲道相伏險阨相薄此劔楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趍利弗及避難不畢前擊後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同袒裼肉袒弩不可以及遠與短兵同射不能中與無矢同中不能入與無鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒予敵也卒不可用以其將與敵也君不擇將以其國與敵也四者兵之至要也臣又聞小大異形強弱異勢險易異備夫卑身以事強小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今匈奴地形伎藝與中國異上下山阪出入谿澗中國之馬弗與也險道傾側且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之衆易撓亂也勁弩長㦸射疏及遠則匈奴之弓弗能挌也堅甲利刄長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的材官騎射之官也射者騶發其用矢者同中一的言其工妙則匈奴之革笥木薦革笥以皮作如鎧也木薦以木板作如楯弗能支也下馬地鬭劔㦸相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶器戰危事也以大爲小以強爲弱在俛仰之間耳夫以人死爭勝跌而不振蹉跌不可復起則悔之無及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飮食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者將之卽有險阻以此當之平地通道則以輕車材官制之兩軍相表裏各用其長技衡加之以衆此萬全之術也文帝嘉之乃賜錯璽書寵答焉錯復言守邊備塞勸農力本當世急務二事曰臣竊聞秦時北攻胡貉築塞河上南攻揚粤揚州之南越也置戍卒焉其起兵而攻胡粤者非以衛邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則爲人禽屯則卒積死夫胡貉之地積陰之處也其性能寒揚粤之地少陰多陽其性能暑秦之戍卒不能其水土戍者死於邊輸者僨於道僨仆也秦民見行如往弃市因以謫發之名曰謫戍發之不順行者深怨有背叛之心凡民守戰至死而不降北者以計爲之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙矢石赴湯火視死如生今秦之發卒也有萬死之害而無銖兩之報死事之後不得一筭之復天下明知其禍烈及己也陳勝行戍至於大澤爲天下先唱天下從之如流水者秦以威劫而行之敝也胡人衣食之業不著於地其勢易擾亂邊境如飛鳥走獸放於廣野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人生業而中國之所以離南畆也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絕望而有降敵之心少發則不足多發遠縣纔至胡又巳去聚不罷爲費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令遠方之卒守塞一歲而更不知胡人之能不如選常居者家室田作且以備之以便爲之高城深塹先爲室屋具田器廼募罪人令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足廼募民之欲往者皆賜高爵復其家與冬夏衣禀食能自給而止其無夫若妻者縣官買與之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半與之謂胡人驅收中國能奪得之者以半與之也縣官爲贖得漢人官爲贖也其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒東方諸郡次當戍邊不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使遠方無屯戍之事塞下之民父子相保無係虜之患利施後世名稱聖明其與秦之行怨民相去遠矣上從其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省甚大惠也使先至者安樂而不思故鄕則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和甞其水泉之味審其土地之宜觀其草木之饒然後營邑立城制里割宅通田作之道正阡陌之界先爲築室家置器物焉民至有所居作有所用此民所以輕去故鄕而勸之新邑也爲置醫巫以救疾病生死相䘏墳墓相從此所以使民樂其處而有長居之心也擇其邑之賢材習地形知民心者居則習民於射法出則敎民於應敵故卒伍成於內則軍正定於外服習以成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罸則前死不還踵矣文帝詔擧賢良文學之士錯在選中上親策詔之曰昔者大禹勤求賢士施及方外近者獻其明遠者通厥聰比善勠力以翼天子是以大禹能無失德故詔有司選賢良明於國家之大體通於人事之終始及能直言極諫者將以匡朕之不逮永惟朕之不德吏之不平政之不宣民之不寧四者之闕悉陳其志無有所隱錯對詔策曰通於人事終始愚臣竊以古之三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲壽三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力不盡也其爲法令也合於人情而後行之其動衆使民也本於人事然後爲之取人以巳內恕及人情之所惡不以強人情之所欲不以禁民是以天下樂其政而歸其德望之若父母從之若流水百姓和親國家安寧名位不失施及後世此明於人情終始之功也詔策曰吏之不平政之不宣民之不寧愚臣竊以秦事明之臣聞秦始并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富強夫國富強而鄰國亂者帝王之資也故秦能兼六國立爲天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信讒賊宮室過度耆欲無極民力疲盡賦歛不節矜奮自賢羣臣恐䛕恐機發陷禍而諛以求自全驕溢縱恣不顧患禍妄賞以隨喜意妄誅以快怒心法令煩憯刑罸暴酷輕絕人命天下寒心莫安其處姦邪之吏乘其亂法以成其威獄官主斷生殺自恣上下瓦解各自爲製秦始亂之時吏之所先侵者貧人賤民也至其中節所侵者富人吏家也及其末塗所侵者宗室大臣也是故親疏皆危外內咸怨離散逋逃人有走心陳勝先倡天下大潰絕祀亡世爲異姓福此吏不平政不宣民不寧之禍也對奏天子善之遷大中大夫錯以諸侯強大請削之後吳楚反會竇嬰言爰盎詔召入見上問曰計安出盎對曰吳楚相遺書言高皇帝王子弟各有分地今賊臣晁錯擅謫諸侯削奪之地以故反名爲西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可無血刄而俱罷於是上默然良久曰顧誠何如吾不愛一人謝天下也後十餘日廼使中尉召錯紿載行市錯衣朝衣斬東市錯巳死謁者僕射鄧公爲校尉擊吳楚還上書言軍事上問曰聞晁錯死吳楚罷不也鄧公曰吳爲反數十歲矣發怒削地以誅錯爲名其意不在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫晁錯患諸侯強大不可制故請削之以尊京師萬世之利也計畫始行卒被大戮內杜忠臣之口外爲諸侯報仇臣竊爲陛下不取也於是景帝喟然長息曰公言善吾亦恨之羣書治要卷第十六

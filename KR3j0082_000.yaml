front:
  text: 校正羣書治要序古昔聖主賢臣所以孜孜講求莫非平治天下之道皆以救弊于一時成法于萬世外此豈有可觀者㦲但世遷事變時換勢殊不得不因物立則視宜創制是以論説之言日浩撰著之文月繁簡樸常寡浮誕漸勝其綱之不能知而况舉其目乎此書之作盖其以此也先明道之所以立而後知政之所行先尋敎之所以設而後得學之所歸自典誥㴱奥訖史子辨博諸係乎政術存乎勸戒者擧
  hash: sha256:74a472547a1f91dc58bc28c25ce489d3c289c1de0aebf50a804b841bce404d9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_000-1a}
body:
  text: 而不遺罷朝而不厭其淆亂閉室而不煩其㝷究誠亦次經之書也我朝承和貞觀之間致重雍􅊞熈之盛者未必不因講究此書之力則凢君民臣君者非所可忽也尾公有見于斯使世子命臣僚校正而上之木又使余信敬序之惟信敬弱而不敏如宜固辭者而不敢者抑亦有故也羣今不傳今尾公此舉上之欲君民者執以致日新之美下之欲臣君者奉以賛金鏡之明為天下國家兾昇平之愈久逺心曠度有不可勝言者也信敬預亊亦知逺祖所望信敬是所以奉命不敢辭也天明七年丁未四月朝散大夫國子祭酒林信敬謹序刋羣書治要考例謹考國史承和貞觀之際經筵屢講此書距今殆千年而宋明諸儒無一言及者則其亡失巳久寬永中我敬公儒臣堀正意撿此書題其首曰正和年中北條實時好居書籍得請諸中秘寫以藏其金澤文庫及神祖統一之日見之喜其免兵燹乃命範金至台廟獻之皇朝其餘頒宗戚親臣是今之活字銅版也舊目五十卷今存四十七卷其三卷不知亡何時羅山先生補其二卷其一卷不傳故不取也伹知金澤之舊藏亦缺三本近世活本亦難得如其繕本隨寫隨誤勢世以音訛所處以訓謬間有不可讀者我孝昭二世子好學及讀此書有志挍刋幸魏氏所引原書今存者十七八乃博募異本於四方日與侍臣照對是正業未成不幸皆早逝今世子深悼之請繼其志勗諸臣相與卒其業於是我公上自內庫之藏㫄至公卿大夫之家請以比之借以對之乃命臣人見桼臣深田正純臣大塜長幹臣宇野久恆臣角田明臣野村昌武臣岡田挺之臣關嘉臣中西衛臣小河鼎臣南宮齡臣德民等考異同定疑似臣等議曰是非不疑者就正之兩可者共存又與所引錯綜大異者疑魏氏所見其亦有異本歟又有彼全備而此甚省者葢魏氏之志唯主治要不事修辭亦足以觀魏氏經國之器規模宏大取舍之意大非後世諸儒所及也今逐次補之則失魏氏之意故不爲也不得原書者則敢附臆考以待後賢以是爲例讎挍以上天明五年乙巳春二月乙未尾張國校督學臣細井德民謹識羣書治要序秘書監鉅鹿男臣魏徵等奉勅撰竊惟載籍之興其來尚矣左史右史記事記言皆所以昭德塞違勸善懲惡故作而可紀薰風揚乎百代動而不法炯戒垂乎千祀是以歷觀前聖撫運膺期莫不懍乎御朽自強不息乾乾夕惕義在兹乎近古皇王時有撰述並皆包括天地牢籠羣有競採浮豓之詞爭馳迃誕之說騁末學之博聞飾雕蟲之小伎流宕忘反殊塗同致雖辯周萬物愈失司契之源術總百端乖得一之㫖皇上以天縱之多才運生知之叡思性與道合動妙幾神玄德潛通化前王之所未化損巳利物行列聖之所不能行翰海龍庭之野並爲郡國扶桑若木之域咸襲纓冕天地成平外內禔福猶且爲而不恃雖休勿休俯恊堯舜式遵稽古不察貌乎止水將取鑒乎哲人以爲六籍紛綸百家踳駮窮理盡性則勞而少功周覽汎觀則博而寡要故爰命臣等採摭羣書翦截淫放光昭訓典聖思所存務乎政術綴叙大略咸發神衷雅致鈎深規摹宏遠網羅治體事非一目若乃欽明之后屈巳以救時無道之君樂身以亡國或臨難而知懼在危而獲安或得志而驕居業成以致敗者莫不備其得失以著爲君之難其委質策名立功樹惠貞心直道忘軀殉國身殞百年之中聲馳千載之外或大姧巨猾轉日逥天社鼠城狐反白仰黑忠良由其放逐邦國因以危亡者咸亦述其終始以顯爲臣不易其立德立言作訓垂範爲綱爲紀經天緯地金聲玉振騰實飛英雅論徽猷嘉言美事可以弘奬名敎崇太平之基者固亦片善不遺將以丕顯皇極至於母儀嬪則懿后良妃叅徽猷於十亂著深誡於辭輦或傾城悊婦亡國豔妻候晨雞以先鳴待擧烽而後笑者時有所存以備勸戒爰自六經訖乎諸子上始五帝下盡晉年凡爲五袠合五十卷本求治要故以治要爲名伹皇覽遍略隨方類聚名目互顯首尾淆亂文義斷絕㝷究爲難今之所撰異乎先作總立新名各全舊體欲令見本知末原始要終並棄彼春華採兹秋實一書之內牙角無遺一事之中羽毛咸盡用之當今足以鑒覽前古傳之來葉可以貽厥孫謀引而申之觸類而長蓋亦言之者無罪聞之者足以自戒庶弘兹九德簡而易從觀彼百王不疾而速崇巍巍之盛業開蕩蕩之王道可久可大之功並天地之貞觀日用日新之德將金鏡以長懸其目錄次第編之如左羣書治要目錄第一袠十卷第一周易第二尚書第三毛詩第四春秋左氏傳上第五春秋左氏傳中第六春秋左氏傳下第七禮記第八周禮國語周書韓詩外傳第九孝經論語第十孔子家語第二袠十卷第十一史記上第十二史記下吳越春秋第十三漢書一第十四漢書二第十五漢書三第十六漢書四第十七漢書五第十八漢書六第十九漢書七第二十漢書八第三袠十卷第二十一後漢書一第二十二後漢書二第二十三後漢書三第二十四後漢書四第二十五魏志上第二十六魏志下第二十七蜀志吳志上第二十八吳志下第二十九晉書上第三十晉書下第四袠十卷第三十一六韜陰謀鬻子第三十二管子第三十三晏子司馬法孫子第三十四老子列子鶡冠子墨子第三十五文子曾子第三十六吳子尸子商君子申子第三十七孟子莊子愼子尹文子尉繚子第三十八孫卿子第三十九吕氏春秋第四十韓子賈子三略新語第五袠十卷第四十一淮南子第四十二鹽鐵論新序第四十三說苑第四十四桓子新論潛夫論第四十五崔寔政論昌言第四十六申監中論典論第四十七劉廙政論蔣子政要論第四十八體論典語第四十九傅子第五十袁子書抱朴子

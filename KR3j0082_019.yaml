front:
  text: 羣書治要卷第二十二
  hash: sha256:5bc9a3072ce019f4295b527bc4a78f145d73072a53ffdb4fd923f8dc8216f937
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_019-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰後漢書二傳宋弘字仲子長安人也世祖嘗問弘通博之士弘薦沛國桓譚才學洽聞幾能及揚雄劉向父子於是召譚拜議郞給事中帝毎讌輙令鼔琴好其繁聲弘聞之不悅悔於薦擧伺譚內出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也能自改耶將令相擧以法乎譚頓首辭謝良久乃遣之後大會羣臣帝使譚鼓琴譚見弘失其常度帝怪而問之弘乃免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝之使反服其後遂不復令譚給事中弘推進賢士三十餘人或相及爲公卿者弘當讌見御坐新施屛風圖畫列女帝數顧視之弘正容言曰未見好德如好色者帝卽爲徹之咲謂弘曰聞義則服可乎對曰陛下進德臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圖之後弘被引見帝令主坐屛風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣韋彪字孟達扶風人也拜大鴻臚是時陳事者多言郡國貢擧率非功次故守職益懈而吏事寖疎咎在州郡彪上議曰孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以爲滕薛大夫忠孝之人持心近厚鍜練之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行爲先不可純以閥閱然其要歸在於選二千石二千石賢則貢擧皆得其人矣帝深納之彪以世承二帝吏治之後多以苛刻爲能又置官選職不必以才上疏諫曰農民急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急民所務當先除其所患天下樞要在於尚書尚書之選豈可不重而間者多從郞官超升此位雖曉習文法長於應對然察察小惠類無大能宜簡嘗歷州宰素有名者雖進退舒遲時有不逮然端心向公奉職周密宜鑒嗇夫捷急之對深思絳侯木訥之功也往時楚獄大起故置令史以助郞職而類多小人好爲姧利今者務簡可皆停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徵試輩爲大夫又御史外遷動據州郡並宜淸選其任責以言績其二千石視事雖久而爲吏民所便安者宜增秩重賞勿妄遷徙惟留聖心書奏帝納之杜林字伯山扶風人也爲光祿勲建武十四年羣臣上言古者肉刑嚴重則民畏法令今憲章輕薄故姧䡄不勝宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則苟免之行興孔子曰導之以政齊之以刑民免而無耻導之以德齊之以禮有耻且格古之明王深識遠慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩爲圓斲雕爲朴蠲除苛政更立疏網海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成贓小事無妨於義以爲大戮故國無廉士家無完行至於法不能禁令不能止上下相遁爲弊彌深臣愚以爲宜如舊制帝從之桓譚字君山沛國人也拜議郞給事中因上疏陳時政所宜曰臣聞國家之廢興在於政事政事得失由乎輔佐輔佐賢明則俊士充朝而治合世務輔佐不明則論失時宜而擧多過事夫有國之君俱欲興化建善然而治道未理者其所謂賢者異也蓋善治者視俗而施敎察失而立防威德更興文武迭用然後政調於時而躁人可定昔董仲舒言治國譬若琴瑟其不調者則解而更張夫更張難行而咈衆者亡是故賈誼以才逐而晁錯以智死世雖有殊能而終莫敢談者懼於前事也且設法禁者非能盡塞天下之姧皆合衆人之所欲也大抵取便國利事多者則可矣又見法令決事輕重不齊或一事殊法同罪異論姧吏得因緣爲市所欲活則出生議所欲陷則與死比是爲刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣書奏不省是時帝方信讖多以決定嫌疑譚復上疏曰今諸巧慧小才伎數之人增益圖書矯稱讖記以欺惑貪邪詿誤人主焉可不抑遠之哉其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屛羣小之曲說述五經之正義略雷同之俗語詳通人之雅謀帝省奏愈不悅其後有詔會議靈臺所處帝謂譚曰吾欲以讖決之何如譚黙然良久曰臣不讀讖帝問其故譚復極言讖之非經帝大怒曰桓譚非聖無法將下斬之譚叩頭流血良久得解出爲六安郡丞意忽忽不樂道病卒馮衍字敬通京兆人也更始二年遣尚書僕射鮑永行大將軍事安集北方乃以衍爲立漢將軍與上黨太守田邑等繕甲養士扞衛幷土及世祖卽位遣宗正劉延攻天井關與田邑連戰十餘合後邑聞更始敗乃遣使詣洛陽獻璧馬卽拜爲上黨太守因遣使者招永衍永衍等疑不肯降而忿邑背前約衍乃遺邑書曰衍聞之委質爲臣無有二心挈甁之智守不假器是以晏嬰臨盟擬以曲㦸不易其辭謝息守郕脅以晉魯不喪其邑由是言之內無鈎頸之禍外無桃萊之利而被畔人之聲蒙降城之耻竊爲左右羞之時訛言更始隨赤眉在北地永衍信之故屯兵界休方移書上黨云皇帝在雍以惑百姓審知更始已殁乃共罷兵幅巾降于河內帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜永謂衍曰昔高祖賞季布之罪誅丁固之功今遭明主亦何憂哉衍曰記有之人有挑其鄰之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非罵爾者耶曰在人欲其報我在我欲其罵人也夫天命難知人道易守守道之臣何患死亡頃之帝以衍爲曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毀故賞不行建武六年日食衍上書陳八事其一曰顯文德二曰襃武烈三曰㫦舊功四曰招俊傑五曰明好惡六曰簡法令七曰差秩祿八曰撫邊境書奏帝將召見初衍爲浪孟長以罪摧陷大姓令狐略是時略爲司空長史讒之於尚書令王護尚書周生豐曰衍所以求見者欲毀君也護等懼之卽共排間衍遂不得入後衛尉陰興新陽侯陰就以外戚貴顯深敬重衍衍遂與之交結由是爲諸王所聘請尋爲司隷從事帝懲西京外戚賔客故以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗自詣獄有詔赦不問歸故郡閉門自保不敢復與親故通建武末上疏自陳曰臣伏念高祖之略而陳平之謀毀之則疎譽之則親以文帝之明而魏尚之忠繩之以法則爲罪施之以德則爲功逮至晚世董仲舒言道德見妬於公孫弘李廣奮節於匈奴見排於衛靑此臣之常所爲流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之說乏董生之才寡李廣之勢而欲免讒口濟怨嫌豈不難哉臣衍之先祖以忠貞之故成私門之禍而臣衍復遭擾攘之時値兵革之際不敢回行求世之利事君無傾邪之謀將帥無虜掠之心衛尉陰興敬愼周密內自修勅外遠嫌疑故與交通興知臣之貧數欲本業之臣自惟無三益之才不敢處三損之地固讓而不受之昔在更始大原執貨財之柄居倉卒之間據位食祿二十餘年而財產歲狹居處日貧家無布帛之積出無輿馬之飾於今遭淸明之世勅躬力行之秋而怨讎叢興譏議橫世蓋富貴易爲善貧賤難爲工也疎遠壠畆之臣無望高闕之下惶恐自陳以救罪尤書奏猶以前過不用論曰馮衍之引挑妻之譬得矣夫納妻皆知取詈巳者而取士則不能何也豈非反妬情易而恕義情難光武雖得之於鮑永猶失之於馮衍夫然義直所以見屈於旣往守節故亦彌阻於來情嗚呼申屠剛字巨卿扶風人也遷尚書令世祖嘗欲出遊剛以隴蜀未平不宜晏安逸豫諫不見聽遂以頭􅮾乘輿輪帝遂爲止時內外羣官多帝自選擧加以法理嚴察職事過苦尚書近臣至乃捶撲牽曵於前羣臣莫敢正言剛每輒極諫又數言皇太子宜時就東宮簡任賢保以成其德鮑永字君長上黨人也父宣爲王莽所殺事後母至孝妻嘗於母前叱狗而永卽去之莽以宣不附己欲滅其子孫太守苟諫擁護召以爲吏更始二年徵再遷尚書僕射行大將軍事持節將兵安集河東幷州朔部世祖卽位遣諫議大夫儲大伯持節徵永永乃收繫大伯遣使馳至長安旣知更始已亡乃發喪出大伯等封上將軍列侯印綬悉罷兵伹幅巾與諸將及同心客百餘人詣河內帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不悅爲司隷校尉行縣到覇陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖以獲罪司隷所不避也遂下拜哭盡哀而去西至扶風椎牛上諫冢帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之高者也帝意乃釋論曰鮑永守義於故主斯可以事新主矣耻以其衆受寵斯可以受大寵矣若乃言之者雖誠而聞之者未譬豈苟進之悅易以情納持正之忤難以理求乎誠能釋利以循道居方以從義君子之槪也郅惲字君章汝南人也擧孝廉爲上東城門侯帝常出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃廻從東中門入明日惲上書諫曰陛下遠獵山林夜以繼晝其如社稷宗廟何暴虎馮河未至之誡誠小臣所竊憂也書奏賜布百匹貶東中門侯爲參封尉郭伋字細侯扶風人也王莽時爲幷州牧建武九年拜潁川太守十一年調爲幷州刺吏引見讌語伋因言選補衆職當簡天下賢俊不宜專用南陽人帝納之伋前在幷州素結恩德及後入界所到縣邑老幼相攜逢迎道路所過問民疾苦聘求耆德雄俊設几杖之禮朝夕與參政事始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問曰兒曹何自遠來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒後送至郭外問使君何日當還伋計日吿之旣還先期一日伋爲違信於諸兒遂止于野亭須期乃入樊宏字靡卿南陽人世祖之舅也宏爲人謙柔畏愼不求苟進常戒其子曰富貴盈溢未有能終者吾非不喜榮勢也天道惡滿而好謙前代貴戚皆明戒也保身全己豈不樂哉宗族染其化未嘗犯法帝甚重之陰識字次伯南陽人光烈皇后之兄也以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖庭仍加爵邑不可以示天下帝甚美之興字君陵識弟也帝召興欲封之置印綬於前興固讓曰臣未有先登陷陳之功而一家數人並蒙爵土令天下觖望誠爲盈溢臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記耶亢龍有悔外戚家苦不知謙退嫁女欲配侯王取婦眄聣公主愚心實不安也富貴有極人當知足夸奢益爲觀聽所譏貴人感其言深自降挹卒不爲宗族求位帝後復欲以興代吳漢爲大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可苟冐至誠發中感動左右帝遂聽之朱浮字叔元沛國人也爲幽州牧漁陽太守彭寵敗後世祖以二千石長吏多不勝任時有纖微之過者必見斥罷交易紛擾百姓不寧建武六年有日蝕之異浮因上疏曰臣聞日者衆陽之宗君上之位也凡居官治民據郡典縣皆爲陽爲上爲尊爲長若陽上不明尊長不足則干動三光垂示王者陛下哀愍海內新離禍毒保宥生民使得蘇息而今牧民之吏多未稱職小違治實輙見斥罷豈不粲然黑白分明哉然以堯舜之盛猶加三考大漢之興亦累功効吏皆積久養老於官至名子孫因爲氏姓當時吏職何能悉治論議之徒豈不諠譁蓋以爲天地之功不可倉卒艱難之業當累日也間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職旣加嚴切人不自保各相顧望無自安之心有司或因睚眦以騁私怨苟求長短求媚上意二千石及長吏迫於擧劾懼于刺譏故爭飾詐僞以希虛譽斯皆羣陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也天下非一時之用也海內非一且之功也願陛下遊意於經年之外望化於一世之後天下幸甚帝下其議羣臣多同於浮自是牧守易代頗簡舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史案驗然後黜退帝時用明察不復委任三府而權歸刺擧之吏浮復上疏曰陛下淸明履約率禮無違自宗室諸王外家后親皆奉繩墨無黨勢之名斯固法令整齊下無作威者也求之於事宜以和平而灾異猶見者而豈徒然哉天道信誠不可不察竊見陛下疾往者上威不行下專國命卽位以來不用舊典信刺擧之官黜鼎輔之任至於有所劾奏便加退免覆案不關三府罪譴不蒙澄察陛下以使者爲腹心而使者以從事爲耳目是爲尚書之平決於百石之吏故羣下苛刻各自爲能兼以私情容長憎愛在職皆競張空虛以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也夫事積久則吏自重吏安則民自靜傳曰五年再閏天道乃備夫以天地之靈猶五載以成其化況人道哉陳元字長孫蒼梧人也以父任爲郞時大司農江馮上言宜令司隷校尉督察三府元上疏曰臣聞師臣者帝賓臣者覇故武王以大公爲師齊桓以夷吾爲仲父孔子曰百官總巳聽於冢宰近則高帝優相國之禮大宗假宰輔之權及亡新王莽遭漢中衰專操國柄以偸天下況已自喩不信羣臣奪公輔之任損宰相之威以刺擧爲明徼訏爲直至乃陪僕吿其君長子弟變其父兄罔密法峻大臣無所措手足然不能禁董忠之謀身爲世戮故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭不聞其崇刺擧務督察也方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜循文武之聖典襲祖宗之遺德勞心下士屈節待賢誠不宜使有伺察公輔之名帝從之桓榮字春卿沛郡人也以明經入授太子每朝會輙令榮於公卿前敷奏經書帝稱善曰得卿幾晩建武二十八年大會百官詔問誰善可傅太子者羣臣承望上意皆言太子舅執金吾陰識可博士張佚正色曰今陛下立太子爲陰氏乎爲天下乎卽爲陰氏則陰侯可爲天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎卽拜佚爲太子太傅而以榮爲少傅賜以輜車乘馬第五倫字伯魚京兆人也擧孝廉帝問以政事大悅與語至夕帝謂倫曰聞卿爲吏篣婦公不過從兄飯寧有之耶倫對曰臣三娶妻皆無父母少遭飢亂實不敢妄過人飡帝大笑拜會稽太守會稽俗多淫祀好卜筮人常以牛祭神百姓財產以之困匱其有自食牛肉而不以薦祠者發病且死先爲牛鳴前後郡將莫敢禁倫到官移書屬縣曉吿百姓其巫祝有依託鬼神詐怖愚民皆案驗之有妄屠牛者吏輙行罰民初恐懼或祝詛妄言倫案之愈急後遂斷絕百姓以安肅宗初爲司空及馬防爲車騎將軍當出征西羌倫上疏曰臣愚以爲貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纖介難爲意愛也倫雖峭直然常疾俗吏苛刻及爲三公値帝長者屢有善政乃上疏襃稱盛美因以勸成風德曰陛下卽位躬天然之德體晏晏之姿以寛弘臨下出入四年前歲誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書每下寛和而政急不解務存節儉而奢侈不止者咎在俗弊羣下不稱故也世祖承王莽之餘頗以嚴猛爲治後世因之遂成風化郡國所擧類多辨職俗吏殊未有寛博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿臨民宰邑專念掠殺務爲嚴苦吏民愁怨莫不疾之而今之議者反以爲能違天心失經義誠不可不愼也非徒應坐豫協亦當宜譴擧者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不行以身敎者從以言敎者訟夫陰陽和歲乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可伹報歸田里不宜過加喜怒以明在寛也倫奉公盡節言事無所依違或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選擧心不能忘而亦終不用也吾兄子常病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈謂無私乎鍾離意字子阿會稽人也顯宗卽位徵爲尚書時交阯太守坐藏千金徵還伏法以資物簿入太司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參迴車於勝母之閭惡其名也此藏穢之寶誠不敢拜帝嗟歎曰淸乎尚書之言乃更以庫錢三十萬賜意轉爲尚書僕射車駕數幸廣成苑意常當車陳諫般樂遊田之事天子卽時還宮永平三年夏旱而大起北宮意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂無大潤豈政有未得應天心者耶昔成湯遭旱以六事自責曰政不節耶使民疾耶宮室榮耶女謁盛耶苞苴行耶讒夫昌耶竊見北宮大作民失農時此所謂宮室榮也自古非苦宮室小狹伹患民不安寧宜且罷止以應天心帝䇿詔報曰湯引六事咎在一人其冠履勿謝今又勅大匠止作諸宮減省不急庶消灾譴詔因謝公卿百僚遂應時澍雨焉時詔賜降胡子縑尚書案事誤以十爲百帝見簿大怒召郞將笞之意因入叩頭曰過誤之失常人所容若以懈慢爲愆則臣位大罪重郞位小罪輕咎皆在臣臣當先坐乃解衣就格帝意解使復冠而貰郞帝性褊察好以耳目隱發爲明故公卿大臣數被詆毀近臣尚書以下至見提拽常以事怒郞藥崧以杖撞之崧走入牀下帝怒甚疾言曰郞出郞出崧曰天子穆穆諸侯煌煌未聞人君自起撞郞帝乃赦之朝廷莫不悚慄爭爲嚴切以避誅責唯意獨敢諫爭數封還詔書臣下過失輙救解之帝雖不能用然知其至誠亦以此故不得久留出爲魯相後德陽殿成百官大會帝思意言謂公卿曰鍾離尚書若在此殿不立意卒遺言上書陳升平之世難以急治宜少寛假帝感傷其意下詔嗟歎賜錢二十萬宋均字叔庠南陽人也遷九江太守郡多虎暴數爲民患常募設檻穽而猶多傷害均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今爲人患咎在殘吏而勞勤張捕非憂䘏之本也其務退姧貪思進忠善可一去檻穽除削課制其後傳言虎相與東游渡江中元元年山陽楚沛多蝗其飛至九江界者輙東西散去由是名稱遠近浚遒縣有唐后二山民共祠之衆巫遂取百姓男女以爲山嫗歲歲改易旣而不敢嫁娶前後守令莫敢禁斷均乃下書曰自今以後爲山娶者皆娶巫家勿擾良人於是遂絕徵拜尚書令嘗刪翦疑事帝以爲有姧大怒收郞卽縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志也小黃門在傍入具以聞帝善其不撓卽令貰郞遷抣司隷校尉寒朗字伯奇魯國人也守侍御史與三府掾屬共考案楚獄顏忠王平等辭連及隧鄕侯耿建朗陵侯臧信護澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其冤試以建等物色獨問忠平而二人錯忤不能對朗知其詐乃上言建等無姧專爲忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等卽如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰卽如是四侯無事何不早奏而久繫至今耶朗對曰臣雖考之無事然恐海內别有發其姧者故未敢時上帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多冤無敢忤陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄錄囚徒理出千餘人論曰左丘明有言仁人之言其利博哉晏子一言齊侯省刑若鍾離意之就格請過寒朗之廷爭冤獄篤矣乎仁者之情也東平王蒼顯宗同母弟也少好經書雅有智思顯宗甚愛重之及卽位拜驃騎將軍位在三公上在朝數載多所隆益而自以至親輔政聲望日重意不自安數上疏乞上印綬退就藩國詔不聽其後數陳乞辭甚懇切乃許還國而不聽上將軍印綬加賜錢五千萬布十萬匹永平十一年蒼與諸王朝京師月餘還國帝臨送歸宮悽然懷思乃遣使手詔吿諸國中傳曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及採菽以增歎息日者問東平王處家何等最樂王言爲善最樂其言甚大副是腰腹矣肅宗卽位尊重恩禮踰於前世諸王莫與爲比建初元年地震蒼上便宜後帝欲爲原陵顯節陵起縣邑蒼聞之遽上疏諫帝從而止自是朝廷毎有疑政輙驛使諮問蒼悉心以對皆見納用帝饗衛士於南宮因從皇太后周行掖庭池閣乃閱陰太后舊時器服愴然動容乃命留五時衣各一襲及常所御衣餘悉分布諸王主及子孫在京師者特賜蒼及琅耶王京書曰歲月騖過山陵浸遠孤心悽愴如何如何間饗衛士於南宮因閱視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假䯻帛巾各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製願王寶精神加供養苦言至戒望之如渴建初六年冬請朝明年正月帝許之後有司奏遣諸王歸國帝特留蒼八月飮酎畢有司復奏遣乃許之手詔賜蒼曰骨肉天性誠不以遠近爲親疎然數見顏色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言於是車駕祖送流涕而訣蒼薨後帝東廵守幸東平宮追感念蒼謂其諸子曰思其人至其鄕其處在其人亡因泣下沾襟遂幸蒼陵祠以大牢親拜祠坐哭泣盡哀賜御劍於陵前而去朱暉字文季南陽人也爲尚書僕射是時穀貴縣官經用不足朝廷憂之尚書張林上言穀所以貴由錢賤故也可盡封錢一取布帛爲租以通天下之用又鹽食之急者雖貴民不得不須官可自鬻又宜因交趾益州上計吏往來市珍寶收採其利武帝時所謂均輸者也帝然之有詔施行暉獨奏曰王制天子不言有無諸侯不言多少食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛爲租則吏多姧盜誠非明主所宜行也帝卒以林等言爲然得暉重議因發怒切責諸尚書暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱疾其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順㫖雷同負臣子之義今耳目無所聞見伏待死命遂閉口不言諸尚書不知所爲乃共劾奏暉帝意解寢其事袁安字邵公汝南人也爲司徒時和帝幼弱太后臨朝安以天子幼弱外戚擅權每朝會進見及與公卿言國家事未嘗不噫鳴流涕自天子及大臣皆倚賴之章和四年薨朝廷痛惜焉後數月竇氏敗帝始親萬機追思前議者邪正之節乃除安子賞爲郞郭躬字仲孫頴川人也明法律有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之謬於事爲誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天刑不可以委曲生意帝曰善遷躬廷尉正陳寵字昭公沛國人也章帝初爲尚書是時承永平故事吏治尚嚴切尚書決事率近於重寵乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭不濫陛下卽位數詔羣僚弘崇晏晏而有司執事猶尚深刻治獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫爲政猶張琴瑟大弦急者小弦絕故子貢非臧孫之猛法而美鄭喬之仁政詩云不剛不柔布政優優方今聖德充塞假于上下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生帝敬納寵言每事務於寛厚其後遂詔有司絕諸慘酷之科解妖惡之禁除文致之請讞五十餘事定著于令是後民俗和平屢有嘉瑞寵子忠字伯始擢拜尚書安帝始親朝事連有灾異詔擧有道公卿百僚各上封事忠以詔書旣開諫爭慮言事者必多激切或致不能容乃上疏豫通廣帝意曰臣聞仁君廣山藪之大納切直之謀忠臣盡謇諤之節不畏逆耳之害是以高祖舍周昌桀紂之譬孝文嘉爰盎人豕之譏世宗納東方朔宣室之正元帝容薛廣德自刎之切昔者晉平公問於叔向曰國家之患孰爲大對曰大臣重祿不極諫小臣畏罪不敢言下情不上通此患之大者今明詔崇高宗之德推宋景之誠引咎克躬諮訪羣吏言事者見杜根成翊世等新蒙表錄顯列二臺必承風響應爭爲切直若嘉謀異䇿宜輙納用如其管穴妄有譏刺雖苦口逆耳不得事實且優游寛容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路楊終字子山蜀郡人徵詣蘭臺拜校書郞建初元年大旱穀貴終以爲廣陵楚淮陽濟南之獄徙者萬數又遠屯絕域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違忤天心一人有罪延及三族高祖平亂約法三章太宗至仁除去收孥萬姓廓然蒙被更生澤及昆蟲功垂萬世陛下聖明德被四表今以比年久旱灾疫未息躬自菲薄廣訪得失三代之隆無以加焉臣竊案春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠治冤濫家屬徙邊加以北征匈奴西開三十六國又遠屯伊吾樓蘭車師戊巳人懷土思怨結邊域昔殷民近遷洛邑且猶怨望何況去中土之肥饒寄不毛之荒極乎且南方暑濕障毒互生愁困之民足以感動天地移變陰陽矣惟陛下留念省察以濟元元孝元棄珠崖之郡光武絕西域之國不以介鱗易我衣裳今伊吾之役樓蘭之屯久而不還非天意也帝從之聽還徙者悉罷邊屯龎參字仲達河南人也順帝以爲大尉是時三公之中參名忠直數爲左右所陷以所擧用忤帝㫖司隷承風案之時會茂才孝廉參以被疾稱疾不得會上計掾廣漢叚恭因會上疏曰伏見道路行人農夫織婦皆曰太尉龎參竭忠盡節徒以直道不能曲心孤立羣邪之間自處中傷之地臣猶冀在陛下之世當蒙安全而復以讒佞傷毀忠正此天地之大禁人主之至誡昔白起賜死諸侯酌酒相賀季子來歸魯人喜其紓難夫國以賢治君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔卽遣小黃門視參疾太醫致羊酒復爲太尉崔駰字亭伯涿郡人也竇太后臨朝竇憲以重戚出內詔命駰獻書戒之曰生而富者驕生而貴者傲生富貴而能不驕傲者未之有也今寵祿初隆百僚觀行當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永終譽弘申伯之美致周邵之事乎語曰不患無位患所以立昔馮野王以外戚居位稱爲賢臣近陰衛尉尅己復禮終受多福郯氏之宗非不尊也陽侯之族非不盛也重侯累將建天樞執斗柄其所以獲譏於時垂愆於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑑于有殷可不愼哉夫謙德之光周易所美滿溢之位道家之所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸机杖刻諸槃杅矜矜業業無殆無荒如此則百福是荷慶流無窮矣及憲爲車騎將軍辟駰爲掾憲擅權驕恣駰數諫之及出擊匈奴道路愈多不法駰爲主簿前後奏記數十指切長短憲不能容稍疎之因察駰高第出爲長岑長駰自以遠去不得意遂不之官而歸卒于家羣書治要卷第二十二

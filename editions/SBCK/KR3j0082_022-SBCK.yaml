  text: 羣書治要卷第二十五
  hash: sha256:825af50e8d6b4e8c9728200bf768a7efe406eacc7292173f9ce742c58b6c7b48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_022-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰魏志上紀太祖武皇帝沛國人姓曹諱操字孟德建安四年袁紹將攻許公進軍黎陽紹衆大潰公收紹書中得許下及軍中人書皆焚之魏氏春秋曰公云當紹之強􅀌猶不能自保而況衆人乎七年令曰吾起義兵爲天下除暴亂舊土人民死喪略盡國中終日行不見所識使吾悽愴傷懷其擧義兵巳來將士絕無後者求其親戚以後之授土田官給耕牛置學師敎之爲存者立廟使視其先人魂而有靈吾百年之後何恨哉十二年令曰吾起義兵誅暴亂於今十九年所征必剋豈吾功哉乃賢士大夫之力也天下雖未悉定吾當要與賢士大夫共定之而專饗其勞吾何以安焉其促定功行封於是大封功臣二十餘人皆爲列侯其餘各以次受封及復死事之􅀌輕重各有差十九年安定大守母丘興將之官公戒之曰􅆧胡欲與中國通自當遣人來愼勿遣人往也善人難得必將敎􅆧胡妄有所請求因欲以自利不從便爲失異俗意從之則無益事興至遣校尉范陵至􅆧中陵果敎􅆧使自請爲屬國都尉公曰吾預知當爾非聖人也伹更事多耳二十五年魏書曰大祖自統御海內芟夷羣醜御軍三十餘年手不舍書晝則講軍策夜則思經傳雅性節儉不好華容後宮衣不錦綉侍御履不二采帷帳屏風壞則補綴茵蓐取温無有緣飾攻城㧞邑得靡麗之物則悉以賜有功􅈴勞宜賞不吝千金無功望施分毫不與四方獻御與羣下共之也文皇帝諱丕字子桓武帝太子也黃初二年詔以議郞孔羡爲宗聖侯奉孔子祀令魯郡脩起舊廟置百戶吏卒以守衛之日有蝕之有司奏免太尉詔曰灾異之作以譴元首而歸過股肱豈禹湯罪巳之義乎其令百官各䖍厥職後有天地之􅌌勿復劾三公三年表首陽山東爲壽陵作終制曰禮國君卽位爲椑存不忌亡也封樹之制非上古也吾無取焉壽陵因山爲體無爲封樹無立寢殿造園邑通神道夫葬者藏也欲人之不得見也骨無痛痒之知冡非棲神之宅禮不墓祭欲存亡之不黷也爲棺槨足以朽骨衣衾足以朽肉而巳故吾營此丘墟不食之地欲使易代之後不知其處無施葦炭無藏金銀銅鐵一以瓦器合古塗車芻靈之義飯含無以珠玉無施珠襦玉柙諸愚俗所爲也季孫以璵璠歛孔子譬之暴骸中原宋公厚葬君子謂華元樂呂不臣漢文帝之不發覇陵無求也光武之掘原陵封樹也覇陵之完功在釋之原陵之掘罪在明帝是釋之忠以利君明帝愛以害親也忠臣孝子宜思仲尼丘明釋之之言鑒華元樂呂明帝之戒存於所以安君定親使魂靈萬載無危斯則賢聖之忠孝矣自古及今未有不亡之國是無不掘之墓喪亂以來漢氏諸陵無不發掘至乃燒取玉柙金縷骸骨并盡豈不重痛哉其皇后及貴人以下不隨王之國者有終没皆葬澗西魂而有靈無不之也一澗之間不足爲遠若違詔妄有所變改造施吾爲戮死地下死而重死臣子爲蔑死君父不忠不孝其以此詔藏之宗廟副在尚書秘書三府五年詔曰先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宮殿之內戶牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論明皇帝諱叡字元仲文帝太子也靑龍元年祀故大將軍夏侯惇等於太祖廟庭魏書載詔曰昔先王之禮於功臣存則顯其爵祿没則祭於大蒸故漢氏功臣祠於廟庭大魏元功之臣功􅈴優著終始休明者其皆依禮祀之於是以惇等配厚也三年魏略曰是年起大極諸殿築總章觀又於芳林園中起陂池楫櫂越歌又於列殿之北立八坊諸才人以次序處其中秩名擬百官之數使博士馬均作水轉百戲魚龍蔓延備如漢西京之制築閶闔諸門闕外罘罳太子舍人張茂以吳蜀數動諸將出征而帝盛興宮室留意於翫飾賜與無度帑藏空竭又錄奪士女前已嫁爲吏民妻者還以配士旣聽以生口自贖又簡選其有姿色者內之掖庭乃上書諫曰臣伏見詔書諸士女嫁非士者一切錄奪以配戰士斯誠權時之宜然非大化之善者也臣請論之陛下天之子百姓吏民亦陛下之子也今奪彼以與此亦無以異於奪兄之妻妻弟也於父母之恩偏矣又詔書聽得以生口代故富者則傾家盡產貧者擧假貸貰貴買生口以贖其妻縣官以配士爲名而實內之掖庭其醜惡者乃出與士得婦者未必有歡心而失妻者必有憂色或窮或愁皆不得志夫君有天下而不得萬姓之歡心者尠不危殆且軍師在外數十萬人一日之費非徒千金擧天下之賦以奉此役猶將不給況復有宮庭非員無䤸之女椒房母后之家賞賜橫興其費半軍昔漢武帝好神仙信方士掘地爲海封土爲山賴此時天下爲一莫敢與爭者耳自衰亂以來四五十載馬不舍鞍士不釋甲每一交戰血流丹野瘡痍號痛之聲于今未巳猶強冦在疆圖危魏室陛下當兢兢業業念崇節約思所以安天下者而乃奢靡是務中尚方純作玩弄之物炫燿後園建承露之盤斯誠快耳目之觀然亦足以騁冦讎之心矣惜乎舍堯舜之節儉而爲漢武之侈事臣竊爲陛下不取也願陛下霈然下詔事無益而有損者悉除去之以所除無益之費厚賜將士父母妻子之饑寒者問民所疾而除其所惡實倉廩繕甲兵恪恭以臨天下如是吳賊面縛蜀虜輿櫬不待誅而自服太平之路可計日而待也臣年五十常恐至死無以報國是以投軀没命冐昧以聞唯陛下裁察書通上顧左右曰張茂恃鄕里故也以事付散騎而巳景初元年魏略曰是歲徙長安諸鐘􅒶駱駝銅人承露盤盤折銅人重不可致留于霸城大發銅鑄作銅人二號曰翁仲列坐於司馬門外又鑄黃龍鳳皇各一置內殿前起土山於芳林園使公卿羣僚􅀒土成山樹松竹雜木善草於其上捕山禽雜獸置其中魏略載董尋上書曰臣聞古之􅀡士盡言於國不避死亡故周昌比高祖於桀紂劉輔譬趙后於人婢天生忠􅀡雖白刄沸湯往而不顧者誠爲時主愛惜天下也若今之宮室狹小當廣大之猶宜隨時不妨農務況乃作無益之物黃龍鳳皇九龍承露盤土山淵池其功三倍於殿舍三公九卿侍中尚書天下至德皆知非道而不敢言者以陛下春秋方剛心畏雷霆今陛下旣尊群臣顯以冠冕被以文綉載以華輿所以異於小人而使穿方擧土面目垢黑沾體塗足衣冠了鳥毀國之光以崇無益甚非謂也孔子曰君使臣以禮臣事君以忠無禮無忠國何以立故有君不君臣不臣上下不通心懷鬱結使陰陽不和灾害屢降凶惡之徒因間而起誰當爲陛下盡言事者乎又誰當于萬乘以死爲戲乎臣知言出必死而臣自比於牛之一毛生旣無益死亦何損秉筆流涕心與世辭旣通帝曰董尋不畏死耶主者奏收尋有詔勿問之也齊王芳字蘭卿正始八年尚書何晏奏曰善爲國者必先治其身治其身者愼其所習所習正則其身正其身正則不令而行所習不正則雖令不從是故爲人君者所與遊必擇正人所觀覽必察正􅁚放鄭聲而弗聽遠佞人而弗近然後邪心不生而正道可弘也季末闇主不知損益斥遠君子引近小人忠良疏遠便辟褻狎亂生近暱譬之社鼠考其昏明所積以然故聖賢諄諄以爲至慮舜戒禹曰鄰哉鄰哉言愼所近也周公戒成王曰其朋其朋言愼所與也詩云一人有慶兆民賴之自今以後可御幸式乾殿及遊豫後園皆大臣侍從因從容戲宴兼省文書詢謀政事講論經籍爲萬世法袁紹字本初汝南人也領冀州牧轉爲大將軍出長子譚爲靑州沮授諫紹必爲禍始紹不聽九州春秋載授諫辭曰世稱一兔走萬人逐之一人􅀗之貪者悉止分定故也且年均以賢德均則卜古之制也願上惟先代成敗之戒下思逐兔分定之義紹曰􅀌欲令四兒各據一州以觀其能授出曰禍其始此乎紹進軍黎陽太祖擊破之初紹之南也田豐說紹曰曹公善用兵變化無方衆雖少未可輕也不如以久持之將軍據山河之固擁四州之衆外結英雄內修農戰然後簡其精銳分爲奇兵乘虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命民不得安業我未勞而彼巳困不及二年可坐克也今釋廟勝之策而決成敗於一戰若不如志悔無及也紹不從豐懇諫紹怒以爲沮衆械繫之紹軍旣敗或謂豐曰君心見重豐曰若軍有利吾必全今軍敗吾其死矣紹還曰吾不用田豐言果爲所咲遂殺之后妃傳易稱男正位于外女正位于內男女正天地之大義也古先哲王莫不明后妃之制順天地之德故二妃嬪嬀虞道克隆任姒配姬周室用熙廢興存亡恆此之由春秋說云天子十二女諸侯九女考之情理不易之典也而末世奢縱肆其侈欲至使男女怨曠感動和氣唯色是崇不本淑懿故風敎陵遲而大綱毁泯豈不惜哉嗚呼有國有家者其可以永鑒矣武宣卞皇后琅耶人文帝母也黃初中文帝欲追封大后父母尚書陳羣奏曰陛下應運受命創業革制當永爲後式案典籍之文無婦人裂土因夫爵秦違古制漢氏因之非先王之令典也帝曰此議是也其勿施行以作著詔下藏之臺閣永爲後式文德郭皇后廣宗人也黃初三年將登后位中郞棧潛上疏曰在昔帝王之有天下不唯外輔亦有內助治亂所由盛衰從之故西陵配黃英娥降嬀並以賢明流芳上世桀奔南巢禍階末喜紂以炮烙怡悅姐巳是以聖哲愼立元妃必取先代世族之家釋其令淑以統六宮䖍奉宗廟陰敎聿修易曰家道正而天下定由內及外先王之令典也春秋書宗人釁夏云無以妾爲夫人之禮齊桓誓命于葵丘亦曰無以妾爲妻今後宮嬖􅃂常亞乘輿若因愛登后使賤人暴貴臣恐後世下陵上替開張非度亂自上起也文帝不從傳夏侯尚字伯仁子玄字太初少知名累遷散騎常侍中護軍司馬宣王問以時事玄議以爲夫官才用人國之柄也故銓衡專於臺閣上之分也孝行存乎閭巷優劣任之鄕人下之叙也夫欲淸敎審選在明其分叙不使相渉而巳何者上過其分則恐所由之不本而干勢馳騖之路開下踰其叙則恐天爵之外通而機權之門多矣夫天爵下通是庶人議柄也機權多門是紛亂之源也自州郡中正品度官才之來有年載矣緬緬紛紛未聞整齊豈非分叙參錯各失其要之所由哉若令中正伹考行倫輩輩當行均斯可官矣何者夫孝行著於家門豈不忠恪於在官乎仁恕稱於九族豈不達於爲政乎義斷行於鄕黨豈不堪於事任乎三者之類取於中正雖不處其官名斯任官可知矣行有大小比有高下則所任之流亦煥然必明矣奚必使中正干銓衡之機於下而執機柄者有所委仗於上上下交侵以生紛錯哉且臺閣臨下考功校否衆職之屬各有官長且夕相考莫究於此閭閻之議以意裁處而使匠宰失位衆人驅駭欲風俗淸靜其可得乎天臺縣遠衆所絕意所得至者更在側近孰不脩飾以要所求所求有路則脩巳家門者不如自達於鄕黨矣自達於鄕黨者不如自求於州􅀖矣苟開之有路而患其飾眞離本雖復嚴責中正督以刑罰猶無益也豈若使各帥其分官長則各以其屬能否獻之臺閣臺閣則據官長能否之第參以鄕閭德行之次擬其倫比勿使偏頗中正則唯考其行迹别其高下審定輩類勿使升降臺閣總之官長所第中正輩擬比隨次率而用之如其不稱責􅀒在外然則內外相參得失有所互相形檢孰能相飾斯則人心定而事理得庶可以靜風俗而審官才矣荀彧字文若潁川人也爲侍中尚書令彧别傳曰彧德行周備非正道不用心名重天下莫不以爲儀表海內英俊咸宗焉然前後所擧佐命大才則荀攸鍾錄陳羣司馬宣王及引致當世知名郗慮華歆王朗荀悅杜襲辛毘趙儼之儔終爲卿相以十數人取士不以一揆戲志才郭嘉等有􅀒俗之譏杜畿簡傲少文皆以智策擧之終各顯名荀攸後爲魏尚書令推賢進士太祖曰二荀令之論人也久而益信吾没世不忘也荀攸字公達彧從子也太祖以爲軍師每稱曰公達外愚內智外怯內勇外弱內強不伐善不施勞智可及愚不可及雖顏子寗武不能過也文帝在東宮太祖謂曰荀公達人之師表也汝當盡禮敬之傅子曰太祖稱荀令君之進善不進不休荀軍帥之去惡不去不止也賈詡字文和武威人也爲太中太夫是時文帝爲五官將而臨菑侯植才名方盛各有黨與有奪宗之議太祖甞問詡詡嘿然不對太祖曰與卿言而不答何也詡曰屬適有所思故不卽對耳太祖曰何思詡曰思袁本初劉景升父子太祖大笑於是太子遂定文帝卽位以詡爲大尉魏略曰文帝得詡之對太祖故卽位首登上司荀勗别傳曰晉司徒闕武帝問其人於勗勗答曰三公具瞻所歸不可用非其人昔文帝用賈詡爲三公孫權笑之袁渙字曜卿陳郡人也劉備之爲豫州擧渙茂才後爲呂布所拘留布初與劉備和親後離􅂩布欲使渙作書罵辱備渙不可再三強之不許布大怒以兵脇渙曰爲之則生不爲則死渙顏色不變笑而應之曰渙聞唯德可以辱人不聞以罵使彼固君子耶且不耻將軍之言彼誠小人耶將復將軍之意則辱在此不在於彼且渙他日之事劉將軍猶今日之事將軍也如一且去此復罵將軍可乎布慙而止王脩字叔治北海人也年七歲喪母母以社日亡來歲隣里社脩感念母哀甚鄰里聞之爲之罷社袁譚在青州辟脩爲治中從事譚欲攻弟尚脩諫曰夫兄弟者左右手也譬人將鬭而斷其右手而曰我必勝若是者可乎夫弃兄弟而不親天下其孰親之屬有讒人固將交鬭其間以求一朝之利願明使君塞耳而勿聽也若斬佞臣數人復相親睦以禦四方可以橫行天下譚不聽太祖遂引軍攻譚于南皮脩聞譚巳死號哭曰無君焉歸遂詣太祖乞收譚屍太祖不應脩復曰受袁氏厚恩若得收歛譚屍然後就戮無所恨太祖嘉其義聽之太祖破南皮閱脩家穀不滿十斛有書數百卷太祖歎曰士不妄有名乃辟爲司空掾魏略曰郭憲字幼簡西平人也韓約失衆依憲衆人多欲取約以徼功而憲皆責怒之言人窮來歸我云何欲危之後約病死而陽逵等就斬約頭欲條疏憲名憲言我尚不􅃘生圖之豈􅃘取死人以要功乎逵等乃止約首到太祖宿聞憲名及視疏怪不在中以問逵等逵具以情對太祖歎其志義乃并表列賜爵關內侯邴原字根矩北海朱虛人也太祖辟司空掾原女早亡時太祖愛子倉舒亦没太祖欲求合葬原辭曰合葬非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以爲哉太祖乃止原别傳曰魏太子爲五官中郞將天下向慕賔客如雲而原獨守道持順自非公事不妄擧動太祖微使人從容問之原曰吾聞國危不事冢宰君老不奉世子此典制也崔琰字季珪淸河人也太祖領冀州牧辟琰爲别駕從事太祖征并州留琰傅文帝於鄴世子仍出田獵變易服乘志在驅逐琰書諫曰蓋聞盤于遊田書之所戒魯隱觀魚春秋譏之此周孔之格言二經之明義也今􅀖國殄瘁惠康未洽士女企踵所思者德況公親御戎馬上下勞慘世子宜遵大路愼以行正思經國之高略深惟儲副以身爲寶而猥襲虞旅之賤服忽馳騖而陵嶮志雉兔之小娛忘社稷之爲重斯誠有識所以惻心也唯世子燔翳捐褶以塞衆望不令老臣􅀗罪於天世子報曰昨奉嘉命惠示雅敎欲使燔翳捐褶翳巳壞矣褶亦去焉後有此比􅀩復誨諸魏國初建拜尚書時未立太子臨菑侯植有才而愛太祖狐疑以函令密訪於外惟琰露板答曰蓋聞春秋之義立子以長加五官將仁孝聰明宜承正統琰以死守之植琰之兄女壻也太祖貴其公亮喟然歎息遷中尉琰甚有威重朝士瞻望而太祖亦敬憚焉先賢行狀曰琰淸忠高亮雅識經遠推方􅀡道正色於朝魏初載委銓衡總齊淸議十有餘年文武羣才多所明㧞朝廷歸高天下稱平矣琰薦揚訓太祖爲魏王訓發表襃述盛德時人謂琰爲失所擧琰與訓書曰省表事佳耳時乎時乎會當有變時有白琰此書傲世怨謗者太祖怒罰琰爲徒􅀠使人視之辭色無撓太祖令曰琰雖見刑而通賔客門若市人對賔客虯鬚􅀡視若有所瞋遂賜琰死爲世所痛惜至今冤之毛玠字孝先陳留人也爲東曹掾與崔琰並典選擧其所用皆淸正之士雖於時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以廉節自厲雖貴􅃂之臣輿服不敢過度太祖歎曰用人如此使天下人自治吾復何爲哉文帝爲五官將親自詣玠屬所親眷玠答曰老臣以能守職幸得免戾今所說人非遷次是以不敢奉命魏國初建爲尚書僕射復典選擧先賢行狀曰玠雅亮公正在官淸恪其典選擧㧞貞實斥華僞進遜行抑黨與四海翕然莫不厲行貴者無穢欲之累賤者絕姦貨之求吏㓗於上俗移于下民到于今稱之崔琰旣死玠內不悅後有白玠者出見黥面反者妻子没爲官奴婢玠言曰使天不雨者蓋由此也太祖大怒收玠付獄大理鍾繇詰玠玠辭曰臣聞蕭生縊死因於石顯賈子放外讒在絳灌白起賜劔於杜郵晁錯致誅於東市伍員絕命於吳都斯數子者或妬其前或害其後臣垂齠執簡累勤取官職在機近人事所竄屬臣以私無勢不絕語臣以冤無細不理靑蠅橫生爲臣作謗謗臣之人勢不在他昔王叔陳生爭正王廷宣子平理命擧其契是非有宜曲􅀡有所春秋嘉焉是以書之臣不言此無有時人說臣此言必有徵要乞􅀩宣子之辨而求王叔之對若臣以曲聞卽刑之日方之安駟之贈賜劔之來比之重賞之惠謹以狀對時桓楷和洽進言救玠玠遂免黜卒于家孫盛曰魏武於是失制刑矣易稱明折庶獄傳有擧􅀡錯枉庶獄明則國無冤民枉􅀡當則民無不服未有徵靑蠅之浮聲信浸潤之譖訴可以允􅁵四海唯淸緝熈者也昔漢高獄蕭何出復相之玠之一貴永見擯放二主度量豈不殊哉徐奕字季才東莞人也太祖辟東曹屬丁儀等見􅃂於時並害之而奕終不爲動傅子曰武皇帝至明也崔琰徐奕一時淸賢皆以忠信顯於魏朝丁儀間之徐奕失位而崔琰被誅鮑勛字叔業泰山人也爲中庶子出爲魏郡西部都尉太子郭夫人弟斷盜官布法應弃市太子數手書爲之請勛不敢擅縱具列上勛前在東宮守正不撓太子固不能悅及重此事恚望滋甚延康元年勛兼侍中文帝受禪勛每陳今之所急唯在軍農寛惠百姓臺榭苑囿宜以爲後帝將出遊獵勛停車上疏曰臣聞五帝三王靡不明本立敎以孝治天下陛下仁聖惻隱有同古烈臣冀當繼蹤前代令萬世可則也如何在諒闇中脩馳騁之事乎臣冒死以聞唯陛下察焉帝手毀其表而競行獵中道頓息問侍臣曰獵之爲樂何如八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理隆治致化萬􅀖咸乂故移風易俗莫善於樂況獵暴華蓋於原野傷生育之至理櫛風沐雨不以時􅂩哉昔魯隱觀漁於棠春秋譏之雖陛下以爲務愚臣所不願也因奏劉曄佞諛不忠阿順陛下過戲之言昔梁丘據取媚於遄臺曄之謂也請有司議罪以淸皇朝帝怒作色還卽出勛爲右中郞將黃初四年尚書令陳羣僕射司馬宣王竝擧勛爲宮正帝不得已而用之百寮嚴憚罔不肅然六年帝欲征吳羣臣大議勛面諫以爲不可帝益忿之左遷勛爲治書執法帝從壽春還屯陳留郡界太守孫邕見出過勛時營壘未成伹立標埒邕邪行不從正道軍營令史劉曜欲推之勛以塹壘未成解止不擧大軍還洛陽曜有罪勛奏絀遣而曜密表勛私解邕事詔曰勛指鹿作馬收付廷尉廷尉法議正刑五歲三官駮依律罰金二斤帝大怒曰勛無活分而汝等敢縱之收三官以下付刺姧當令十鼠同穴大尉鐘繇司徒華歆等並表勛父信有功於太祖求請勛罪帝不許遂誅勛勛內行旣修廉而能施死之日家無餘財莫不爲勛歎恨王朗字景興東海人也文帝卽王位遷御史大夫上疏勸育民省刑曰易稱勅法書著祥刑愼法獄之謂也昔曹相國以獄市爲寄路温舒疾治獄之吏夫治獄者得其情則無冤死之囚丁壯者得盡地力則無飢饉之民窮老者得仰食倉廩則無餧餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不育之累壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寬繇以樂其業威罰以抑其強恩仁以濟其弱賑貸以贍其乏十年之後旣筓者必盈巷二十年之後勝兵者必滿野矣文帝踐祚改爲司空時帝頗出遊獵或昏夜還宮朗上疏曰夫帝王之居外則飾周衛內則重禁門將行則設兵而後登輿淸道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒愼􅂷法敎也近日車駕出臨捕虎日昃而行及昏而反違警蹕之常法非萬乘之至愼也帝報曰覽表雖魏絳稱虞箴以諷晉悼相如陳猛獸以戒漢武未足以喩方今二冦未殄將帥遠征故時入原野以習戎備至於夜還之戒輙詔有司施行子肅字子雍拜散騎常侍上疏陳政本曰夫除無事之位損不急之祿止浮食之費并從容之官使官必有職職任其事事必受祿祿代其耕乃往古之常式當今之所宜也官寡而祿厚則公家之費鮮進仕之志勸各展才力莫相倚杖敷奏以言明試以功能之與否簡在帝心矣景初間宮室盛興民失農業期信不敦刑殺倉卒肅上疏曰大魏承百王之極生民無幾干戈未戢誠宜息民而惠之以安靜遐邇之時也夫務蓄積而息疲民在於省傜役而勤稼穡今宮室未就功業未訖運漕調發轉相供奉是以丁夫疲於力作農者離於南畆今見作者三四萬人九龍可以安聖體其內足以列六宮顯陽之殿又向將畢惟太極巳前功夫尚大方向盛寒疾疢或作誠願陛下發德音下明詔深愍役夫之疲勞厚矜兆民之不贍取常食廩之士非急要者之用選其丁壯擇留萬人使一朞而更之咸知息代有日則莫不悅以卽事勞而不怨矣夫信之於民國家大寶也仲尼曰自古皆有死民非信不立夫區區之晉國微微之重耳欲用其民先示以信用能一戰而覇于今見稱前車駕當幸洛陽發民爲營有司命以營成而罷旣成又利其功力不以時遣有司徒營其目前之利而不顧經國之體臣以爲自今以後儻復使民宜明其令使必如期若有事以次寧復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂爲倉卒故願陛下下之於吏而暴其罪鈞其死也無使汗于官掖而爲遠近所疑且人命至重難生易殺氣絕而不續者也是以聖王重之孟軻稱殺一無辜以取天下仁者不爲也漢時有犯蹕驚乘輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則巳今下廷尉廷尉天下之平也一傾之天下用法皆爲輕重民安所措手足哉臣以爲大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於爲巳而輕於爲君不忠之甚也周公曰天子無戲言言猶不戲而況行之乎故釋之之言不可不察周公之戒不可不法也帝嘗問曰漢桓帝時白馬令李雲上書言帝者諦也是帝欲不諦當何得不死肅對曰伹爲言失逆順之節原其本意皆欲盡心念存補國且帝者之威過於雷霆殺一匹夫無異螻蟻寬而宥之可以示容受切言廣德宇於天下故臣以爲殺之未必爲是也程昱字仲德東郡人也孫曉字季明嘉平中爲黃門侍郞時校事放橫曉上疏曰周禮云設官分職以爲民極春秋傳曰天有十日人有十等愚不得臨賢賤不得臨貴於是並建聖哲明試以功各修厥業思不出位故欒書欲拯晉侯其子不聽死人橫於街路邴吉不問上不責非職之功下不務分外之賞吏無兼統之勢民無二事之役斯誠爲國要道治亂所由也遠覽典志近觀秦漢雖官名改易職司不同至於崇上抑下顯明分例其致一也初無校事之官干與庶政者也昔武皇帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也此覇世之權宜非帝王之正典其後漸􅀩見任轉相因仍莫正其本遂令上察宮廟下攝衆司官無局業職無分限隨意任情唯心所適法造於筆端不依科條詔獄成於門下不顧覆訊其選官屬以謹愼爲粗疏以謥詷爲賢能其治事以刻暴爲公嚴以修理爲怯弱外託天威以爲聲勢內聚羣姧以爲腹心大臣耻與分勢含􅃘而不言小人畏其鋒芒鬱結而無吿至使尹模公於目下肆其姦慝罪惡之著行路皆知纖惡之過積年不聞旣非周禮設官之意又非春秋十等之義也今外有公卿將校總統諸署內有侍中尚書綜理萬機司􅀠校尉督察京輦御史中丞董攝宮殿皆高選賢才以充其職申明科詔以督其違若此諸賢猶不足任校事小吏益不可信若此諸賢各思盡忠校事區區亦復無益若更高選國士以爲校事則是中丞司􅀠重增一官若如舊選尹模之姦今復發矣進退推筭無所用之昔桑弘羊爲漢求利卜式以爲獨烹弘羊天乃可雨若使政治得失必感天地臣恐水旱之灾未必非校事之由也曹恭公遠君子近小人國風託以爲刺衛獻公舍大臣與小臣謀定姜謂之有罪縱令校事有益於國以禮義言之尚傷大臣之心況姧囘暴露而復不罷是袞闕不補迷而不反也於是遂罷校事劉曄字子揚淮南人也爲侍中傅子曰曄事明帝大見親重帝將伐蜀朝臣內外皆曰不可曄入與帝議因曰可伐出與朝臣言因曰不可伐曄有膽智言之皆有形中領軍楊曁帝之親臣又重曄持不可伐蜀之議最堅每從內出輙過曄曄講不可伐之意後曁從駕行天淵池帝論伐蜀事曁切諫帝曰卿書生焉知兵事曁曰臣誠不足採侍中劉曄先帝謀臣常曰蜀不可伐帝曰曄與吾言蜀可伐曁曰曄可召質也詔召曄曄至帝問之曄終不言後獨見曄責帝曰伐國大謀也臣得與聞大謀常恐昧夢漏􅂥以益臣罪焉敢向人言之夫兵詭道也軍事未發不厭其密陛下顯然露之臣恐敵國巳聞之矣於是帝謝之曄出責曁曰夫釣者中大魚則縱而隨之須可制而後率則無不得也人主之威豈徒大魚而巳子誠􅀡臣然計不精思也曁亦謝之曄能應變持兩端如此或惡曄於帝曰曄不盡忠善伺上意所趣而合之陛下試言皆反意而問之若皆與所問反者是曄常與聖意合也復每問皆同者曄之情必無所復逃矣帝如言驗之果得其情從此疏焉曄遂狂出爲大鴻臚以憂死諺曰巧詐不如拙誠信矣蔣濟字子通楚國人也文帝踐祚爲散騎常侍有詔詔征南將軍夏侯尚曰卿腹心重將特當任使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟旣至帝問曰卿所聞見天下風敎何如濟對曰未有他善伹見亡國之語耳帝忿然作色而問其故濟具以答因曰夫作威作福書之明誡天子無戲言古人所愼唯陛下察之於是帝意解遣追取前詔蘇則字文師扶風人也爲金城太守文帝問則曰前破酒泉張掖西域通使燉煌獻徑寸之珠可復求市益得不對曰若陛下化洽中國德流沙漠卽不求自至求而得之不足貴也帝嘿然後從行獵槎桎㧞失鹿帝大怒踞胡床㧞刀悉收督吏將斯之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺羣吏愚臣以爲不可敢以死請帝曰卿􅀡臣也遂皆赦之然以此見憚左遷河東相杜畿字伯侯京兆人也子恕字務伯爲散騎黃門侍郞每政有得失常引綱維以正言時又大議考課之制以考內外衆官恕上疏曰書稱明試以功三考黜陟誠帝王之盛制然歷六代而考績之法不著關七聖而課試之文不􅂷臣誠以爲其法可粗依其詳難備擧故也語曰世有亂人而無亂法若使法可專任則唐虞可不須稷契之佐殷周無貴伊呂之輔矣今奏考功者陳周漢之法爲綴京房之本旨可謂明考課之要矣於以崇揖讓之風興濟濟之治臣以爲未盡善也其欲使州郡考士必由四科者皆有事効然後察擧試辟公府爲親民長吏轉以功次補郡守者或就增秩賜爵是最考課之急務也至於公卿及內職大臣亦當俱以其職考課之也古之三公坐而論道及內職大臣納言補闕無善不紀無過不擧且天下至大萬機至衆誠非一明所能徧照故君爲元首臣爲股肱明其一體相須而成也焉有大臣守職辨課可以致雍熈者哉且布衣之交猶有務信誓而蹈水火感知己而披肝膽殉聲名而立節義者所務者非特匹夫之信所感者非徒知己之惠所殉者豈聲名而巳乎諸􅀩􅃂祿受重任者不徒欲擧明主於唐虞之上而巳身亦欲厠稷契之列是以古人不患於念治之心不盡患於自任之意不足此誠人主使之然也唐虞之君委任稷契􅇪龍而責成功及其罪也殛鯀而放四凶今大臣親奉明詔給事目下其有夙夜在公恪勤特立當官不撓不阿所私危言行以處朝廷者自明主所察也若尸祿以爲高拱嘿以爲智當官苟在於免􅀒立朝不忘於容身者亦明主所察也誠使容身保位無放退之辜而盡節在公抱見疑之勢公義不修而私議成俗雖仲尼爲謀猶不能盡一才又況於世俗之人乎今之學者師商韓而上法術競以儒家爲迂闊不周此最風俗之流弊創業者之所致愼也後考課竟不行樂安廉昭以才能㧞擢頗好言事恕上疏極諫曰伏見尚書郞廉昭奏左丞曹璠以罰當關不依詔坐判問又云諸當坐者别奏尚書令陳矯自奏不敢辭罰亦不敢以處重爲恭意至懇惻臣竊爲朝廷惜之夫聖人不擇世而興不易人而治然而生必有賢智之佐者蓋進之以道帥之以禮故也古之帝王所以能輔世長民者莫不遠得百姓之歡心近盡羣臣之智力誠使今朝任職之臣皆天下之選而不能盡其力不可謂能使人也若非天下之選亦不可謂能官人也陛下憂勞萬機或親燈火而庶事不康刑禁日弛豈非股肱不稱之明効與原其所由非獨臣有不盡忠亦主有不能使也百里奚愚於虞而智於秦豫讓苟容中行而著節智伯斯則古人之明驗矣若陛下以爲今世無良才朝廷乏賢佐豈可追望稷契之遐蹤坐待來世之俊乂乎今之所謂賢者盡有大官而享厚祿矣然而奉上之節未立向公之心不壹者委任之責不專而俗多忌諱故也陛下當闡廣朝臣之心篤厲有道之節使之自同古人望與竹帛耳反使如廉昭者擾亂其間臣懼大臣遂將容身保位坐觀得失爲來世戒也昔周公戒魯侯曰無使大臣怨乎不以言賢愚明皆當世用也堯數舜之功稱去四凶不言大小有罪則去也陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從輿輦親對詔問所陳必達則羣臣之行能否皆可得而知忠能者進闇劣者退誰敢依違而不自盡以陛下之聖明親與羣臣論議政事使羣臣人得自盡人自以爲親人思所以報賢愚能否在陛下之所用也明主之用人也使能者不敢遺其力而不能者不得處非其任選擧非其人未必爲有罪也擧朝共容非其人乃爲怪耳陛下又患臺閣禁令之不密人事請屬之不絕聽伊尹作迎客出入之制選司徒更惡吏以守寺門威禁由之實未得爲禁之本也陛下自不督必行之罰以絕阿黨之原耳伊尹之制與惡吏守門非治世之具也使臣之言少􅀩察納何患於姧不削滅而養若廉昭等乎夫糺擿姧宄忠事也然而世憎小人行之者以其不顧道理而苟求容進也若陛下不復考其終始必以違衆忤世爲奉公密行白人爲盡節焉有通人大才而更不能爲此邪誠顧道理而弗爲耳使天下皆背道而趨利則人主之所最病者陛下將何樂焉胡不絕其萠乎夫先意承旨以求容美率皆天下淺薄無行義者其意務在於適人主之心而巳非欲治天下安百姓也陛下何不試變業而示之彼豈執其所守以違聖意哉夫人臣得人主之心安業也處尊顯之官榮事也食千鍾之祿厚實也人臣雖愚未有不樂此而喜于忤者也迫於道自強耳誠以爲陛下當憐而佑之少委任焉如何反錄昭等傾側之意而忽若人者乎恕論議抗􅀡皆此類也龎德字令明南安人也拜立義將軍屯樊討關羽樊下諸將以德兄在漢中頗疑之德常曰我受國恩義在効死會漢水暴溢羽乘舩攻之矢盡短兵接德謂督將成何曰吾聞良將不怯死以苟免烈士不毀節以求生今日我死日也戰益怒氣愈壯而水浸盛爲羽所得立而不跪謂曰卿兄在漢中我以卿爲將不早降何爲罵羽曰豎子何謂降也魏王帶甲百萬威振天下汝劉備庸才耳豈能敵邪我寧爲國家鬼不爲賊將也遂爲羽所殺太祖聞而悲之爲流涕封其二子爲列侯文帝卽王位乃遣使就德墓賜謚策曰昔先軫喪元王蠋絕脰殞身殉節前代美之惟侯式昭果毅蹈難成名聲溢當時義高在昔寡人愍焉謚曰壯侯又賜子會等四人爵關內侯邑各百戶閻温字伯儉天水人也以凉州别駕守上邽令馬超圍州所治冀城甚急州乃遣温密出吿急賊見執還詣超超解其縛謂曰今成敗可見足下爲􅀌城求救而執於人手義何所施若從吾言反謂城中東方無救此轉禍爲福之計也不然今爲戮矣温僞許之超乃載温詣城下温向城大呼曰大軍不過三日至勉之超怒數之温不應復謂温曰城中故人有欲與吾同者不温又不應遂切責之温曰夫事君有死無貳而卿乃欲令長者出不義之言吾豈苟生者乎超遂殺之羣書治要卷第二十五

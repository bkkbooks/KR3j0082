  text: 羣書治要卷第四十三
  hash: sha256:0e3603f834241a6f05751ae20cebe6a23cf4daed4775cbc98ad126cd62737681
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_040-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰說苑劉向君道河間獻王曰堯存心於天下加志於窮民痛萬姓之罹罪憂衆生之不遂也有一民飢則曰此我飢之也有一民寒則曰此我寒之也一民有罪則曰此我陷之也仁昭而義立德博而化廣故不賞而民勸不罰而民治先恕而後敎是堯道也河間獻王曰禹稱民無食則我不能使也功成而不利於民則我不能勸也故疏河而道之鑿江通於九派灑五湖而定東海民亦勞矣然而不怨苦者利歸於民也禹出見罪人下車問而泣之左右曰罪人不順道使然君王何爲痛之至於此也禹曰堯舜之民皆以堯舜之心爲心今寡人爲君也百姓各自以其心爲心是以痛之也當堯之時舜爲司徒契爲司馬禹爲司空后稷爲田疇蘷爲樂正倕爲工師伯夷爲秩宗皐陶爲大理益掌驅禽堯不能爲一焉堯爲君而九子者爲臣其何故也堯知九職之事使九子各受其事皆勝其任以成功堯遂乘成功以王天下是故知人者主道也知事者臣道也主道知人臣道知事毋亂舊法而天下治矣明主者有三懼一曰處尊位而恐不聞其過二曰得意而恐驕三曰聞天下之至言而恐不能行師經鼓琴魏文侯起舞賦曰使我言而無見違師經援琴而撞文侯不中中旒潰之文侯顧謂左右曰爲人臣而撞其君其罪何如左右曰罪當烹提師經下堂一等師經曰臣可得一言而死乎文侯曰可師經曰昔堯舜之爲君也唯恐言而人不違桀紂之爲君也唯恐言而人違之臣撞桀紂非撞吾君也文侯曰釋之是寡人之過也懸琴於城門以爲寡人符不補旒以爲寡人戒臣術人臣之行有六正則榮犯六邪則辱何謂六正一曰萌牙未動形兆未見昭然獨見存亡之機得失之要豫禁乎未然前使主超然立乎顯榮之處如此者聖臣也二曰虛心白意進善通道勉主以禮義諭主以長䇿將順其美匡救其惡如此者大臣也三曰夙興夜寐進賢不懈數稱於往古之行事以厲主意如此者忠臣也四曰明察極見成敗早防而救之塞其間絕其源轉禍以爲福使君終以無憂如此者智臣也五曰守文奉法任官職事不受贈遺衣服端齊食飮節儉如此者貞臣也六曰國家昬亂所爲不諛敢犯主之嚴顏面言主之過失如此者􅀡臣也是謂六正也何謂六邪一曰安官貪祿不務公事與世沈浮左右觀望如此者具臣也二曰主所言皆曰善主所爲皆曰可隱而求主之所好而進之以快主之耳目偸合苟容與主爲樂不顧其後害如此者諛臣也三曰中實險詖外貌小謹巧言令色又心疾賢所欲進則明其美隱其惡所欲退則明其過匿其美使主賞罰不當號令不行如此者姧臣也四曰智足以飾非辯足以行說內離骨肉之親外妬亂朝廷如此者讒臣也五曰專權擅勢以爲輕重私門成黨以富其家擅矯主命以自顯貴如此者賊臣也六曰諂主以邪墜主於不義朋黨比周以蔽主明使白黑無别是非無聞使主惡布於境內聞於四鄰如此者亡國之臣也是謂六邪賢臣處六正之道不行六邪之術故上安而下治生則見樂死則見思此人臣之術也湯問伊尹曰三公九卿大夫列士其相去何如對曰智通於大道應變而不窮辨於萬物之情其言足以調陰陽正四時節風雨如是者擧以爲三公故三公之事常在於道也不失四時通於地理能通不通能利不利如此者擧以爲九卿九卿之事常在於德也通於人事行猷擧繩通於關梁實於府庫如是者擧以爲大夫大夫之事常在於仁也忠正強諫而無有姧詐去私立公而言有法度如是者擧以爲列士列士之事常在於義也故道德仁義定而天下正凡此四者明王臣而不臣湯曰何謂臣而不臣對曰君之所不名臣者四諸父臣而不名諸兄臣而不名先王之臣臣而不名盛德之士臣而不名是謂大順也貴德聖人之於天下也譬猶一堂之上也今有滿堂飮酒者有一人獨索然向隅而泣則一堂之人皆不樂矣聖人之於天下也譬猶一堂之上也有一人不得其所者則孝子不敢以其物薦進也復恩晉文公亡時陶叔狐從文公反國三行賞而不及見咎犯曰吾從君而亡十有三年顏色黧黑手足胼胝今君反國三行賞而不及我意者君忘我與我有大故與咎犯言之文公文公曰嘻我豈忘是子哉夫耽我以道說我以仁昭明我名使我爲成人者吾以爲上賞防我以禮諫我以義使不得爲非者吾以爲次賞勇壯強禦難在前則居前難在後則居後􅊵我於患難中者吾復以爲次賞且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之勞苦之士子固爲首矣吾豈敢忘子哉周內史叔興聞之曰文公其覇乎昔者聖王先德後力文公其當之矣楚莊王賜羣臣酒日暮酒酣華燭滅乃有引美人衣者美人援絕其冠纓吿王曰今燭滅有引妾衣者援得其纓待之矣促上火視絕纓者王曰賜人酒使醉失禮奈何欲顯婦人節而辱士乎乃命左右今與寡人飮不絕冠纓者不歡羣臣皆絕纓而上火盡歡而罷居二年晉與楚戰有一臣常在前五合五獲首而􅁍敵卒得勝之莊王怪而問之對曰臣往者醉失禮王隱忍不暴而誅常願肝腦塗地用頸血湔敵久矣臣乃夜絕纓者也陽虎得罪北見簡子曰自今巳來不復樹人矣簡子曰何哉對曰夫堂上之人臣所樹者過半矣朝廷之吏臣所立者亦過半矣邊境之士臣所立者亦過半矣今夫堂上之人親卻臣於君朝廷之吏親危臣於法邊境之士親劫臣於兵簡子曰唯賢者爲能復恩不肖者不能夫樹桃李者夏得休息秋得食焉樹蒺蔾者夏不得休息秋得其刺焉今子之所種者蒺蔾也非桃李也自今巳來擇人而樹之毋巳樹而擇之也政理政有三品王者之政化之覇者之政威之強國之政脇之夫此三者各有所施而化之爲貴矣夫化之不變而後威之威之不變而後脇之脇之不變而後刑之夫至於刑者則非王者之所貴也是以聖王先德敎而後刑罰立榮耻而明防禁崇禮義之節以示之賤貨利之弊以變之則下莫不慕義節之榮而惡貪亂之耻其所由致之者化使然也治國有二機刑德是也王者尚其德而稀其刑覇者刑德並湊強國先其刑而後其德夫刑德者化之所由興也德者養善而進之者也刑者懲惡而禁後者也故德化之崇者至於賞刑罰之甚者至於誅夫誅賞者所以别賢不肖而列有功與無功也誅賞繆則善惡亂矣夫有功而不賞則善不勸矣有過而不誅則惡不懼矣善不勸而能以行化乎天下者未甞聞也齊桓公逐鹿而遠入山谷之中見一老公問之曰是爲何谷對曰爲愚公之谷也公曰何故對曰以臣名之公曰何爲以公名之對曰臣故畜㹀牛子大賣之而買駒少年曰牛不能生馬遂持駒去傍隣聞之以臣爲愚故名此谷爲愚公之谷桓公曰誠愚矣夫何爲而與之桓公遂歸以吿管仲管仲曰此夷吾之過也使堯在上咎繇爲理安有取人之駒見暴如此叟者也是公知獄訟不正故與之耳請退而修政孔子曰弟子記之桓公覇君也管仲賢佐也猶有以智爲愚者況不及桓公管仲者乎宓子賤治單父彈鳴琴身不下堂而單父治巫馬期亦治單父以星出以星入日夜不處以身親之而單父亦治巫馬期問其故於子賤子賤曰我之謂任人子之謂任力任力者固勞任人者固逸也人曰宓子賤則君子矣逸四支全耳目平心氣而百官治巫馬期則不然弊性事情勞煩敎詔雖治猶未至也孔子謂宓子賤曰子治單父而衆悅語丘所以爲之者曰不齊父其父子其子恤諸􅀌而哀喪紀孔子曰善小節也小人附矣猶未足也曰不齊所父事者三人所兄事者五人所友者十一人孔子曰父事三人可以敎孝矣兄事五人可以敎悌矣友十一人可以敎學矣中節也中民附矣猶未足也曰民有賢於不齊者五人不齊事之皆敎不齊所以治之術孔子曰欲其大者乃於此在矣昔者堯舜淸微其身務來賢人夫擧賢者百福之宗也而神明之主也惜也不齊之所治者小所治者大其與堯舜繼矣齊桓公問於管仲曰國何患對曰患夫社鼠桓公曰何謂也對曰夫社束木而塗之鼠因往託焉熏之則恐燒其木灌之則恐壞其塗此鼠所以不可得殺者以社故也夫國亦有社鼠人主左右是也內則蔽善惡於君上外則賣權重於百姓不誅之則爲亂誅之則爲人主所案據腹有之此亦國之社鼠也人有酤酒者爲器甚潔淸置表甚長而酒酸不售問之里人其故里人曰公之狗猛人挈器而入且酤公酒狗迎而噬之此酒所以酸不售之故也夫國亦有猛狗用事者也有道術之士欲明萬乘之主而用事者迎而齕之此亦國之猛狗也左右爲社鼠用事者爲猛狗則道術之士不得用矣此治國之所患也齊侯問於晏子曰爲政何患對曰患善惡之不分公曰何以察之對曰審擇左右左右善則百僚各􅀗其所宜而善惡分矣孔子聞之曰此言信矣善進則不善無由入矣不善進則善亦無由入矣尊賢人君之欲平治天下而􅂷榮名者必尊賢而下士易曰自上下下其道大光又曰以貴下賤大得民夫明王之施德而下下將懷遠而致近也朝無賢人猶鴻鵠之無羽翼雖有千里之望猶不能致其意之所欲至矣是故絕江海者託於舩致遠道者託於乘欲覇王者託於賢非其人而欲有功若夏至之日而欲夜之長也射魚指天而欲發之當也雖舜禹猶亦困而又況乎俗主哉禹以夏王桀以夏亡湯以殷王紂以殷亡闔廬以吳戰勝無敵於天下而夫差以見禽於越穆公以秦顯名尊號而二世以劫於望夷其所以君王者同而功迹不等者所任異也是故成王處繈緥而朝諸侯周公用事也趙武靈王年五十而餓於沙丘任李兌故也桓公得管仲九合諸侯一匡天下失管仲任豎刁易牙而身死不葬爲天下笑一人之身榮辱俱施焉在所任也故魏有公子無忌削地復得趙任藺相如秦兵不敢出楚有申包胥而昭王反位齊有田單襄王得國由此觀之國無賢佐俊士而能以成功立名安危繼絕者未甞有也故國不務大而務得民心佐不務多而務得賢俊得民心者民往之有賢佐者士歸之文王請除炮烙之刑而殷民從湯去張網之三面而夏民從以其所爲順於民心也故聲同則處異而相應德合則未見而相親賢者立於本朝則天下之豪相率而趍之矣故無常安之國無恆治之民得賢者則安昌失之者則危亡自古及今未有不然者也周公攝天子位七年布衣之士執贄而所師見者十人所友見者十二人窮巷白屋所先見者四十九人進善者百人敎士者千人官朝者萬人當此之時誠使周公驕而且恡則天下賢士至者寡矣苟有至者則心貪而尸祿者也尸祿之臣不能存君也齊桓公設庭燎朞年而士不至於是有以九九之術見者公曰九九足以見乎對曰臣非以九九爲足以見臣聞主君待士朞年而士不至夫士之所以不至者君天下之賢君也四方之士皆自以不及故不至也夫九九薄能耳而君猶禮之況賢於九九者乎公曰善乃因禮之朞月四方之士相携而並至齊宣王坐淳于髠侍王曰先生論寡人何好髠曰古者所好四王所好三焉王曰可得聞乎髠曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好士王曰國無士耳有則寡人亦悅之矣髠曰古者有驊騮騏驥今無有王選於衆王好馬矣古者有豹􅁚之胎今無有王選於衆王好味矣古者有毛嬙西施今無有王選於衆王好色矣王必將待堯舜禹湯之士而後好之則禹湯之士亦不好王矣宣王黙然無以應衛君問於田讓曰寡人封侯盡千里之地賞賜盡御府繒帛而士不至何也對曰君之賞賜不可以功及君之誅罰不可以理避猶擧杖而呼狗張弓而祝雞矣雖有香餌而不能致者害之必也魏文侯從中山奔命安邑田子方後太子擊遇之下車而趍子方坐乘如故吿太子曰爲我請君待我朝哥太子不悅謂子方曰不識貧窮者驕人乎富貴者驕人乎子方曰貧賤者驕人富貴者安敢驕人人主驕人而亡其國大夫驕人而亡其家貧窮者若不得意納履而去安往而不得貧窮乎太子及文侯道子方之語文侯嘆曰微吾子之故吾安得聞賢人之言吾下子方以仁得而友之自吾友子方也君臣益親百姓益附吾是以得友士之功我欲伐中山吾以武下樂羊三年而中山爲獻於我我是以得友武之功吾所以不少進於此者吾未見以智驕我者也若得以智驕我者豈不及古之人乎齊桓公使管仲治國對曰賤不能臨貴桓公以爲上卿而國不治公曰何故對曰貧不能使富公賜之齊國之市租一年而國不治公曰何故對曰疏不能制親公立以爲仲父齊國大安而遂覇天下孔子曰管仲之賢不得此三權者亦不能使其君南面而覇矣桓公問於管仲曰吾欲使爵腐於酒肉腐於爼得毋害於覇乎管仲對曰此極非其貴者耳然亦無害於覇也桓公曰何如而害覇乎對曰不知賢害覇也知而不用害覇也用而不任害覇也任而不信害覇也信而復使小人參之害覇也桓公曰善田忌去齊奔楚楚王問曰楚齊常欲相并爲之奈何對曰齊使申孺將則楚發五萬人使上將軍將之至禽將軍首而反耳齊使眄子將則楚悉發四封之內王自出將僅存耳於是齊使申孺將楚發五萬人使上將軍將斬其首而反於是齊王更使眄子將楚悉發四境之內王自出將僅而得免至舍王曰何先生知之早耶忌曰申孺爲人侮賢者而輕不肖者賢不肖俱不爲用是以亡也眄子之爲人也尊賢者而愛不肖者賢不肖俱􅀒任是以王僅得存耳正諫易曰王臣謇謇匪躬之故人臣之所以謇謇爲難而諫其君者非爲身也將欲以匡君之過矯君之失也君有過失危亡之萌也見君之過失而不諫是輕君之危亡也夫輕君之危亡者忠臣不忍爲也法誡昔成王封伯禽於魯將辭去周公戒之曰往矣子其無以魯國驕士也我文王之子武王之弟今王之叔父也又相天子吾於天下不輕矣然甞一沐而三捉髮一食而三吐哺猶恐失天下之士吾聞之曰德行廣大而守以恭者榮土地博裕而守以儉者安祿位尊盛而守以卑者貴人衆兵強而守以畏者勝聰明叡智而守以愚者益博聞多記而守以淺者廣此六守者皆謙德也貴爲天子富有四海德不謙者失天下亡其身桀紂是也可不愼乎故易曰有一道大足以守天下中足以守國家小足以守其身謙之謂也夫天道毀滿而益謙地道變滿而流謙鬼神害滿而福謙人道惡滿而好謙易曰謙亨君子有終吉子其無以魯國驕士矣孫叔敖爲楚令尹一國吏民皆來賀有一老父後來弔叔敖曰楚王不知臣不肖使臣受吏民之垢人盡來賀子獨後來弔豈有說乎父曰有身巳貴而驕人者民去之位巳高而擅權者君惡之祿巳厚而不知足者患處之叔敖再拜曰敬受命願聞餘敎父曰位巳高而意益下官益大而心益小祿巳厚而愼不敢取君謹守此三者足以治楚矣魏公子牟東行穰侯送之曰先生獨無一言以敎冉乎公子牟曰夫官不與勢期而勢自至勢不與富期而富自至富不與貴期而貴自至貴不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至穰侯曰善善說齊宣王出獵於社山父老相與勞王王曰父老苦矣賜父老田不租父老皆拜閭丘先生獨不拜王曰父老以爲少耶賜父老無傜役先生又不拜王曰父老皆拜先生獨不拜寡人得無有過乎閭丘先生對曰聞大王來遊所以爲勞大王望得壽於大王望得富於大王望得貴於大王王曰天殺生有時非寡人所得與也無以壽先生倉廩雖實以備災害無以富先生大官無缺小官卑賤無以貴先生先生對曰此非人臣所敢望也願大王選有脩行者以爲吏平其法度如此臣少可以得壽焉振之以時無煩擾百姓如是臣可少得以富焉願大王出令令少者敬老如是臣可少得以貴焉今大王幸賜臣田不租然則倉廩將虛也賜臣無傜役然則官府無使焉此固非臣之所敢望也齊王曰善修文成王將冠周公使祝雍祝王曰達而勿多祝雍曰使王近於仁遠於佞嗇於時惠於財任賢使能反質秦始皇帝旣兼天下侈靡奢泰有方士韓客侯生齊客盧生相與謀曰當今時不可以居上樂以刑殺爲威下畏罪持祿莫敢盡忠上不聞過而日驕下懾服以慢欺而取容諫者不用而失道滋甚吾黨久居且爲所害乃亡去始皇聞之大怒曰吾聞諸生多爲妖言以亂黔首乃使御史悉上諸生諸生四百餘人皆坑之侯生後得始皇召而見之侯生曰陛下肯聽臣一言乎始皇曰若欲何言生曰今陛下奢侈失本淫佚趣末宮室臺閣連屬增累珠玉重寶積襲成山婦女倡優數巨萬人鐘鼓之樂流漫無窮輿馬文飾所以自奉麗靡爛漫不可勝極黔首匱竭民力殫盡尚不自知又急誹謗嚴威刻下下喑上聾臣等故去臣等不惜臣之身惜陛下國之亡耳今陛下之淫萬丹朱而千昆吾桀紂臣恐陛下之十亡曾不一存始皇黙然久之曰汝何不早言侯生曰陛下自賢自健上侮五帝下凌三王棄素樸就末技陛下亡徵久見矣臣等恐言之無益而自爲取死故逃而不敢言今臣以必死故爲陛下陳之雖不能使陛下不亡欲使陛下自知也始皇曰吾可以變乎侯生曰刑巳成矣陛下坐而待亡耳若陛下欲更之能若堯與禹乎不然無冀也始皇喟然而歎遂釋不誅魏文侯問李克曰刑罰之源安生對曰生於姧邪淫佚之行也凡姧邪之心飢寒而起淫佚者文飾之耗雕文刻鏤害農事者也文繡纂組傷女功者也農事害則飢之本女功傷則寒之源也飢寒並至而能不爲姧邪者未之有也男女飾美以相矜而能無淫佚者未甞有也故上不禁技功則國貧民侈國貧民侈則貧窮者爲姧邪而富足者爲淫佚則驅民而爲邪也民巳爲邪因以法隨而誅之則是爲民設陷也刑罰之起有源人主不塞其本而督其末傷國之道也文侯曰善季文子相魯妾不衣帛馬不食粟仲孫忌諫曰子爲魯上卿妾不衣帛馬不食粟人其以子爲愛且不華國也文子曰然吾觀人之父母衣麤食蔬吾是以不敢且吾聞君子以德華國不聞以妾與馬夫德者得於我又得於彼故可行若淫於奢侈沈於文章不能自反何以守國仲孫忌慙而退羣書治要卷第四十三

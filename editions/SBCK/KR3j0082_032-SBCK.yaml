  text: 羣書治要卷第三十五
  hash: sha256:aced42b3fc5cb8157190899ff2e18ca2f49041e591b71df16a5acc86503e8a89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_032-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰文子曾子文子老子弟子道原夫至人之治也弃其聰明滅其文章依道廢智與民同出乎公約其所守寡其所求去其誘慕除其嗜欲損其思慮約其所守卽察矣寡其所求卽得矣水之性欲淸沙石穢之人之性欲平嗜欲害之唯聖人能遺物反己不以智役物不以欲滑和是以高而不危安而不傾也故聽善言便計雖愚者知悅之稱聖德高行雖不肖者知慕之悅之者衆而用之者寡慕之者多而行之者少精誠夫水濁者魚噞政苛卽民亂上多欲卽下多詐上煩擾卽下不定上多求卽下交爭不治其本而救之於末無以異於鑿渠而止水抱薪而救火也聖人事省而治求寡而贍不施而仁不言而信不求而得不爲而成懷自然保至眞抱道推誠天下從之如響之應聲影之􅁚形所脩者本也冬日之陽夏日之陰萬物歸之而莫之使也至精之感弗召自來不去自往不知所爲者而功自成待目而照見待言而使令其於以治難矣皐陶喑而爲大理天下無虐刑師曠瞽而爲大宰晉國無亂政不言之令不視之見聖人所以爲師也民之化上不從其言從其所行也故人君好勇而國家多難人君好色而國多昬亂故聖人精誠形於內好憎明於外出言以副情發號以明旨是故刑罰不足以移風殺戮不足以禁姧唯神化爲貴也夫至精爲神精之所動若春氣之生秋氣之殺也故治人者愼所以感也聖人之從事也所由異路而同歸其存亡定傾若一志不忘乎欲利人也故秦楚燕魏之歌異轉而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之徵也哭者哀之效也愔愔於中而應於外故在所以感之矣聖人之心日夜不忘乎欲利人其澤之所及亦遠也夫至人精誠內形德流四方見天下有利喜而不忘見天下有害憂若有喪夫憂民之憂者民亦憂其憂樂人之樂者人亦樂其樂故樂以天下憂以天下然而不王者未之有也大人行可悅之政人而莫不順其令令順卽從小而致大令逆卽以善爲害以成爲敗九守神者智之淵也神淸則智明智者心之符也智公卽心平人莫鑒於流水而鑒於澄水者以其淸且靜也故神淸意平乃能形物之情也天道極卽反盈則損物盛則衰日中而移月滿則虧樂終而悲是故聰明廣智守以愚多聞博辨守以儉武力勇毅守以畏富貴廣大守以狹德施天下守以讓此五者先王所以守天下也符言人之情服於德不服於力故古之聖王以其言下人以其身後人卽天下推而不厭戴而不重此德有餘而氣順也故知與之爲得知後之爲先卽幾道矣道德文子問道老子曰夫道者小行之小得福大行之大得福盡行之天下服文子問德仁義禮老子曰德者民之所貴也仁者人之所懷也義者民之所畏也禮者民之所敬也此四者聖人之所以御萬物也君子無德卽下怨無仁卽下爭無義卽下異無禮卽下亂四經不立謂之無道無道而不亡者未之有也心之精者可以神化而不可以說道故同言而信信在言前同令而行行在令外聖人在上民化如神情以先之也動於上不應於下者情令殊也三月嬰兒未知利害而慈母之憂喩焉者情也故言之用者小不言之用者大矣夫信君子之言也忠君子之意也忠信形於內感動應乎外賢聖之化也能成覇王者必得勝者也能勝敵者必強者也能強者必用人力者也能用人力者必得人心者也能得人心者必自得者也能自得者必柔弱者也上德日月欲明浮雲蓋之河水欲淸沙土穢之樷蘭欲脩秋風敗之人性欲平嗜欲害之􅀩塵而欲無眯不可得也山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而德澤流焉夫有陰德者必有陽報有隱行者必有昭名微明相坐之法立卽百姓怨減爵之令張卽功臣叛故察於刀筆之迹者卽不知治亂之本習於行陳之事者卽不知廟戰之權聖人先見福於重關之內慮患於㝠㝠之外愚者惑於小利而忘大害故事有利於小而害於大得於此而亡於彼故仁莫大於愛人也智莫大於知人也愛人卽無冤刑知人卽無亂政見本而知末執一而應萬謂之術居知所爲行知所之事知所乘動知所止謂之道言出於口不可止於人行發於近不可禁於遠事者難成易敗名者難立易廢凡人皆以輕小害易微事以至於大患也夫積愛成福積憎成禍人皆知救患莫知使患無生夫使患無生易於救患今人不務使患無生而務於救之雖神聖人不能爲謀也患禍之所由來萬萬無方故聖人深居以避害靜黙以待時小人不知禍福之門動作而陷於刑雖曲爲之備不足以全身故上士先避患而後就利先遠辱而後求名故聖人常從事於無形之外而不留心盡慮於巳成之內是以患禍無由至非譽不能塵垢也凡人之道心欲小志欲大智欲圓行欲方能欲多事欲少所謂心小者慮患未生戒禍愼微不敢縱其欲者也志大者兼包萬國一齊殊俗是非輻湊中爲之轂也智圓者終始無端方流四遠深泉而不竭也行方者􅀡立而不撓素白而不汚窮不易操達不肆志也能多者文武備具動靜中儀也事少者執約以治廣處靜以持躁也故心小者禁於微也志大者無不懷也智圓者無不知也行方者有不爲也能多者無不治也事少者約所持也故聖人之於善也無小而不行其於過也無微而不改行不用巫祝而鬼神不敢先可謂至貴矣然而戰戰慄慄日愼一日是以無爲而有成有功離仁義者卽見疑有罪不失仁心者必見信故仁義者事之常順也天下之尊爵也雖謀得計當慮患而患解圖國而國存其事有離仁義者其功必不遂矣言雖無中於䇿其計無益於國而心周於君合於仁義者身必存矣故曰百言百當不若舍趣而審仁義也敎本乎君子小人被其澤利本乎小人君子享其功使君子小人各得其宜卽通功易食而道達矣人多欲卽傷義多憂卽害智故治國樂其所以存亡國樂其所以亡水下流而廣大君下臣而聰明君不與臣爭功而治道通故君根本也臣枝葉也根本不美而枝葉荗者未之有也慈父之愛子也非求報也不可內解於心聖人之養民非求爲巳用也性不能巳也及恃其力賴其功勲而必窮矣有以爲卽恩不接矣故用衆人之所愛卽得衆人之力擧衆人之所善卽得衆人之心見所始卽知所終矣人之將疾也必先不甘魚肉之味國之將亡也必先惡忠臣之語故疾之將死者不可爲良醫國之將亡者不可爲忠謀古者親近不以言來遠不以言使近者悅遠者來與民同欲卽和與民同守卽固與民同念卽智得民力者富得民譽者顯行有召冦言有致禍道自然昔者堯之治天下其導民也水處者漁山處者木谷處者牧陸處者田地宜其事事宜其械械便其人如是則民得以所有易所無以所巧易所拙也是以離叛者寡聽從者衆若風之過箭忽然感之各以淸濁應矣物莫不就其所利避其所害是以鄰國相望雞狗之音相聞而足跡不接於諸侯之境車䡄不結於千里之外皆安其居也夫亂國若盛治國若虛亡國若不足存國若有餘虛者非無人各守其職也盛者非多人皆徼於末也有餘者非多財欲節事寡也不足者非無貨民躁而費多也故先王之法非所作也所因也其禁誅非所爲也所守也上德之道也以道治天下非易民性也因其有而條暢之故瀆水者因水之流產稼者因地之宜征伐者因民之欲能因卽無敵於天下矣故先王之制法因民之性而爲之節文無其性無其養不可使遵道也人之性有仁義之資非聖王爲之法度不可使向方也因其所惡以禁姦故刑罰不用威行如神矣因其性卽天下聽從咈其性卽法度張而不用帝者貴其德也王者尚其義也覇者迫於理也道狹然後任智德薄然後任刑明淺然後任察王道者處無爲之事行不言之敎因循任下責成不勞謀無失策擧無過事進退應時動靜循理美醜弗好憎賞罰不喜怒其聽治也虛心弱志是故羣臣輻湊並進無愚智不肖莫不盡其能君得所以制臣臣得所以事君卽治國之道明矣智而好問者聖勇而好同者勝乘衆人之知卽無不任也用衆人之力卽無不勝也用衆人之力烏獲不足恃也乘衆人之勢天下不足用也故聖人擧事未甞不因其資而用之也有一功者處一位有一能者服一事力勝其任卽擧者不重也能勝其事卽爲者弗難也聖人兼而用之故人無弃人物無弃財矣所謂無爲者非謂其引之不來推之不往迫而不應感而不動堅滯而不流捲握而不散也謂其私志不入公道嗜欲不枉正術循理而擧事因資而立功推自然之勢也聖人不耻身之賤惡道之不行不憂命之短憂百姓之窮也故常虛而無爲抱素見樸不與物雜古之立帝王者非以奉養其欲也聖人之踐位者非以逸樂其身也爲天下之民強掩弱衆暴寡詐者欺愚勇者侵怯又爲其懷智詐不以相敎積財貨不以相分故立天子以齊一之爲一人明不能徧照海內故立三公九􅀸以輔翼之爲絕國殊俗不得被澤故立諸侯以敎誨之是以地無不任時無不應官無隱事國無遺利所以衣寒食飢養老弱息勞倦無不以也神農形悴堯瘦癯舜梨黑禹胼胝伊尹􅀒鼎而干湯呂望鼓刀而入周百里奚傳賣管仲束縛孔子無黔突墨子無煖席非以貪祿慕位將欲起天下之利除萬民之害也自天子至于庶人四體不勤思慮不用於事贍者未之聞也下德治身太上養神其次養形神淸意平百節皆寧養生之本也肥肌膚充腹膓開嗜欲養生之末也治國太上養化其次正法民交讓爭處卑財利爭受少事力爭就勞日化上而遷善不知其所以然治之本也利賞而勸善畏刑而不敢爲非法令正於上百姓服於下治之末也上世養本而下世事末欲治之主不世出可與治之臣不萬一以不世出求不萬一此至治所以千歲不一至覇王之功不世立也順其善意防其邪心與民同出一道卽民性可善風俗可美矣所貴聖人者非貴其隨罪而作刑也貴其知亂之所生也若縱之放僻淫逸而禁之以法隨之以刑雖殘天下不能禁其姦矣目悅五色口欲滋味耳淫五聲七竅交爭以害一性日引邪欲竭其天和身且不能治奈天下何所謂得天下者非謂其履勢稱尊號也言其運天下心得天下力也有南面之名無一人之譽此失天下者也故桀紂不爲王湯武不爲放也天下得道守在四夷天下失道守在左右故曰無恃其不吾奪恃吾不可奪也行可奪之道而非篡殺之行無益於持天下矣治世之職易守也其事易爲也其禮易行也其責易償也是以人不兼官官不兼事農士商工鄕别州異故農與農言藏士與士言行工與工言巧商與商言數是以士無遺行工無苦事農無廢功商無折貨各安其性也夫先知遠見人材之盛也而治世不以責於民博聞強志口辨辭給人智之溢也而明主不以求於下傲世賤物不汚於俗士之伉行也而治世不以爲民化故高不可及者不以爲人量行不可逮者不以爲國俗故人材不可專用而度量道術可世傳也故國治可與愚守而軍旅可與性同不待古之英俊而人自足者所有而並用之也末世之法高爲量而罪不及重爲任而罸不勝危爲難而誅不敢民困於三責卽飾智而詐上犯邪而行危雖峻法嚴刑不能禁其姧獸窮卽觸鳥窮卽啄人窮卽詐此之謂也國有亡主世無亡道人有窮而理無不通也故不因道理之數而專巳之能其窮不遠矣夫君人者不出戶以知天下者因物以識物因人以知人也故積力之所擧旣無不勝也衆智之所爲卽無不成也工無二技士不兼官人得所宜物得所安是以器械不惡而職事不慢也夫責小易償也職寡易守也任輕易勸也上操約少之分下效易爲之功是以君臣久而不相厭也地廣民衆不足以爲彊也甲堅兵利不足以恃勝也高城深池不足以爲固也嚴刑利殺不足以爲威也爲存政者無小必存爲亡政者無大必亡故善守者無與御善戰者無與鬬乘時勢因民欲而取天下也故善爲政者積其德善用兵者蓄其怒德積而民可用也怒蓄而威可立也故材之所加者淺卽權之所服者大德之所施者博卽威之所制者廣廣卽我強而敵弱矣善用兵者先弱敵而後戰費不半而功十倍故千乘之國行文德者王萬乘之國好用兵者亡王兵先勝而後戰敗兵先戰而後求勝此不明於兵道也上行非漠眞無以明德非寧靜無以致遠非寬大無以并覆非平正無以制斷以天下之目視以天下之耳聽以天下之智慮以天下之力爭故號令能下究而臣情得上聞百官脩通羣臣輻湊喜不以賞賜怒不以罪誅法令察而不苛耳目通而不暗善否之情日陳於前而不逆賢者盡其智不肖者竭其力近者安其性遠者懷其德用人之道也夫乘輿馬者不勞而致千里乘舟楫者不能游而濟江海使言之而是雖在匹夫蒭蕘猶不可弃也言之而非雖在人君􅀸相不可用也是非之處不可以貴賤尊卑論也其計可用不羞其位矣其言可行不貴其辨矣文子問曰何行而民親其上老子曰使之以時而敬愼之如臨深淵如履薄冰天地之間善卽吾畜也不善卽吾讎也昔日夏商之臣反讎桀紂而臣湯武宿沙氏之民自攻其君而歸神農氏故曰人之所畏亦不可以不畏治大者道不可以小地廣者制不可以狹位高者事不可以煩民衆者敎不可以苛事煩難治法苛難行求多難贍寸而度之至丈必差銖而稱之至石必過石稱丈量徑而寡失大較易爲智曲辨難爲惠故無益於治有益於亂者聖人不爲也無益於用有益於費者智者不行也故功不厭約事不厭寡功約易成事省易治求寡易贍夫調音者小絃急大絃緩立事者賤者勞貴者逸道之言曰芒芒昧昧與天同氣同氣者帝同義者王同功者覇無一焉者亡故不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威是以精誠爲之者也施而不仁言而不信怒而不威是以外貌爲之者也故有道以理之法雖少足以治矣無道以臨之命雖衆足以亂矣鯨魚失水而制於螻蟻人君舍其所守而與民爭事則制於有司以無爲持位守職者以聽從取容臣下藏智而弗用反以事專其上君人者不任能而好自爲則智日困而數窮於下智不足以爲治威不足以行刑卽無以與下交矣喜怒形於心嗜欲見於外卽守職者離正而阿上有司枉法而從風矣賞不當功誅不應罪卽上下乖心羣臣相怨矣百官煩亂而智不能解非譽萌生而明弗能照非已之失而反自責卽人主愈勞人臣愈逸矣是代大匠斲者希不傷其手也與馬逐遠筋絕不能及也上車攝輿馬服銜下伯樂相之王良御之明主乘之無御相之勞而致千里善乘人之資也國之所以存者得道也所以亡者理塞也故得生道者雖小必大有亡徵者雖成必敗國之亡也大不足恃道之行也小不可輕故存在得道不在於小亡在失道不在於大故亂國之主務於廣地而不務於仁義務於高位而不務於道德是舍其所以存而造其所以亡也主與之以時民報之以財主遇之以禮民報之以死生而貴者驕生而富者奢故富貴不以明道自鑒而能無爲非者寡矣上義凡學者能明於天人之分通於治亂之本見其終始可謂達矣治之本仁義也其末法度也先本後末謂之君子先末後本謂之小人法之生也以輔義重法弃義是貴其冠履而忘其頭足也仁義者廣崇也不益其厚而張其廣者毀不廣其基而增其高者覆故不大其棟不能任重重莫若國棟莫若德人主之有民猶城之有基木之有根根深卽本固基厚卽上安故事不本於道德者不可以爲經言不合於先王者不可以爲道治人之道其猶造父之御馬也內得於中心外合乎馬志故能取道致遠氣力有餘進退還曲莫不如意誠得其術也今夫權勢者人主之車輿也大臣者人主之駟馬也身不可以離車輿之安手不可以失駟馬之心故輿馬不調造父不能以取道君臣不和聖人不能以爲治執道以御之中材可盡明分以示之姦邪可止物至而觀其變事來而應其化近者不亂則遠者治矣不用適然之敎而行自然之道萬擧而無失矣治國有常而利民爲本政敎有道而令行爲右苟利於民不必法古苟周於事不必循俗故聖人法與時變禮與俗化衣服器械各便其用法度制令各因其宜故變古未可非循俗未足多誦先王之書不若聞其言聞其言不若得其所以言得其所以言者言弗能言也故道可道者非常道也名可名者非常名也故聖人所由曰道所爲曰事道由金石壹調不可更事猶琴瑟每終改調故法制禮樂者治之具也非所以爲治也法非從天下非從地出發於人間反已自正也誠達其本不亂於末知其要不惑於疑有諸巳不非諸人無諸巳不責於下所禁於民者不行於身故人主之制法也先以自爲檢戒故禁勝於身卽令行於民矣夫法者天下之凖繩也人主之度量也懸法者法不法也法定之後中繩者賞缺繩者誅雖尊貴者不輕其賞卑賤者不重其刑犯法者雖賢必誅中度者雖不肖無罪是故公道行而私欲塞也古之置有司也所以禁民使不得恣也其立君也所以制有司使不得專行也法度道術所以禁君使無得橫斷也人莫得恣卽道勝而理得矣故反於無爲無爲者非謂其不動也言其莫從已出也善賞者費少而勸多善罰者刑省而姦禁善與者用約而爲德善取者入多而無怨故聖人因民之所善以勸善因民之所憎以禁姦賞一人而天下趣之罰一人而天下畏之至賞不費至刑不濫聖人守約而治廣此之謂也君臣異道卽治同道卽亂各得其宜處其當卽上下有以相使也故枝不得大於幹末不得強於本言輕重大小有以相制也夫得威勢者所持甚小所任甚大所守甚約所制甚廣十圍之木持千鈞之屋得勢也五寸之關能制開闔所居要也下必行之令從之者利逆之者害天下莫不聽從者順也義者非能盡利天下之民也利一人而天下從暴者非能盡害海內也害一人而天下叛故擧措廢置不可不審也屈寸而伸尺小枉而大􅀡聖人爲之今人君之論臣也不計其大功總其細行而求其不善卽失賢之道也故人有厚德無問其小節人有大譽無疵其小故夫人情莫不有所短誠其大略是也雖有小過不足以爲累誠其大略非也閭里之行未足多也自古及今未有能全其行者也故君子不責備於一人夫夏后氏之璜不能無瑕明月之珠不能無穢然天下寶之者不以小惡妨大美也今志人之所短而忘人之所長而欲求賢於天下卽難矣夫衆人見位卑賤事之洿辱而不知其大略也故論人之道貴卽觀其所擧富卽觀其所施窮則觀其所不受賤卽觀其所不爲視其所患難以知其勇動以喜樂以觀其守委以貨財以觀其仁振以恐懼以觀其節如此卽人情得矣聖人以仁義爲凖繩中繩者謂之君子弗中者謂之小人君子雖死亡其名不滅小人雖得勢其罪不除左手據天下之圖而右手刎其㗋愚者不爲身貴乎天下也死君親之難者視死若歸義重於身故也天下大利比身卽小身所重也比義卽輕此以仁義爲凖繩者也地廣民衆主賢將良國富兵強約束信號令明兩敵相當未接刃而敵人奔亡此其次也知土地之宜習險隘之利明奇正之變察行陣之事白刃合流矢接輿死扶傷流血千里暴骸盈野義之下也國之所以強者必死也所以必死者義也義之所以行者威也威義並行是謂必強白刃交接矢石若雨而士爭先者賞信而罰明也上視下如子下事上如父上視下如弟下視上如兄上視下如子必王四海下視上如父必正天下上視下如弟卽不難爲之死下視上如兄卽不難爲之亡故子父兄弟之冦不可與鬬是故義君內修其政以積其德外塞其邪以明其勢察其勞逸以知飢飽戰期有日視死如歸恩之加也上禮昔之聖王仰取􅁚於天俯取度於地中取法於人調陰陽之氣和四時之節察高下之宜除飢寒之患行仁義之道以治人倫列地而州之分職而治之立大學而敎之此其治之綱紀也得道卽擧失道卽廢夫物未甞有張而不弛盛而不敗者也唯聖人可盛而不衰聖人初作樂也以歸神杜淫反其天心至其衰也流而不反淫而好色至以亡國其作書也以領理百事愚者以不忘智者以記事及其衰也爲姦僞以解有罪而殺不辜其作囿也以奉宗廟之具簡士卒戒不虞及其衰也馳騁弋獵以奪民時其上賢也以平敎化正獄訟賢者在位能者在職澤施於下萬民懷德至其衰也朋黨比周各推其與廢公趍私外內相擧姦人在位賢者隱處天地之道極卽反益卽損故聖人治弊而改制事終而更爲矣聖人之道非修禮義廉耻不立民無廉耻不可治也不知禮義不可以行法法能敎不孝不能使人孝能刑盜者不能使人廉耻聖王在上明好惡以示人經非譽以導之親賢而進之賤不肖而退之刑措而不用禮義修而任賢德也夫使天下畏刑而不敢盜竊豈若使無有盜心哉故知其無所用雖貪者皆辭之不知其無所用廉者不能讓夫人之所以亡社稷身死人手爲天下笑者未甞非欲也知冬日之扇夏日之裘無用於巳則萬物之變爲塵垢故以湯止沸沸乃益甚知其本者去火而巳夫有餘則讓不足則爭讓則禮義生爭則暴亂起故物多則欲省求贍則爭止故世治則小人守正而利不能動也世亂則君子爲姧而法不能禁也酆水之深十仞而不受塵垢金鐵在中形見於外非不深且淸也魚鼈莫之歸石上不生五穀秃山不游麋鹿無所蔭蔽也故爲政以苛爲察以切爲明以刻下爲忠以計多爲功如此者譬猶廣革者也大卽大矣裂之道也曾子參脩身曾子曰君子攻其惡求其過強其所不能去私欲從事於義可謂學矣君子愛日以學及時以行難者弗避易者弗從唯義所在日且就業夕而自省思以没其身亦可謂守業矣君子學必由其業問必以其序問而不決承間觀色而復之君子旣學之患其不博也旣博之患其不習也旣習之患其不知也旣知之患其不能行也旣能行之患其不能以讓也君子之學致此五者而巳矣君子博學而淺守之微言而篤行之行欲先人言欲後人見利思辱見難思詬嗜欲思耻忿怒思患君子終身守此戰戰也君子已善亦樂人之善也已能亦樂人之能也君子好人之爲善而弗趍也惡人之爲不善而弗疾也不先人以惡不疑人以不信不說人之過而成人之美朝有過夕改則與之夕有過朝改則與之君子終日言不在尤之中小人一言終身爲罪矣君子之於不善也身勿爲可能也色勿爲不可能也心勿爲不可能也太上樂善其次安之其下亦能自強也太上不生惡其次生而能夙絶之其下復而能改復而不改隕身覆家大者傾社稷是故君子出言愕愕行身戰戰亦殆免於罪矣昔者天子日旦思其四海之內戰戰唯恐不能乂也諸侯日旦思其四封之內戰戰唯恐失損之也大夫日旦思其官戰戰唯恐不能勝也庶人日旦思其事戰戰唯恐刑罰之至也是故臨事而慄者鮮不濟矣立孝曾子曰君子立孝其忠之用也禮之貴也故爲人子而不能孝其父者不敢言人父不能畜其子者爲人弟而不能承其兄者不敢言人兄不能順其弟者爲人臣而不能事其君者不敢言人君不能使其臣者故與父言言畜子與子言言孝父與兄言言順弟與弟言言承兄與君言言使臣與臣言言事君君子之孝也忠愛以敬反是亂也盡力而有禮敬而安之微諫不倦聽從不怠懽欣忠信咎故不生可謂孝矣盡力而無禮則小人也致敬而不忠則不入也是故禮以將其力敬以入其忠詩言夙興夜寐母忝爾所生不耻其親君子之孝也是故未有君而忠臣可知者孝子之謂也未有長而順下可知者悌弟之謂也未有治而能仕可知者先脩之謂也故孝子善事君悌弟善事長君子壹孝壹悌可謂知終矣制言曾子曰夫行也者行禮之謂也夫禮貴者敬焉老者孝焉幼者慈焉小者友焉賤者惠焉此禮也弟子毋曰不我知也鄙夫鄙婦相會于墻陰可謂密矣明日則或揚其言者故士執仁與義而不聞行之未篤也故蓬生麻中不扶乃􅀡白沙在泥與之皆黑是故人之相與也譬如舟車然相濟達也已先則援之彼先則推之是故人非人不濟馬非馬不走土非土不高水非水不流弟子問於曾子曰夫士何如則可爲達矣曾子曰不能則學疑則問欲行則比賢雖有險道脩行達矣今之弟子病下人不知事賢耻不知而又不問是以惑闇終其世而巳矣是謂窮民疾病曾子曰君子之務蓋有矣夫華繁而實寡者天也言多而行寡者人也鷹隼以山爲庳而巢其上魚鼈黿鼉以川爲淺而窟穴其中卒其所以得者餌也是故君子苟母以利害義則辱何由至哉親戚不悅不敢外交近者不親不敢來遠小者不審不敢言大故人之生也百歲之中有疾病焉故君子思其不可復者而先施焉親戚旣没雖欲孝誰爲孝乎年旣耆艾雖欲悌誰爲悌乎故孝有不及悌有不時其此之謂與言不遠身言之主也行不遠身行之本也言有主行有本謂之有聞也君子尊其所聞則高明矣行其所聞則廣大矣高明廣大不在於他加之志而巳矣與君子游苾乎如入蘭芷之室久而不聞則與之化矣與小人游膩乎如入魚次之室久而不聞則與之化矣是故君子愼其所去就與君子游如長日加益而不自知也與小人游如履薄冰每履而下幾何而不陷乎哉羣書治要卷第三十五

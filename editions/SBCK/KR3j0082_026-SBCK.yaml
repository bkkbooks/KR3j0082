  text: 羣書治要卷第二十九
  hash: sha256:6358ff0b3a1ceeebb4cfdd9331d7ab4742698e8a4ba554dbadc7e7b0047b74a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_026-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰晉書上紀武皇帝諱炎字安世文帝太子也泰始五年廷尉上西平民麴路伐登聞鼓言多妖妄毀謗帝詔曰狂狷怨誹亦朕之愆勿罪也孫盛陽秋云泰始八年帝問右將軍皇甫陶論事陶固執所論與帝爭言散騎常侍鄭徽表求治罪詔曰讜言謇諤􅀡意盡辭所望於左右也人主常以阿媚爲患豈以爭臣爲損乎陶所執不諐此義而徽越職奏之豈朕意乎乃免徽官也咸寧四年大醫司馬程據獻雉頭裘詔曰異服奇技典制所禁也其於殿前燒裘甲申勅內外敢有犯者依禮治罪太康元年吳主孫皓降有司奏晉德隆茂光􅀍四表吳會旣平六合爲一宜勒封東岳以彰聖德帝曰此盛德之事所未議也群臣固請弗聽于寶紀云太康五年侍御史郭欽上書曰戎狄強橫自古爲患魏初民寡西北諸邊郡皆爲戎居今雖伏從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河失土馮翊太原安定裁居數縣其餘及上郡盡爲狄庭連接畿甸宜及平吳之威出北地西河安定復上郡實馮翊平陽北統河諸縣募取死罪徙三河三魏見士四萬家以充之使裔不亂華漸徙平陽弘農魏郡京兆上黨太原雜胡出於其表峻四夷出入之防明先王荒服之制萬世之長策也弗納荀綽略記云世祖自平吳之後天下無事不能復孜孜於事物始寵用后黨由此祖禰採擇嬪媛不拘拘華門父兄以之罪亹非正形之謂扄禁以之攢聚實耽穢之甚昔武王伐紂歸傾宮之女助紂爲虐而世祖平皓納吳姬五千是同皓之弊也惠皇帝諱􅂨字正度武帝太子也永平元年遷皇太后于永寧宮賈后諷群臣奏廢皇太后爲庶人居于金墉城九年賈后誣奏皇太子有悖書帝幸式乾殿召公􅀸百官皆入詔賜太子死以所謗悖書及詔文遍示諸王公司空張華曰此國之太禍自漢氏以來每廢黜正嫡恆至喪亂且晉有天下日淺願陛下詳之尚書僕射裴頠曰臣不識太子書不審誰爲通表誰發此者爲是太子手書不宜先撿挍而王公百官竟無言免太子爲庶人幽于金墉城永康元年前西夷挍尉司馬閻纘輿棺詣闕上書曰伏見赦文及牓下前太子遹手疏以爲驚愕自古巳來臣子悖逆未有如此之甚者也幸賴天慈全其首領臣伏念遹生於聖父而至此者由於長養深宮沈淪富貴受饒先帝父母驕之每見選師傅下至群吏率取膏梁擊鐘鼎食之家稀有寒門儒素如衛綰周文石奮疏廣者也洗馬舍人亦無汲黯鄭莊之比遂使不見事父事君之道臣案古典太子居以士禮與國人齒以此明先王欲令知先賤然後乃貴自頃東宮亦微太盛所以致敗也非伹東宮歷觀諸王師友文學亦取豪族爲能得者率非龔遂王陽能以道訓友無􅀡亮三益之節官以文學爲名實不讀書伹共鮮衣怒馬縱酒高會嬉遊博奕豈有切磋能相長益臣常恐公族凌遲以此歎息今遹可以爲戒恐其被斥弃逐遠郊始當悔過無所復及昔戾太子無狀稱兵拒命而壺關三老上書猶曰子弄父兵罪應笞漢武感悟築思子之臺今遹無狀言語逆悖受罪之日不敢失道猶爲輕於戾太子尚可禁持撿著目下重選師傅爲置文學皆選以學行自立者及取服勤更事名行素聞者使共與處使嚴御史監護其家絕貴戚子弟輕薄賓客如此左右前後莫非正人使共論議於前伹道古今孝子慈親忠臣事君及思愆改過之比日聞善道庶幾可全昔太甲有罪放之三年思庸克復爲殷明王又魏明帝因母得罪廢爲平原侯爲置家臣庶子文學皆取正人共相匡矯事父以孝事母以謹聞於天下于今稱之李斯云慈母多敗子嚴家無格虜由陛下驕遹使至於此庶其受罪以來足自思改方今天下多虞四夷未寧將伺國􅂩儲副大事不宜空虛宜爲大計少復停留先加嚴誨若不悛改弃之未晚也臣素寒門不經東宮情不私遹也臣甞備近職情同閽寺悾悾之誠皆爲國事臣以死獻忠輙具棺絮伏須刑誅書御不從遣前將軍司馬送太子幽于許昌宮賈后使黃門孫慮賊太子于許昌于寶紀云史臣曰世祖正位居體重言愼法仁以原下寛而能斷故民詠惟新四海歡悅矣聿修祖宗之志獨納羊祜之策役不二時江湖來同夷吳蜀之壘垣通二方之險塞掩唐虞之舊城班正朔於八荒餘粮委畆外關不閉民相遇者如親其匱乏者取資於道路故于時有天下無窮人之言雖太平未洽亦足以明吏奉其法民樂其生百代之一時矣武皇旣崩陵土未乾而楊駿被誅母后廢黜朝士舊臣夷滅者數十族宗子無維城之助而閼伯實沈之􅂩歲構師尹無具瞻之貴而顚墜戮辱之禍日有民不見德唯亂是聞內外混淆名實反錯國政迭移於亂人禁兵外散於四方方岳無鈞石之鎭門關無結草之固李辰石冰傾之於荊楊劉淵王彌撓之於靑冀二十餘年而河洛爲墟戎羯稱制二帝失尊山陵無所何哉樹立失權託付非才四維不張而苟且之政多也夫作法於治其弊猶亂作法於亂誰能救之于時天下非蹔弱也軍旅非無素也彼劉淵者離石之將兵都尉王彌者靑州之散吏也葢皆弓馬之士驅走之人凡庸之才非有吳先主諸葛孔明之能也新起之㓂烏合之衆非吳蜀之敵也脫耒爲兵裂衣爲旗非戰國之器也自下逆上非隣國之勢也然而成敗異効擾天下如驅羣羊擧二都如拾遺將相侯王連頸受戮乞爲奴僕而猶不獲后嬪妃主虜辱於戎卒豈不哀哉夫天下大器也羣生重畜也愛惡相攻利害相奪其勢若積水于防燎火于原未甞蹔靜也器大者不可以小道治勢重者不可以爭競擾古先哲王知利百姓是以感而應之悅而歸之如晨風之鬱北林龍魚之趣淵澤也然後設禮文以理之斷刑罰以威之謹好惡以示之審禍福以喩之求明察以官之篤慈愛以固之故皆樂其生而哀其死悅其敎而安其俗君子勤禮小人盡力廉耻篤於家閭邪僻消於胸懷故其民有見危以授命而不求生以害義又況奮臂大呼聚之以干紀作亂之事乎基廣則難傾根深則難㧞理節則不亂膠結則不遷是以昔有天下者之所以長久也夫豈無僻主賴道德典刑以維持之也故延陵季子聽樂以知諸侯存亡之數短長之期者蓋民情風敎國家安危之本也晉之興也其創基立本異於先代又加之以朝寡純德之士鄕乏不二之老風俗淫僻耻尚失所學者以莊老爲宗而黜六經談者以虛蕩爲辯而賤名撿行身者以放蕩爲通而狹節操進仕者以苟得爲貴而鄙居正當官者以望空爲高而笑勤恪劉頌屢言治道傅咸每糺邪正皆謂之俗吏其倚仗虛曠依阿無心者皆名重海内由是毀譽亂於善惡之實情慝奔於貨欲之塗選者爲人擇官宦者爲身擇利而秉鈞當軸之士身兼官以十數大極其尊小統其要機事之失十恆八九而世族貴戚之子弟凌邁超越不拘資次悠悠風塵皆奔競之士列官千百無讓賢之擧子眞著崇讓而莫之省子雅制九班而不得用長虞􅀡筆而不能糾其婦女莊飾織絍皆取成於婢僕未甞知女功絲枲之業中饋酒食之事也先時而㛰任情而動故不取淫逸之過不拘妬忌之惡有逆于舅姑有反易剛柔有殺戮妾媵有瀆亂上下父兄弗之罪也天下莫之非也又況責之問四敎於古修貞順於今以輔佐君子者哉禮法刑政於是大壞如水斯積而決其堤防如火斯蓄而離其薪燎也國之將亡本必先顚其此之謂乎故觀阮籍之行而覺禮敎崩施之所由察􅁃純賈充之爭而見師尹之多僻考平吳之功而知將帥之不讓思郭欽之謀而寤戎狄之有亹覽傅玄劉毅之言而得百官之邪核傅咸之奏錢神之論而覩􅃂賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之於祭祀季札必得之於聲樂范夑必爲之請死賈誼必爲之痛哭又況我惠帝以蕩蕩之德而臨之哉故賈后肆虐於六宮韓午助亂於內外其所由來漸矣豈特繫一婦人之惡乎成皇帝諱衍字世根明帝太子也咸和七年詔除諸養禽之屬無益者集書令史夏侯盛表曰伏聞明詔悉除養熊虎之費擧朝增慶咸稱聖主伏惟陛下未觀古今成敗之戒而卓尒玄覽明發自然遣除無益務在嗇民誠可謂性與天道生而知之孔子十五志學四十不惑陛下年在志學之後而思洞不惑之前三代之興無不抑損情欲三季之衰無不肆其侈靡陛下不學其興而與興者同功不覽其衰巳去衰者之弊道侔上哲德邁中古吐絲髮之言著如綸之美臣聞將順其美匡救其惡故人主之言則右史書之陛下此詔旣當等之史籍又宜宣布天下自喪亂巳來四十餘載塗炭之餘思治久矣陛下智成當年而運値百六德音之詔發自聖德願復觸類而長之廣求其比無使朝有遊食費祿之臣野有逋竄不傜之民使居官者必有供時之賦則何患倉廩之不實下土之不均凡修此術易於反掌耳臣誠總猥官自朝末不足對􅀭盛化禆廣大猷然自覩聖美心悅至敎自忘叢細謹拜表以賀簡文皇帝諱昱字道萬元帝少子也咸安二年詔曰夫敦本息末抑絕華競開忠信公坥之門塞浮僞阿私之路詢名撿實致之以道使淸濁異流能否殊貫官無粃政士無謗讟不有懲勸則德禮焉施且強㓂未殄勞役未息每念民疲力單則中夜忘􅃦若不弘政以求民瘼簡除遊煩以存儉約將何以紓之耶今自非軍國戎祀之要其華飾煩費之用可除者皆除之宜省者皆省之其鰥寡窮獨癃殘六疾不能自存皆生民之至艱先王之所愍宜加隱䘏各賑賜之若或孝子貞婦殊行異操之人皆以狀條列當有以甄明其節夫肥遁窮谷之賢汩泥揚波之士雖抗志於玄霄之表潛默於幽岫之裏貪屈高尚之道以隆協讚之美使惠風流於天下膏澤被於萬物孰與獨足山水棲遲丘壑殉匹夫之㓗而忘兼濟之大古人不借賢於曩代朕所以虛想於今日內外百官剖符親民各勤所司使善無不達惡無不聞退食自公平情以道令詩人無素飡之刺而吾獲虛心之求豈不善哉其各宣攝知朕意焉后妃傳武元楊皇后弘農華陰人也初賈充妻郭氏使言於后求以女爲太子妃兼有遺賂及議太子㛰世祖欲娶衛瓘女后苦譽賈后有淑德又密使太子太傅荀顗進言上乃聽之遂成㛰惠賈庶人名南風平陽人也拜太子妃性妬虐甞手殺數人或以㦸擲孕妾子乃墮地惠帝卽位爲皇后虐誅三楊逆弑太后矯害二公荒淫放恣與太醫程據等亂彰于内外詐有身爲產養妹夫韓壽兒遂謀廢太子以所養代立專爲姦誣害太子衆惡彰著永康元年爲趙王倫所廢賜死傳琅耶王伷字子將宣帝第五子受詔征吳孫皓請降進拜大將軍伷旣戚屬尊重加有平吳之功而克己恭儉無矜滿之色統御文武各得其用百姓悅仰咸懷惠化扶風王駿字子臧宣帝第七子也年五六歲能書畫誦詠詩賦秉德淸貞宗室之中最爲儁茂封汝陰王遷鎭西大將軍都督雍梁諸軍事大興佃農入朝徙封扶風王薨西土氓􅀺思慕悲哭涕泣岐路更樹碑讚述德範長老見碑者無不拜之其遺愛如此齊王攸字大猷文帝第二子也力行敦善甚有名譽爲侍中數年授太子太傅獻箴於皇太子每朝政大議悉心陳之且孝敬忠肅至性過人太康三年爲大司馬都督靑州諸軍事薨子冏嗣字景治與趙王倫共廢賈后倫篡遷冏鎭東大將軍開府儀同三司冏因民心怨望移檄天下破倫帝反正就拜大司馬加九錫輔政大築第館使大匠營制與西宮等後房施鐘懸前庭儛八佾沈于酒色不入朝見坐拜百官符勅三臺選擧不均唯􅃂親昵殿中御史桓豹奏事不先經冏府卽考竟之於是朝廷側目海内失望冏驕亂日甚終無悛志長沙王發兵攻冏府生禽冏斬於閶闔門外諸黨屬皆夷三族愍懷太子遹字煕祖惠帝長子也謝才人所生少而聰慧惠帝卽位立爲皇太子年轉長大而不好學喜與左右嬉戲不能尊敬保傅敬押賔友賈后素忌太子有佳譽因此密勅諸黃門閹宦媚諛於太子曰殿下誠可及壯時極意狡猾何爲恆自拘束每見喜怒之際輙歎曰殿下不知用威刑天下那得畏服也太子於是慢弛益彰或廢朝侍有過差之聲洗馬江統等諫太子不能用賈后詐稱上不和呼太子入朝后不見置别屋中遣婢賜酒􅀥逼使飮盡仍齎謗書多未成字稱詔令太子寫之累續催促醉不暇看粗得迹便足成悖辭后以呈帝帝卽幸式乾殿召公􅀸入使黃門令薰猛以太子書及靑紙詔曰遹書如此今賜死徧示諸公王而莫敢有言者唯張華裴頠證明太子議至日西不決后懼事變乃表免太子爲庶人於是送幽于許昌宮賈后矯詔害太子趙王倫等廢后於金墉城賜死􅁽復太子謚爲愍懷安平王孚字叔達宣帝弟也魏甘露元年轉太傅高貴鄕公卒當時百官莫敢奔赴孚往枕屍於股號慟盡哀奏治主者會太后有令使以庶人禮葬孚與羣公上表乞以王禮葬之世祖受禪陳留王就金墉城孚拜辭執王手涕泣歔欷不能自勝曰臣死之日固太魏之純臣也臨終曰有魏貞士河内司馬孚不伊不周不夷不惠立身行道終始若一遺令素棺單椁斂以時服所給器物一不施用高密王泰字子舒宣帝弟馗之子也封爲隴西王遷太尉爲人廉靜不近聲色身爲宰輔食大國之租服餝麤素肴饍疎儉如布衣寒士事親恭謹居喪哀戚謙虛下物爲宗室儀表劉寔字子眞平原人也太祖引參相國軍事寔以世俗進趣廉讓道缺乃著崇讓論其辭曰古之聖王之治天下所以貴讓者欲以出賢才息爭競也夫人情莫不皆欲己之賢也故勸令讓賢以自明也賢豈假讓不賢哉故讓道興賢能之人不求自出矣至公之擧自立矣百官之副亦豫具矣一官缺擇衆官所讓最多者而用之審之道也在朝之士相讓於上草廬之人咸皆化之推能讓賢之風從此生矣爲一國所讓則一國士也天下所共推則天下士也推讓之風行則賢與不肖灼然殊矣此道之行在上者無所用其心因成淸議隨之而已故曰蕩蕩乎堯之爲君莫之能名又曰舜禹之有天下而不與焉賢人相讓於朝大才之人恆在大官小人不爭於野天下無事矣以賢才治無事至道興矣已仰其成復何與焉故可以歌南風之詩彈五弦之琴也成此功者非有他崇讓之所致耳在朝之人不務相讓久矣天下化之自魏代已來登進辟命之士及在職之吏臨見受叙雖自辭不能終莫肯讓有勝己者夫推讓之風息爭競之心生矣孔子曰上興讓則下不爭明讓不興下必爭也推讓之道興賢能之人日見推擧爭競之心生賢能之人日見謗毀夫爭者之欲自先甚惡能者之先不能無毀也孔墨不能免世之謗己況不及孔墨者乎議者僉言世少高名之才朝廷不有大才之人可以爲大官者山澤人小官吏亦復云朝廷之士雖有大官名德皆不及往時人也余以爲此二言皆失之矣非時獨乏賢也時不貴讓一人有先衆之譽毀必隨之名不得成使之然也雖令稷契復存亦不復能全其名矣能否渾雜優劣不分士無素定之價官職有缺主選之吏不知所用伹案官次而擧之同才之人先用者非勢家之子則必爲有勢者之所念也因先用之資而復遷之無巳遷之無巳不勝其任之病發矣所以見用不息者由讓道廢也因資用人之有失久矣故自漢魏以來時開大擧令衆官各擧所知唯才所任不限階次如此者甚數矣其所擧必有當者不聞時有擢用不知何誰最賢故也所擧必有不當而罪不加不知何誰最不肖故也所以不可得知由當時之人莫肯相推賢愚之名不别令其如此擧者知在上者察不能審故敢漫擧而進之或擧所賢因及所念一頓而至人數猥多各言所擧者賢加之高狀相似如一難得而分矣雖擧者不能盡忠之罪亦由上開聽察之路濫令其爾也昔齊王好聽竽聲必令三百人合吹而後聽之廩以數人之俸南郭先生不知吹竽者也以三百人合吹可以容其不知因請爲王吹竽虛食數人之俸嗣王覺而改之難彰先王之過乃下令曰吾之好聞竽聲有甚於先王欲一一列而聽之先生於此逃矣推賢之風不立濫擧之法不改則南郭先生之徒盈於朝矣才高守道之士日退馳走有勢之門日多矣雖國有典刑弗能禁矣讓道不興之弊非徒賢人在下位不得時進也國之良臣荷重任者亦將以漸受罪退矣何以知其然也孔子以爲顏氏之子不貳過耳明非聖人皆有過矣􅃂貴之地欲之者多惡賢能者塞其路其過而毀之者亦多矣夫謗毀之生非徒空設必因人之微過而甚之者也毀謗之言數聞在上者雖欲弗納不能不杖所聞因事之來而微察之也無以其驗至矣得其驗安得不治其罪若知而縱之主之威日衰令之不行自此始矣知而皆治之受罪退者稍多大臣有不自固之心矣夫賢才不進貴臣日疎此有國者之深憂也竊以爲改此俗甚易矣何以知之夫一時在官之人雖雜有凡猥之才其中賢明者亦多矣豈可謂皆不知讓賢爲貴耶􅀡以其時皆不讓習以成俗故遂不爲耳人臣初除皆通表上聞名之謝章所由來尚矣原謝章之本意欲進賢能以謝國恩也昔舜以禹爲司空禹拜稽首讓于稷契及咎繇唐虞之時衆官初除莫不皆讓也謝章之義蓋取於此也書記之者欲以示永世之則季世所用不賢不能讓賢虛謝見用之恩而已相承不變習俗之失也夫叙用之官通章表者其讓賢推能乃通其不能有所讓徒費簡紙者皆絕不通人臣初除各思推賢能而讓之矣讓之文付主者掌之三司有缺擇三司所讓最多者而用之此爲一公缺三公巳豫選之矣且主選之吏不必任公而選三公不如令三公自共選一公爲詳也四征缺擇四征所讓最多者而用之此爲一征缺四征巳豫選之矣必詳於停缺而令主者選四征也尚書缺擇尚書所讓最多者而用之此爲令八尚書共選一尚書詳於臨缺而令主者選八尚書也郡守缺擇衆郡所讓最多者而用之詳於任主者令選百郡守也夫以衆官百郡之讓與主者共相比不可同歲而論也賢愚皆讓百姓耳目盡爲國耳目夫人情爭則欲毀己所不如讓則競推於勝己故世爭則毀譽交錯優劣不分難得而讓也時讓則賢智顯出能否之美歷歷相次不可得而亂也當此時也能退身修己者讓之者多矣雖欲守貧賤不可得也馳騖進趣而欲人見讓猶卻行而求前也夫如是愚智咸知進身求通非修之於己則無由矣遊外求者於此相隨而歸矣浮聲虛論不禁而自息矣人人無所用其心任衆人之議而天下自治矣元康中遷司空閻纘字續伯巴西人也楊駿爲太傅以纘補舍人出爲安復令駿旣被誅莫敢收者纘聞之弃官免歸獨以家財人力修墓終成葬事遷殿中將軍以疾不拜愍懷太子之廢纘輿棺詣闕上書理太子之􅁈朝廷立大孫纘復上疏陳今相國雖已保傅東宮至於旦夕訓誨輔導出入動靜劬勞宜選寒苦之士忠貞淸正老而不衰以爲師傅其侍臣以下文武將吏且勿復取盛戚豪門子弟魏文帝之在東宮徐幹劉楨爲友文學相接之道並如氣類吳太子登顧譚爲友諸葛恪爲賔臥同床帳行則參乘交如布衣此則近代之明比也天子之子不患不富貴不患人不敬畏患於驕盈不聞其過不知稼穡之艱難耳至於甚者乃不知名六畜可不勉哉今不􅃘小相維持令至闕失頓相罪責不亦誤哉大孫幼冲選置兵衛宜得柱石之士如周昌者朝廷善其忠烈擢爲漢中太守段灼字休然敦煌人也爲鄧艾鎭西司馬徵拜議郞世祖卽位灼上疏追理艾曰故征西將軍鄧艾誅以性剛急矜功伐善而不能協同朋類輕犯雅俗失君子之心故莫肯理之者臣敢昧死言艾不反之狀艾本屯田掌犢人宣皇帝㧞之於農吏之中顯之於宰府之職先帝委艾以廟勝成圖指授長策艾受命忘身前無堅敵軍不踰時而巴蜀蕩定艾功名已成亦當書之竹帛傳祚萬世七十老公復何所求哉艾以劉禪初降遠郡未附矯令承制權安社稷雖違常科有合古義原心定罪事可詳論鍾會有吞天下之心恐艾威名知必不同因其疑似構成其事夫反非小事若懷惡心卽當謀及豪桀然後乃能興動大衆不聞艾有腹心一人臨死口無惡言而獨受腹背之誅豈不哀哉故見之者􅂷涕聞之者歎息此賈誼所以忼愾於漢文天下之事可爲痛哭者良有以也昔秦民憐白起之無罪吳人傷子胥之冤酷皆爲之立祠天下之人爲艾悼心痛恨亦由是也謂可聽艾門生故吏收艾屍柩歸葬舊墓以平蜀之功繼封其後使艾闔棺定謚死無所恨赦冤魂於黃泉收信義於後世則天下殉名之士立功之臣必投湯火樂爲陛下死矣世祖得表省覽甚嘉其意虞悝長沙人也弟望字子都並有士操閨門有孝悌之稱鄕黨有廉信之譽譙王承臨州王敦作逆遣使招承承不應與甘卓相結起義赴都承於是命悝爲長史望爲司馬敦遣魏乂等攻戰轉急望臨陳授首悝爲魏乂所害臨刑鄕人送以百數與相酬酢意氣周洽有如平日子弟號泣悝謂曰人生有死闔門爲忠義鬼亦何恨哉及敦被誅詔書追述悝望忠勲贈悝襄陽太守望滎陽太守遣謁者至墓弔祭刑法志侍中臣顧言夫殺生賞罰治亂所由興也人主所謂宜生或不可生則人臣當陳所以宜殺人主所謂宜賞或不應賞則人臣當陳所以宜罰然後治道耳古之聖賢欲上盡理務下收損益莫不深閉愼密以延良謨兆庶內外咸知主如此然後乃展布腹心竭其忠誠耳廷尉劉頌表曰臣昔上行肉刑從來積年遂寢不論臣竊以爲議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過於此今死刑重故非命者衆生刑輕故罪不禁姧所以然者肉刑不用之所致也今爲徒者類性元惡不䡄之族也去家懸遠無衣食之資飢寒切身志不聊生廉士介節者則皆爲盜賊豈況本性姦凶無賴之徒乎是以徒亡日屬賊盜日䌓得輙加刑日益一歲此爲終身之徒也自顧反善無期而灾困逼身其志亡思盜勢不得息事使之然也古者用刑以止刑今反於此以刑生刑以徒生徒諸重犯亡者髮過三寸輙重髠之此以刑生刑加作一歲此以徒生徒也徒亡者積多繫獄猥蓄議者曰囚不可不赦復從而赦之此爲刑不勝罪法不勝姦民知法之不勝相聚而謀爲不䡄月異而歲不同故自頃年以來姦惡凌暴所在充斥漸以滋漫議者不深思此故曰肉刑於名忤聽忤聽孰與盜賊不禁聖王之制肉刑遠有深理其事可得而言非徒心懲其畏剝割之痛而不爲也去其爲惡之具使夫姦民無用復肆其志止姦絕本理之盡也亡者刖其足無所用復亡盜者截其手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此今宜取死刑之限重生刑之限輕及三犯逃亡淫盜悉以肉刑代之其應四五歲刑者皆髠笞使各有差悉不復居作然後刑不復生刑徒不復生徒而殘體爲戮終身作誡民見其痛畏而不犯必數倍於今豈與全其爲姦之手足而蹴居必死之窮地同哉而猶曰肉刑不可用竊以爲不識務之甚也衛展字道野河東人也遷大理上書曰今施行詔書有考子正父死刑或鞭父母問子所在近主者所稱庚寅詔書擧家逃亡家長斬若長是逃亡之主斬之斬之雖重猶可也設子孫犯事將考父祖逃亡逃亡是子孫而父祖嬰其酷傷順破敎如此者衆相隱之道離則君臣之義廢君臣之義廢則犯上之姧生矣秦網密文峻漢興掃除煩苛風移俗易幾於刑厝大人革命不得不蕩其穢匿通其圯滯今詔書宜除者多有便於當今著爲正條則法差簡易元帝令曰自元康已來事故荐臻法禁滋漫大理所上宜朝堂會議蠲除詔書不可用者此􅀌所虛心者也轉廷尉又上言古者肉刑事經前聖愚謂宜復古施行中宗詔曰可內外通共議之於是驃騎將軍王導等議以肉刑之典由來尚矣肇自古先以及三代聖哲明王所未曾改班固深論其事以爲外有輕刑之名內實殺人輕重失當故刑政不中也且原先王之造刑名也非以過怒也非以殘民也所以救姦所以當罪也今盜者竊人之財淫者好人之色亡者避叛之役皆無殺害也刖之以刑刑之則止而加之斬戮戮過其罪死不可生縱虐於此歲以巨計此乃仁人君子所不􅃘聞而況行之於政乎若乃惑其名而不練其實惡其生而趣其死此畏水投舟避坎陷井愚夫之不若何取於政哉百官志中書郞李重以爲等級繁多在職不得久又外選輕而内官重以使風俗大弊宜􅁵改重外選簡階級使官人議曰古之聖王建官􅂷制所以體國經治而功在簡易自帝王而下世有增損舜命九官周分六職秦采古制漢仍秦舊倚丞相任九􅀸雖置五曹尚書令僕射之職始於掌封奏以宣外內事任尚輕而郡守牧民之官重故漢宣稱所與爲治唯良二千石其有殊政者或賜爵進秩諒爲治大體所以遠蹤三代也及至東京尚書雖漸優顯然令僕出爲郡守便入爲三公虞延第五倫桓虞鮑昱是也近自魏朝名守杜畿滿􅃂田豫胡質等居郡十餘二十年或秩中二千石假節猶不去郡此亦古人苟善其事雖没世不徙官之義也漢魏以來內官之貴於今最隆而百官等級遂多遷補轉徙如流能不以著黜陟不得彰此爲治之大弊也夫階級繁多而望官久官不久而望治功成不可得也虞書云三考黜陟幽明周官三年大計羣吏之治而行其誅賞漢法官人或不􅀡秩魏初用輕資亦先試守不稱繼以左遷然則雋才登進無能降退此則所謂有知必試而使人以器者也臣以爲今宜大并羣官等級使同班者不得復稍遷又簡法外議罪之制明試守左遷之例則官人理書士必量能而受爵矣居職者自久則政績可考人心自定務求諸己矣裴顧以萬機庶政宜委宰輔詔命不應數改乃上疏曰臣聞古之聖哲深原治道以爲經理羣務非一才之任照練萬機非一智所達故設官建職制其分局分局旣制則䡄體有斷事務不積則其任易處選賢擧善以守其位委任責成立相干之禁侵官爲曹離局陷姧猶懼此法未足制情以義明防曰君子思不出位夫然故人知厥務各守其所下無越分之臣然後治道可隆頌聲能擧故稱堯舜勞於求賢逸於使能分業旣辨居任得人無爲而治豈不宜哉及其失也官非其才人不守分越位干曹競達所懷衆言紛錯莅職者不得自治其事非任者橫干他分主聽眩莫知所信遂親細事躬自聽斷所綜遂密所吿彌衆功無所歸非無所責羣下弃職得辭宜罰以此望治固其難也昔杜蕢旣數師曠退而自酌以罰干職之非記稱其善陳平不知簿書之目漢史美其守職政不可多門多門則民擾於今之宜選士旣得其人伹當委責若有不稱便加顯戮誰敢不盡心竭力不當便有干職之臣適不守局則所豫必廣所豫適廣則人心赴之人心通赴則得作威福臣作威福朝之蠹也帷幄張子房之謀者不宜使多外委羣司卑力所職尊崇宰輔動靜咨度保任其􅀒如此詔書必不復數改聽聞風言頗以詔命數移易爲不安靜臣不勝狂瞽敢陳愚懷乞陛下少􅂷省察何曾字頴孝陳國人也爲司隷挍尉言於大祖曰公方以孝治天下而聽阮籍以重哀飮酒食肉於公坐宜擯四裔無令汙染華夏大祖曰此子羸病若此君不能爲吾􅃘耶曾重引據辭理甚切朝廷憚焉泰始九年爲司徒以疲疾求退孫綏位至侍中潘淊譖之於太傅越遂被殺初曾吿老時被召見侍坐終日世祖不論經國大事伹說平生常語曾出毎曰將恐身不免亂能及嗣乎吿其二子曰汝等猶可得没指諸孫曰此輩必遇亂死也及綏死兄嵩曰我祖其神乎羊祜字叔子泰山人也都督荊州諸軍事征南大將軍上疏平吳世祖深納之吳軍人前後至者不可勝數祜將入朝而有疾至洛陽遂薨南州市會聞喪擧市悲號而罷於是傳哭接音邑里相達百姓乃樹碑峴峯立廟祭祀行人望碑皆涕泗􅂷泣杜預代鎭名爲墮淚碑吳滅詔曰祜建平吳之規其封祜夫人夏侯氏爲萬歲鄕君邑五千戶絹萬匹吳平慶會羣臣上壽世祖流涕曰此羊太傅之功豈朕所能爲也秦秀字玄良新興人也少以學行忠􅀡知名遷補博士羣率伐吳詔以賈充爲大都督秀性惡憎佞疾之如讎輕鄙賈充聞其爲大統心所不平遂欲哭師及充卒議謚秀請謚爲荒公初何曾卒秀議曰曾事親有色養之名在官奏科尹之模此二者實得臣子事上之槩然資性驕奢不循䡄則朝野之論不可具言儉德之恭也侈惡之大也曾受􅃂二代顯赫累世荷保傅之貴秉司徒之均而乃驕奢之名被於九域有生之民咸怪其行穢皇代之美弃羔羊之節示後生之慠莫大於此若生極其情死又無貶是則無正刑也王公貴人復何畏哉謹案謚法名與實爽曰繆怙亂肆行曰醜曾宜爲繆醜公古人闔棺之日然後誄行不以前善没後惡也秀性悻􅀡與物多忤爲博士前後􅂷二十年卒於官李憙字季和上黨人也累辟三府不就宣帝復辟爲太傅屬固辭世宗輔政命憙爲大將軍從事中郞憙到引見謂憙曰昔先公辟君而不應今􅀌命君而至何也對曰先君以禮見待憙得以禮進退明公以法見繩憙畏法而至帝甚敬重焉遷太常司隷校尉羣書治要卷第二十九

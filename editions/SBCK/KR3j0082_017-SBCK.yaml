front:
  text: 羣書治要卷第十九
  hash: sha256:4f688da0ca32d5218b59eaa7072af8c03d56d80d18b778b63d160701f8ae2542
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0082_SBCK_017-1a}
body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰漢書七傳朱雲字游魯人也成帝時故丞相安昌侯張禹以帝師位特進甚尊雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐孔子所謂鄙夫不可與事君苟患失之亡所不至者也臣願賜尚方斬馬劔斷佞臣一人以厲其餘上問誰也對曰丞相安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂􅀡於世使其言是不可誅其言非固當容之臣以死爭慶忌叩頭流血上意解然後得巳及後當治殿檻上曰勿易因而輯之以旌􅀡臣雲自是之後不復仕梅福字子眞九江人也成帝委任大將軍王鳳而京兆尹王章素忠􅀡譏鳳爲鳳所誅羣下莫敢正言故福上書曰臣聞箕子陽狂於殷而爲周陳洪範叔孫通遯秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而叛親也不可爲言也昔高祖納善若不及從諫若轉圜聽言不求其能擧功不考其素陳平起於亡命而爲謀主韓信㧞於行陣而建上將故天下之士雲合歸漢爭進奇異智者竭其䇿愚者盡其慮勇士極其節怯夫勉其死合天下之智并天下之威是以擧秦如鴻毛取楚若拾遺此高祖所以無敵於天下也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輙報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下拒臣者三矣此天下士所以不至也今陛下旣不納天下之言又加戮焉夫䳒鵲遭害則仁鳥增逝愚者􅀩戮則智士深退間者愚民上疏多觸不急之法或下廷尉而死者衆自陽朔以來天下以言爲諱朝廷尤甚羣臣承順上指莫有執正何以明其然也取民所上書陛下之所善者試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠􅀡敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子惡惡止其身王章非有反叛之辜而殃及家折􅀡士之節結諫臣之舌羣臣皆知其非然不敢爭天下以言爲戒最國家之大患也雋不疑字曼倩勃海人也爲京兆尹吏民敬其威信始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃冐詣北闕自謂爲衛太子詔使公卿將軍雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言不疑後到叱從吏使收縛或曰是非未可知且安之不疑曰昔蒯聵違命出奔輙拒而不內春秋是之衛太子得罪先帝亡不卽死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼由是名聲重於朝廷在位者皆自以不及也廷尉驗治竟得姧詐疏廣字仲翁東海人也爲太子太傅兄子受爲少傅太子外祖父平恩侯許伯以爲太子幼白使其弟中郞將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家且太子自有大傅少傅官屬巳備今復使舜護太子家示陋非所以廣太子德於天下也上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣由是見器重于定國字曼倩東海人也其父于公爲郡決曹決獄平羅文法者于公所決皆不恨郡中爲之生立祠名曰于公祠定國少學法於父爲廷尉其決疑平法務在哀鰥寡罪疑從輕加審愼之心朝廷稱之曰張釋之爲廷尉天下無冤民于定國爲廷尉民自以爲不冤遷御史大夫爲丞相始定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄未嘗有所冤子孫必有興者至定國爲丞相子永爲御史大夫封侯傳世云薛廣德字長卿沛郡人也爲人温雅及爲三公􅀡言諫爭成帝幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極民人流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂天下幸甚上卽日還其秋上酎祭宗廟出便門欲御樓舩廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汗車輪陛下不得入廟矣上不悅先驅光祿大夫張猛進曰臣聞主聖臣􅀡乘舩危就橋安聖主不乘危御史大夫言可聽乃從橋王吉字子陽琅耶人也爲諫大夫是時宣帝頗修武帝故事宮室車服盛於昭帝時外戚許史王氏貴􅃂而上躬親政事任用能吏吉上疏言得失曰陛下總萬方帝王圖籍日陳於前惟思世務將興大平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諫從然未有建萬世之長䇿擧明主於三代之隆者也其務在於期會簿書斷獄聽訟而巳此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化遠民者弱而不可勝愚而不可欺也聖主獨行於深宮得則天下稱誦之失則天下咸言之行發於近必見於遠謹選左右審擇所使左右所以正身也所使所以宣德也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所由以意穿鑿各取一切是以百里不同風千里不同俗詐僞萠生刑罰無極質樸日銷恩愛寢薄孔子曰安上治民莫善於禮非空言也臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制毆一世之人躋之仁壽之域則俗何以不若成康壽何以不若高宗竊見當世趍務不合於道者謹條奏唯陛下裁擇焉吉意以爲漢家列侯尚公主諸侯則國人承翁主娶天子女則曰尚公主國人娶諸侯女曰承翁主也使男事女夫詘於婦逆陰陽之位故多女亂古者衣服車馬貴賤有章以襃有德而别尊卑今上下僭差人人自制是故貪財趍利不畏死亡周之所以能致治刑措而不用者以其禁邪於㝠㝠絕惡於未萠也又言舜湯不用三公九卿之世而擧咎繇伊尹不仁者遠今使俗吏得任子弟漢舊儀子弟以父兄任爲郞率多驕傲不通古今至於積功治人無益於民此伐檀所爲作也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉民見儉則歸本本立而末成其指如此上以其言迂闊不甚􅃂異也吉遂謝病歸貢禹字少翁琅耶人也元帝初卽位徵爲諫大夫數虛巳問以政事是時年歲不登郡國多困禹奏言古者宮室有制宮女不過九人秣馬不過八匹牆塗而不雕木摩而不刻車輿器物皆不文畫􅁐不過數十里與民共之任賢使能什一而稅無他賦歛繇戍之役使民歲不過三日故天下家給人足頌聲作至高祖孝文孝景循古節儉宮女不過十餘人廐馬百餘匹孝文皇帝衣綈履革器無雕文金銀之飾後世爭爲奢轉轉益甚臣下亦相放效衣服亂於主上甚非宜然非自知奢僭也今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以爲盡如大古難宜少放古以自節焉方今宮室巳定無可奈何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官一歲費數鉅萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬河內懷蜀郡成都廣漢皆有工官工官主漆器物東西織室亦然廐馬食粟將萬匹臣禹嘗從之東宮見賜杯案盡文畫金銀飾非當所以賜食臣下也東宮之費亦不可勝計天下之民所爲大飢餓死者是也今民大飢而死人至相食而廐馬食粟苦其大肥氣盛怒至乃日歩作之王者受命於天爲民父母固當若此乎天不見邪武帝時又多取好女至數千人以塡後宮及棄天下昭帝幼弱霍光專事不知禮正妄多藏金錢財物鳥獸魚鼈凡百九十物盡􅙁藏之又皆取後宮女置於園陵大失禮逆天心昭帝晏駕光復行之至孝宣皇帝時羣臣亦隨故事甚可痛也故使天下承化及衆庶葬埋皆虛地上以實地下其過自上生皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二審察後宮擇其賢者留二十人餘悉歸之諸陵園女無子者宜皆遣廐馬可無過數十匹獨舍長安城南􅁐地以爲田獵之囿自城西南至鄠皆復其田以與貧民方今天下飢饉可無大自損減以救之稱天意乎天生聖人蓋爲萬民非獨使自娛樂而巳也當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也臣禹不勝拳拳不敢不盡愚心天子納善其忠乃下詔令太僕減食穀馬水衡減食肉獸省宜春下􅁐以與貧民又罷角抵諸戲及齊三服官遷禹爲光祿大夫禹又言孝文皇帝時貴廉潔賤貪汗賞善罰惡不阿親戚罪白者伏其誅疑者以與民無贖罪之法故令行禁止海內大化與刑措無異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂縱嗜欲用度不足乃行一切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏誅則擇便巧史書習於計簿能欺上府者以爲右職姦䡄不勝則取勇猛能操切百姓以苛暴威服下者使居大位故無義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故俗皆曰何以孝悌爲財多而光榮何以禮義爲史書而仕宦何以謹愼爲勇猛而臨官故黥劓而髠鉗者猶復攘臂爲政於世而行雖犬彘家富埶足目指氣使是爲賢耳謂居官而致富者爲雄桀處姦而得利者爲壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得眞賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選擧不以實及有臧者輙行其誅無伹免官則爭盡力爲善貴孝悌賤賈人進眞賢擧實廉而天下治矣孔子匹夫之人耳以樂道正身不懈之故四海之內天下之君微孔子之言無所折中況乎以漢地之廣陛下之德處南面之尊因天地之助其於以變世易俗調和陰陽陶冶萬物化正天下易於決流抑墜墜物欲墜落也自成康以來幾且千歲欲爲治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念高祖之苦醇法太宗之治正巳以先下選賢以自輔開進忠正致誅姦臣遠放諂佞放出園陵之女罷倡樂絕鄭聲去甲乙之帳退僞薄之物修節儉之化驅天下之民皆歸於農如此不懈則三王可侔五帝可及唯陛下留意省察天下幸甚上雖未盡從嘉其質􅀡之意而省其半鮑宣字子都渤海人也爲諫大夫以丁傅子弟並進董賢貴幸上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰無度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今奈何反覆劇於前乎朝臣無有大儒骨鯁白首耆艾魁壘之士魁壘壯貌論議通古今喟然動衆心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省戶下陛下欲與此共承天地安海內甚難今俗謂不知者爲能謂智者爲不能昔堯放四罪而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑請寄爲姦羣小日進國家空虛用度不足民流亡去城郭盜賊並起吏爲殘賊歲增於前凡民有七亡陰陽不和水旱爲灾一亡也縣官重責更賦租稅二亡也貪吏並公受取不巳三亡也豪強大姓􅁞食無厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮列六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏􅇌殺一死也治獄深刻二死也冤陷無辜三死也盜賊橫發四死也怨讎相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流敎化者邪志伹在營私家稱賔客爲姦利而巳以苟容曲從爲賢以拱黙尸祿爲智謂如臣宣等爲愚陛下擢臣岩穴誠冀有益豪毛豈徒欲使臣美食大官重高門之地哉高門殿名天下乃皇天之天下也陛下上爲皇天子下爲􅀺庶父母爲天牧養元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可爲酸鼻陛下不救將安所歸命乎奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒霍肉視酒如漿視肉如霍也蒼頭廬兒皆用致富非天意也漢名奴爲蒼頭諸給殿中者所居爲廬蒼頭侍從因呼廬兒及汝昌侯傅商無功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天悅民服不亦難乎治天下者當用天下之心爲心不得自專快意而巳也上之皇天見譴下之􅀺庶恨怨上以宣名儒優而納之宣復上書言陛下父事天母事地子養􅀺民卽位以來父虧明母震動子訛言相驚恐今日蝕於三始正月一日爲歲之朝月之朝日之朝始猶朝也誠可畏懼小民正月朔日尚恐毀敗器物何況於日虧乎魏相字弱翁濟陰人也爲丞相宣帝與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞救亂誅暴謂之義兵兵義者王敵加於巳不得巳而起者謂之應兵兵應者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非伹人事乃天道也間者匈奴常有善意所得漢民輙奉歸之未有犯於邊境雖爭屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵軍旅之後心有凶年言民以其愁苦之氣傷陰陽之和也出兵雖勝猶有後憂恐灾害之變因此以生今郡國守相多不實選風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以爲此非小變也今左右不憂此乃欲發兵報纖介之忿於遠夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內者也願陛下與有識者詳議乃可上從相言而止丙吉字少卿魯國人也代魏相爲丞相吉本起獄法小吏及居相位尚寛大好禮讓嘗出逢淸道羣鬭者死傷橫道吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吉止駐使騎吏問逐牛行幾里矣掾史謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而巳宰相不親小事非所當於道路問也方春少陽用事未可以􅀬恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和陰陽職所當憂是以問之掾史乃服以吉知大體京房字君明東郡人也以孝廉爲郞是時中書令石顯專權顯友人五鹿充宗爲尚書令與房同經論議相非二人用事房甞宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任巧佞房曰知其巧佞而用之耶將以爲賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷爲卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年灾異以示萬世之君今陛下卽位以來日月失明星辰逆行山崩泉涌地震石隕夏霜冬雷春凋秋榮水旱螟蟲民人飢疫盜賊不禁刑人滿市春秋所記灾異盡備陛下視今爲治耶亂耶上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其愈於彼又以爲不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今爲亂者誰哉房曰明主宜自知之上曰不知也如知之何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰巳諭房罷出後石顯五鹿充宗皆疾房欲遠之建言宜試以房爲郡守元帝於是以房爲魏郡太守顯吿房與張博通謀非謗政治歸惡天子詿誤諸侯王房博皆棄市蓋寬饒字次公魏郡人也爲司􅀠校尉刺擧無所􅅆避公卿貴戚及郡國吏繇使至長安莫敢犯禁京師爲淸爲人剛􅀡高節志在奉公以言事不當意而爲文法吏所詆挫大夫鄭昌上書頌寛饒曰臣聞山有猛獸藜藿爲之不採國有忠臣姦邪爲之不起司􅀠校尉寬饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬許伯宣帝后父也史高宣帝外家也下無金張之託金日磾張安世也職在司察􅀡道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諫爲名不敢不言上不聽遂下寬饒吏寛饒引佩刀自剄北闕下衆莫不憐之諸葛豐字少季琅耶人也爲司􅀠校尉刺擧無所避侍中許章奢淫不奉法度賔客犯事與章相連豐按劾章欲收之章迫窘馳車去得入宫門自歸於是收豐節豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下拜爲司􅀠校尉未有以自效故常願捐一且之命而斷姦臣之首懸於都市編書其罪使四方明知爲惡之罰然後却就斧􅃏之誅誠臣所甘心也夫以布衣尚猶有刎頸之交今以四海之大曾無伏節死義之臣率盡苟合取容阿黨相爲念私門之利忘國家之政邪穢溷濁之氣上感于天是以灾變數見百姓困乏此臣下不忠之效也臣誠耻之無巳凡人情莫不欲安存而惡危亡然忠臣􅀡士不避患害者誠爲君也臣竊不勝憤懣願賜淸宴唯陛下裁幸上不許是後所言益不用豐復上書言臣聞伯奇孝而棄於親子胥忠而誅於君隱公慈而殺於弟叔武弟而殺於兄夫以四子之行屈平之材然猶不能自顯而被刑戮豈不足以觀哉使臣殺身以安國􅀩誅以顯君臣誠願之獨恐未有云補而爲衆邪所排令讒夫得遂正􅀡之路壅塞忠臣沮心智士杜口此愚臣之所懼也劉輔河間人也爲諫大夫會成帝欲立趙倢伃爲皇后輔上封事曰今廼觸情縱欲傾於卑賤之女欲以母天下不畏乎天不媿于人惑莫大焉里語曰腐木不可以爲柱卑人不可以爲主天人之所不與必有禍而無福市道皆共知之朝臣莫肯一言臣竊傷心自念得以同姓㧞擢尸祿不忠汙辱諫爭之官不敢不盡死唯陛下察焉書奏上使侍御史收縛輔繫掖庭秘獄羣臣莫知其故於是左將軍辛慶忌右將軍廉襃光祿勲師丹太中大夫谷永俱上書曰臣聞明主􅂷寛容之聽崇諫爭之官廣開忠􅀡之路不罪狂狷之言然後百僚在位竭忠盡謀不懼後患朝廷無諂諛之士元首無失道之愆竊見諫大夫劉輔前以縣令求見擢爲諫大夫此其言必有卓詭切至當聖心者故得㧞至於此旬日之間收下秘獄臣等愚以爲輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隱忍而巳如有大惡宜暴治理官與衆共之今天心未豫豫悅豫也灾異屢降水旱迭臻方當隆寛廣問襃􅀡盡下之時也而行慘急之誅於諫爭之臣震驚羣下失忠􅀡心假令輔不坐􅀡言所坐不著天下不可戶曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心莫敢盡節正言非所以昭有虞之聽廣德美之風也臣等竊深傷之唯陛下留神省察上廼減死罪鄭崇字子游本高密人也哀帝擢爲尚書僕射數求見諫爭上初納用之每見曵革履上咲曰我識鄭尚書履聲久之上欲封祖母傅大后從弟商崇諫曰孝成皇帝封親舅五侯天爲赤黃晝昬日中有黑氣今祖母從昆弟二人巳侯孔鄕侯皇后父高武侯以三公封尚有因緣今無故欲復封商壞亂制度逆天人心非傅氏之福也臣願以身命當咎崇因持詔書案起持當受詔書案起去傅太后大怒曰何有爲天子乃反爲一臣所專制邪上遂下詔封商爲汝昌侯崇又以董賢貴􅃂過度數諫由是重得罪數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞諂素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治死獄中荀悅紀論曰夫臣下之所以難言者何也言出乎口則咎悔及之矣故擧過揚非則刺上之譏言而當則耻其勝巳也言而不當則賤其愚也先巳而同則惡其奪巳之明也後巳而同則以爲順從也違下從上則以爲諂諛也違上從下則以爲雷同也與衆共言則以爲順􅀒也違衆獨言則以爲專美也言而淺露則簡而薄之深妙弘遠則不知而非之特見獨知則衆共蓋之雖是而不見稱與衆同智則以爲附隨也雖得之不以爲功據事盡理則以爲專必謙讓不爭則以爲易窮言而不盡則以爲懷隱進說竭情則謂之不知量言而不効則受其怨責言而事効則以爲固當也或利於上不利於下或便於右不便於左或合於前而忤於後夫能應事當理決疑定功發情起意値所欲聞不害上下無妨於時言立而䇿成始無咎悔若此之比百不一遇又智之所見萬不一及也且犯顏冐死下之所難言也拂㫖忤情上之所難聞也以難言之臣忤難聞之主以萬不一及之智求百不一遇之時此下情所以常不通也非唯君臣而巳凡言亦皆如之是乃仲尼所以發憤嗟歎稱吾欲無言者也蕭望之字長倩東海人也爲諫大夫出爲平原太守上疏曰陛下哀愍百姓恐德化之不究悉出諫官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無達士則不聞善願陛下選明經術温故知新通於幾微謀慮之士以爲內臣與參政事諸侯聞之則知國家納諫憂政無有闕遺若此不怠成康之道其庶幾矣外郡不治豈足憂哉書聞徵入守少府爲御史大夫五鳳中匈奴大亂議者多曰匈奴爲害日久可因其壞亂擧兵滅之詔問望之對曰春秋晉士匄帥師侵齊聞齊侯卒而還君子大其不伐喪以爲恩足以服孝子誼足以動諸侯前單于慕化鄕善遣使請求和親海內欣然夷狄莫不聞不幸爲賊臣所殺今而伐之是乘亂而幸灾也彼必奔走遠遯不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其灾患四夷聞之咸貴中國之仁義必稱臣服從此德之盛也上從其議宣帝寑疾選大臣可屬者引外屬侍中史高太子太傅望之少傅周堪至禁中拜高爲車騎將軍望之爲前將軍堪爲光祿大夫皆受遺詔輔政孝元皇帝卽位望之堪本以師傅見尊重數宴見言治亂陳王事望之選白宗室明經達學劉更生與金敞並拾遺左右四人同心謀議多所匡正中書令弘恭石顯久典樞機與車騎將軍高爲表裡論議常持故事不從望之等望之以爲中書政本宜以賢明之選自武帝游宴後庭故用宦者非國舊制又違古不近刑人之義白欲更置士人由是大與高恭顯忤恭顯令鄭朋華龍二人吿望之等謀欲罷車騎將軍疏退許史狀候望之出休日令朋龍上之事下弘恭恭顯奏望之堪更生朋黨相稱擧數譖大臣毀離親戚欲以專擅權執爲臣不忠誣上不道請召致廷尉時上初卽位不省召致廷尉爲下獄也可其奏後上召堪更生曰繫獄上大驚責恭顯皆叩頭謝上曰令出視事恭顯因使高言上新卽位而先驗師傅旣下獄宜因決免於是望之堪更生皆免爲庶人後數月賜望之爵關內侯給事中恭顯等知望之素高節不詘辱白望之前輔政欲專權擅朝幸得不坐復賜爵邑與聞政事不悔過服罪深懷怨望自以託師傅懷終不坐非頗詘望之於牢獄塞其怏怏心則聖朝無以施恩厚上曰蕭太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必無所憂上乃可其奏顯等封以付謁者因急發車騎馳圍其第使者至召望之望之仰天歎曰吾甞備位將相年踰六十矣老入牢獄苟求生活不亦鄙乎竟自殺天子聞之驚拊手曰果殺吾賢傅是時太官方上晝食上乃却食爲之涕泣哀慟左右顯等免冠謝良久然後巳羣書治要卷第十九

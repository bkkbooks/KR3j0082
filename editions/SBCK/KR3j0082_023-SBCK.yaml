body:
  text: 秘書監鉅鹿男臣魏徵等奉勅撰魏志下傳陳思王植字子建每進見難問應聲而對特見􅃂愛旣以才見異而丁儀丁廙楊脩等爲之羽翼太祖狐疑幾爲太子者數矣黃初三年立爲鄄城王太和元年徙爲壅丘王三年徙封東阿王五年上疏求存問親戚因致其意曰臣聞天稱其高以無不覆地稱其廣以無不載日月稱其明以無不照江海稱其大以無不容故孔子曰大哉堯之爲君唯天爲大唯堯則之夫天德之於萬物可謂弘廣矣蓋堯之爲敎先親後疏自近及遠周之文王亦崇厥化昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之同盟異姓爲後誠骨肉之恩爽而不離親親之義寔在敦固未有義而後其君仁而遺其親者也臣伏惟陛下資帝唐欽明之德體文王翼翼之仁惠洽椒房恩昭九親羣后百寮番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕巳治人推惠施恩者矣至於臣等㛰媾不通兄弟乖絕吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越以一切之制無朝覲之望至於注心皇極結情紫闥神明知之矣願陛下沛然􅂷詔使諸國慶問得展以叙骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺歲得再通齊義於貴宗等惠於百司如此則風雅所詠復存於聖世矣臣伏自思惟無錐刀之用及觀陛下之所戒授若以臣爲異姓竊自料度不後於朝士矣若得辭遠遊戴武弁解朱組佩靑紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華蓋入侍輦轂承答聖問拾遺左右乃臣丹誠之至願也遠慕鹿鳴君臣之宴中詠常棣匪他之戒下思伐木友生之義終懷蓼莪罔極之哀每四節之會塊然獨處左右唯僕􅀠所對唯妻子高談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以爲犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心況徒虛語耳若葵藿之傾葉大陽不爲之􅂞光亦終向者誠也竊自比葵藿若降天地之施􅂷三光之明者寔在陛下今之否隔友于同憂而臣獨倡言者竊不願於聖世使有不􅀩施之物必有慘毒之懷故栢舟有天只之怨谷風有弃予之歎故伊尹耻其君不如堯舜臣之愚蔽欲使陛下崇光日月被時雍之美者是臣慺慺之誠也詔報曰夫忠厚仁及草木則行葦之詩作恩澤衰薄不親九屬則角􅃓之章刺今令諸國兄弟情理簡怠妃妾之家膏沐疎略縱不能敦而睦之王援古喩義備矣悉矣何言精誠不足以感通哉夫明貴賤崇親親禮賢良順少長國之綱紀本無禁諸國通問之詔也矯枉過正下吏懼譴以至於此耳巳勅有司如王所訴植復上疏陳審擧之義曰臣聞天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也書曰有不世之君必能用不世之臣用不世之臣必能立不世之功昔樂毅奔趙心不忘燕廉頗在楚思爲趙將臣生乎亂長乎軍又數承敎于武皇帝伏見行師用兵之要不必取孫吳而闇與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須臾之間使臣得一散所懷攄盡藴積死不恨矣然天高聽遠情不上通徒獨望靑雲而拊心仰高天而歎息耳屈平曰國有驥而不知乘焉遑遑而更索昔管蔡放誅周邵作弼叔魚陷刑叔向匡國三監之舋臣自當之二南之輔求必不遠華宗貴族藩王之中必有應斯擧者故傳曰無周公之親不得行周公之事唯陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而巳未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越難周靑臣可謂知時變矣能使天下傾耳注目者當權者是矣故謀能移主威能慴下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕蓋取齊者田族非呂宗也分晉者趙魏非姬姓也唯陛下察之苟吉專其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮没同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉今臣與陛下踐冰履炭高下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅弃臣死之後事可思魏略曰植以近前諸國士息巳見發其遺􅀌稚弱在者無幾而復被取乃上書曰臣聞古之聖君與日月齊其明四時等其信恩不中絕敎無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以授官必巳之可以投命雖有構會之徒泊然不以爲懼者蓋君臣相信之明效也臣初受封策書曰植受兹靑社爲魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百餘人皆使年壯備有不虞檢校乘城顧不足以自救況皆復耄耋罷曵乎而名爲魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以爲三軍益損不復賴此方外定否必當須辦者臣願將部曲倍道奔赴夫妻􅀒襁子弟懷粮蹈鋒履刄以殉國難何伹習業小兒哉愚誠以揮涕增河鼷鼠飮海於朝萬無損益於臣家計甚有廢損又臣士息前後三送兼人巳竭唯尚有小兒七八歲巳上十六七巳還三十餘人今部曲皆年耆臥在床席非糜不食眼不能視氣息裁屬者凡三十七人疲瘵風靡疣盲聾聵者二十三人唯正須此小兒大者可備宿衛雖不足以禦冦粗可以警小盜小者未堪大使爲可使耘鋤穢草驅護鳥雀休候人則一事廢一日獵則衆業散不親自經營則功不攝常自躬親不委下吏而巳陛下聖仁恩詔三至士子給國長不復發明詔之下有若皦日保金石之恩必明神之信定習業者並復見送晻若晝晦悵然失圖伏以爲陛下旣爵臣百僚之右居潘國之任爲置卿士屋名爲宮冢名爲陵不使其危居獨立無異於凡庶若陛下聽臣悉還部曲罷官屬省監官使解璽釋紱追栢成子仲之業營顏淵原憲之事居子臧之廬宅延陵之室如此雖進無成功退有可守節身死之日猶松喬也然伏度國朝終未肯聽臣之若是固當羈絆於世繩維繫于祿位懷屑屑之小憂執無巳之百念安得蕩然肆志逍遙於宇宙之外哉此願未從陛下必欲崇親親篤骨肉潤白骨而榮枯木者唯遂仁德以副前恩有詔皆遂還之也六年封植爲陳王時法制待藩國旣自峻逼寮屬皆賈豎下才兵人給其殘老大數不過二百人十一年而三徙都常汲汲無歡遂發疾薨孫盛曰異哉魏氏之封建也不度先王之典不思藩屛之術違敦穆之風背維城之義漢初之封或權侔人主雖云不度時勢然也魏氏諸侯陋同匹夫雖懲七國矯枉過也且魏之代漢非積德之由風澤旣微六合未一而彫翦枝幹委權異族勢同瘣木危若巢幕不嗣忽諸非天喪也五等之制萬世不易之典六代興亡曹冏論之詳矣中山恭王袞每兄弟遊娛袞獨譚思經典文學防輔遂共表稱陳袞美袞聞之大驚懼責讓文學曰修身自守常人之行耳而諸君乃以上聞是適所以增其􅀒累也且如有善何患不聞而遽共如是是非益我其誠愼如此袞尚約儉敎勅妃妾紡績織絍習爲家人之事袞病困令世子曰汝幼少未聞義方早爲人君伹知樂不知苦必將以驕奢爲失也接大臣務以禮雖非大臣老者猶宜答拜事兄以敬恤弟以慈兄弟有不良之行當造膝諫之諫之不從流涕喩之喩之不改乃白其母若猶不改當以奏聞并辭國土與其守􅃂罹禍不若貧賤全身也此亦謂大罪惡耳其微過細愆故當奄覆之嗟乎小子愼脩乃身奉聖朝以忠貞事太妃以孝敬閨闈之內奉令於太妃閫閾之外受敎於沛王無怠乃心以慰余靈薨詔使大鴻臚持節典護喪事贈􅈖甚厚評曰魏氏王公徒有國土之名而無社稷之實又禁防擁隔同於囹圄位號靡定大小歲易骨肉之恩乖棠棣之義廢爲法之弊一至于此乎魏氏春秋載宗室曹冏上書曰臣聞古之王者必建同姓以明親親必樹異姓以明賢賢故傳曰庸􅈴親親眤近尊賢書曰克明俊德以親九族詩云懷德惟寧宗子維城由斯觀之非賢無與興功非親無與輔治也夫親親之道專用則其漸也微弱賢賢之道偏任則其弊也劫奪先聖知其然也故博兼親疎而並用之近則有宗盟藩衛之固遠則有仁賢輔佐之助興則有與共其治衰則有與守其土安則有與享其福危則有與同其禍夫然故能有其國家本枝百世也今魏尊尊之法雖明親親之道未備詩不云乎鶺鴒在原兄弟急難以斯言之明兄弟相救於喪亂之際同心於憂禍之間雖有鬩墻之忿不忘禦侮之事何則憂患同也今則不然或任而不重或釋而不任一旦疆場稱警關門反拒股肱不扶胸心無衛臣竊惟此寢不安席謹撰合所聞叙論成敗論曰昔夏殷周歷世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂也秦王獨制其民故傾危莫救也夫與人共其樂者人必憂其憂與人同其安者人必拯其危先王知獨治之不能久也故與人共治之知獨守之不能固也故與人共守之兼親疎而兩用參同異而並建是以輕重足以相鎭親疎足以相衛并兼路塞逆節不生及其衰也桓文帥禮王綱弛而復張諸侯傲而復肅二覇之後浸以陵遲吳楚慿江漢􅀒固方城雖心希九鼎而畏迫宗姬姦情散於匈懷逆謀消於唇吻斯豈非信重親戚任用賢能枝葉碩茂本根賴之與自此之後轉相攻伐曁于戰國諸姬微矣至於王赧降爲庶人猶枝葉相持得居虛位海內無主四十餘年秦據形勝之地騁譎詐之術至於始皇乃定天位曠日若彼用力若此豈非深固根蔕不㧞之道乎秦觀周之弊以爲小弱見奪於是廢五等之爵立郡縣之官子弟無尺寸之封功臣無立錐之土內無宗子以自毘輔外無諸侯以爲藩衛仁心不加於親戚惠澤不流於枝葉譬猶芟刈股肱獨任胸腹浮舟江海弃捐楫櫂觀者爲之寒心而始皇晏然自以爲關中之固金城千里子孫帝王萬世之業也豈不悖哉至於身死之日無所寄付委天下之重於凡人之手託廢立之命於姦臣之口至令趙高之徒誅鋤宗室胡亥少習刻薄之敎長遭凶父之業不能改制易法􅃂任兄弟而乃師譚申商諮謀趙高自幽深宮委政讒賊身殘望夷求爲黔首豈可得哉遂乃郡國離心衆庶潰叛勝廣倡之於前劉項弊之於後向使始皇納淳于之策抑李斯之論割裂州國分王子弟封三代之後報功臣之勞士有常君人有定主枝葉相扶首尾爲用雖使子孫有失道之行時人無湯武之賢姦謀未發而身巳屠戮何區區之陳項而得措其手足哉故漢祖奮三尺之劍驅烏集之衆五年之中而成帝業自開闢巳來其興立功􅈴未有若漢祖之易者也夫伐深根者難爲功摧枯朽者易爲力理勢然也漢監秦之失封殖子弟及諸呂擅權圖危劉氏而天下所以不傾動者百姓所以不易心者徒以諸侯強大盤石膠固東牟朱虛受命於內齊代吳楚作衛于外也向使高祖踵亡秦之法忽先王之制則天下巳傳非劉氏有也然高祖封建地過古制大者跨州兼郡小者連城數十上下無别權侔京室故有吳楚七國之患賈誼曰諸侯強盛長亂起姦莫若衆建諸侯而少其力則下無背叛之心上無誅伐之事文帝不從至於孝景猥用晁錯之計削黜諸侯親者怨恨疏者震恐吳越倡謀五國從風兆發高帝舋鍾文景由寬之過制急之不漸故也所謂末大必折尾大難掉尾同於體猶或不從況乎非體之尾其可掉哉武帝從主父之策下推恩之令自是之後齊分爲七趙分爲六淮南三割梁代五分遂以陵遲子孫微弱衣食租稅不預政事或以酎金免削或以無後國除至於成帝王氏擅朝劉向諫曰臣聞公族者國之枝葉枝葉落則本根無所庇蔭其言深切多所稱引成帝雖悲傷歎息而不能用至于哀平異姓秉權假周公之事而爲田常之亂高拱而竊天位一朝而臣四海漢宗室王侯解印釋綬貢奉社稷猶懼不得爲臣妾或乃爲之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝於惠文之間而叛逆於哀平之際也徒權輕勢弱不能有定耳賴光武皇帝挺不世之姿禽王莽於巳成紹漢嗣於旣絕斯豈非宗子之力耶而曾不監秦之失策襲周之舊制踵亡國之法而徼倖無疆之期至於桓靈閹豎執衡朝無死難之臣外無同憂之國君􅀌立於上臣弄權於下本末不能相御身首不能相使由是天下鼎沸姦凶並爭宗廟焚爲􅁅燼宮室變爲榛藪居九州之地而身無所安處悲夫漢氏奉天禪位於大魏大魏之興于今二十四年矣觀五代之存亡而不用其長策覩前車之傾覆而不改其轍迹子弟王空虛之地君不使之民宗室竄於閭閻不聞􅀖國之政權均匹夫勢齊凡庶內無深根不㧞之固外無盤石宗盟之助非所以保安社稷爲萬世之策且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人間厠其間非所以強幹弱枝備萬一之虞也今之用賢或超爲名都之主或爲偏師之帥而宗室有文者必限小縣之宰有武者必置於百人之上使夫廉高之士畢志於衡軛之內才能之人耻與非類爲伍非所以勸進賢能褒異宗室之禮夫泉涸則流竭根朽則葉枯枝繁者蔭根條落者本􅀌故語曰百足之蟲至死不僵扶之者衆也此言雖小可以譬大且墉基不可倉卒而成威名不可一朝而立皆爲之有漸建之有素譬之種樹久則深固其根本茂盛其枝葉若造次徙於山林之中植於宮闕之下雖壅之以黑墳煖之以春日猶不救於枯槁何暇蕃育哉夫樹猶親戚土猶士民建置不久則輕下慢上平居猶懼其離叛危急將如之何是以聖王安而不逸以慮危也存而設備以懼亡也故疾風卒至而無摧㧞之憂天下有變而無傾危之患矣王粲字仲宣山陽人也拜侍中始文帝爲五官將及平原侯植皆好文學粲與徐幹陳琳阮瑀應瑒劉禎並見友善琳字孔璋避難冀州袁紹使典文章魏氏春秋載紹使琳作檄文曰司空曹操祖父騰故中常侍與左悺徐璜並作妖孽饕餮放橫傷化虐民父嵩乞匄攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無令德僄狡鋒俠好亂樂禍幕府昔遇董卓侵官暴國方羅英雄弃瑕錄用謂其鷹犬之才􅀲牙可任遂乘資䟦扈肆行酷裂割剝元元殘賢害善放志專行威劫省禁卑侮王宮敗法亂紀坐召三臺專制朝政爵賞由心刑罰由口所愛光五宗所惡滅三族羣談者􅀩顯誅腹議者􅀩隱戮道路以目百寮鉗口梁孝王先帝母弟墳陵尊顯操率將士親臨發掘破棺裸尸略取金寶又署發丘中郎將模金校尉所過墮突無骸不露身處三公之官而行桀虜之態殄國虐民毒流人鬼加其細政苛慘科防互設繒繳充蹊坑穽塞路歷觀古今書籍所載貪殘虐烈無道之臣於操爲甚袁氏敗琳歸太祖太祖謂曰卿昔爲本初移書伹可罪狀􅀌而巳惡惡止其身何乃上及父祖耶琳謝罪文士傳稱琳謝曰楚漢未分蒯通進策於韓信乾時之戰管仲肆力於子糾唯欲效計其主取禍一時故跖之客可使刺由桀之犬可使吠堯也今明公必能進賢於忿後弃愚於愛前四方革命而英豪託心矣唯明公裁之太祖愛才而不咎也太祖以琳爲軍謀祭酒管記室衛覬字伯儒河東人也爲尚書明帝卽位百姓凋匱而役務方殷覬上疏曰夫變情厲性強所不能人臣言之旣不易人主受之又艱難且人之所樂者富貴榮顯也所惡者貧賤死亡也然此四者君上之所制君愛之則富貴顯榮君惡之則貧賤死亡順指者愛所由來也逆意者惡所從至也故人臣皆爭順指而避逆意非破家爲國殺身成君者誰能犯顏色觸忌諱建一言開一說哉陛下留意察之則臣下之情可見矣今議者多好悅耳其言治則比陛下於堯舜其言征伐則比二虜於狸鼠臣以爲不然漢文之時諸侯強大賈誼累息以爲至危況今四海之內分而爲三羣士陳力各爲其主是與六國分治無以爲異也當今千里無煙遺民困苦陛下不善留意將遂凋弊難可復振禮天子之器必有金玉之飾飮食之肴必有八珍之味至於凶荒則徹膳降服然則奢儉之節必視世之豐約也武帝之時後宮食不過一肉衣不用錦繡茵蓐不緣飾器物無丹漆用能平定天下遺福子孫此皆陛下之所親覽也當今之務宜君臣上下量入爲出深思句踐滋民之術由恐不及而尚方所造金銀之物漸更增廣侈靡日崇帑藏日竭昔漢武信神仙之道謂當得雲表之露以飡玉屑故立仙掌以承高露陛下至通每所非笑漢武有求於露而由尚見非陛下無求於露而空設之不益於好而糜費功夫誠皆聖慮所宜裁制也劉廙字恭嗣南陽人也爲五官將文學魏諷反廙弟偉爲諷所引當相坐誅太祖令曰叔向不坐弟虎古之制也特原不問廙别傳載廙表論治道曰昔周有亂臣十人有婦人焉孔子稱才難不其然乎明賢者難得也況亂弊之後百姓彫盡士之存者蓋亦無幾其股肱大職及至州郡督司邊方重任雖備其官亦未得其人也此非選者之不用意蓋才匱使之然耳況長吏巳下羣職小任能皆簡練備得其人乎其計莫如督之以法也不爾而數轉易往來不巳送迎之煩不可勝計轉易之間輒有姦巧旣於事不省而爲政者亦以其不得久安之故知惠益不得成於巳而苟且之可免於患皆將不念盡心於䘏民而夢想於聲譽此非所以爲政之本意也今之所以爲黜陟者近頗以州郡之毀譽聽往來之浮言耳非皆得其事實而課其能否也長吏之所以爲佳者奉法也憂公也䘏民也此三事者或州郡有所不便往來者有所不安而長吏執之不巳於治雖得計其聲譽未爲美屈而從人於治雖失計其聲譽必集也長吏皆知黜陟之在於此也亦何能不去本而就末哉以爲長吏皆宜使少久足使自展歲課之能三年總計乃加黜陟課之皆當以事不得依名也事者皆以其戶口率其墾田之多少及盜賊發興民之亡叛者爲得􅀒之計如此行之則無能之吏脩名無益有能之人無名無損法之一行雖無部司之監姦譽妄毀可得而盡也事上太祖甚善之陳羣字長文潁川人也爲司空錄尚書事靑龍中營治宮室百姓失農時羣上疏曰禹承唐虞之盛猶卑宮室而惡衣服況今喪亂之後人民至少吳蜀未滅社稷不安今舍此急而先宮室臣懼百姓遂困將何以應敵此安危之機也唯陛下慮之帝答曰王者宮室亦宜並立滅賊之後伹當罷守耳豈可復興役耶是故君之職蕭何之大略也羣又曰昔漢祖唯與項羽爭天下羽巳滅宮室燒焚是以蕭何起武庫太倉皆是要急然猶非其壯麗今二虜未平誠不宜與古同也夫人之所欲莫不有辭況乃天下莫之敢違前欲壞武庫謂不可不壞也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然􅂞意亦非臣下之所及也漢明帝欲起德陽殿鍾離意諫卽用其言後乃復作之殿成謂羣臣曰鍾離尚書在不得成此殿也夫王者豈憚一臣蓋爲百姓也今臣曾不能少凝聖聽不及意遠矣帝於是有所減省陳矯字季弼廣陵人也遷尚書令明帝嘗卒至尚書門矯跪問帝曰陛下欲何之曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退陛下宜還帝慙囘車而反其亮􅀡如此盧毓字子家􅃰郡人也靑龍中入爲侍中侍中高堂隆數以宮室事切諫帝不悅毓進曰臣聞君明則臣􅀡古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名爲狂􅀡陛下宜容之爲吏部尚書前此諸葛誕等馳名譽有四窻八達之誚帝深疾之時擧中書郞詔曰得其人與否在盧生耳選擧莫取有名名如畫地作餅不可啖毓對曰名不足以致異人而可以得常士常士畏敎慕善然後有名非所當疾也愚臣旣不足以識異人又主者正以循名案常爲職伹當有以驗其後故古者敷奏以言明試以功帝納其言和洽字陽士汝南人也爲丞相掾屬時毛玠崔琰並以忠淸幹事其選用先尚儉節洽言曰天下大器在位與人不可以一節儉也儉素過中自以處身則可以此挌物所失或多今朝廷之儀吏著新衣乘好車者謂之不淸形容不飾衣裘弊壞者謂之廉㓗至令士大夫故汙辱其衣藏其輿服朝府大吏或自挈壺餐以入官寺夫立敎觀俗貴處中庸爲可繼也今崇一槪難堪之行以檢殊塗勉而爲之必有疲瘁古之大敎務在通人情而凡激詭之行則容隱僞矣孫盛曰夫矯枉過正則巧僞滋生以克訓下則民志險隘非聖王所以陶化萬物閑邪存誠之道和洽之言於是允矣魏國旣建爲侍中後有白毛玠謗毀太祖太祖見近臣怒甚洽陳玠素行有本求案實其事罷朝太祖令曰今言事者白玠不伹謗吾也乃復爲崔琰觖望此損君臣恩義妄爲死友怨歎殆不可􅃘也和侍中比求實之所以不聽欲重參之耳洽對曰如言玠罪過深重非天地所覆載臣非敢曲理玠以枉大倫也以玠出羣吏之中特見㧞擢顯在首職歷年荷􅃂剛􅀡忠公爲衆所憚不宜有此然人情難保要宜考覈兩驗其實今聖恩􅂷含垢之仁不􅃘致之于理更使曲􅀡之分不明疑自近始太祖曰所以不考欲兩全玠及言事者耳洽對曰玠信有謗上之言當肆之市朝若玠無此言事者加誣大臣以誤主聽二者不加檢覈臣竊不安太祖曰方有軍事安可受人言便考之耶轉爲太常淸貧守約至賣田宅以自給明帝聞之加賜穀帛杜襲字子緒潁川人也爲侍中將軍許攸擁部曲不附太祖而有謾言太祖大怒先欲討之羣臣多諫可招懷攸共討彊敵太祖橫刀於膝作色不聽襲入欲諫太祖逆謂之曰吾計巳定卿勿復言之襲曰若殿下計是耶臣方助殿下成之若殿下計非耶雖成宜改之殿下逆臣令勿言何待下之不闡乎太祖曰許攸慢吾如何可置乎襲曰殿下謂許攸何如人耶太祖曰凡人也襲曰夫唯賢知賢唯聖知聖凡人安能知非凡人邪方今豺狼當路而狐狸是先人將謂殿下避強攻弱進不爲勇退不爲仁臣聞千石之弩不爲鼷鼠發機萬鈞之鐘不以莛撞起音今區區之許攸何足以勞神武哉太祖曰善遂厚撫攸攸卽歸服高柔字文慧陳留人拜丞相理曹掾時置校事盧洪趙達等使察羣下柔諫曰設官分職各有所司今置校事旣非居上信下之旨又達等數以憎愛擅作威福宜檢治之太祖曰卿知達等恐不如吾也要能刺擧而辨衆事使賢人君子爲之則不能也昔叔孫通用羣盜良有以也達等後姦利發太祖殺之以謝於柔文帝踐祚轉治書執法時民間數有誹謗妖言帝疾之有妖言輙殺而賞吿者柔上疏曰今妖言者必戮吿之者輙賞旣使過誤無反善之路又將開凶狡之羣相誣罔之漸誠非所以息姦省訟緝熙治道也昔周公作誥稱殷之祖宗咸不顧小人之怨在漢太宗亦除妖言誹謗之令臣愚以爲宜除妖謗賞吿之法以隆天父養物之仁帝不卽從而相誣吿者滋甚帝乃下詔敢以誹謗相吿以所吿罪罪之於是遂絕遷爲廷尉明帝卽位時獵法甚峻而典農劉􅀛竊於禁內射兔其功曹張京詣校事言之帝匿京名收􅀛付獄柔表請吿者名大怒曰劉􅀛當死乃敢獵吾禁地送􅀛廷尉廷尉便當考掠何復請吿者主名吾豈妄收􅀛邪柔曰廷尉天下之平也安得以至尊喜怒而毀法乎重復爲奏辭指深切帝意寤乃下京名卽還訊各當其罪辛毘字佐治潁川人也文帝踐祚遷侍中帝欲徙冀州士家十萬戶實河南時連蝗民饑羣司以爲不可而帝意甚盛毘與朝臣俱求見帝知其欲諫作色以見皆莫敢言毘曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毘曰誠以爲非帝曰吾不與卿共議毘曰陛下不以臣不肖置之左右厠之謀議之官安得不與臣議也臣所云非私也乃社稷之慮安得怒臣帝不答起入內毘隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急耶毘曰今徙旣失人心又無以食也帝遂徙其半嘗從帝射雉帝曰射雉樂哉毘曰於陛下甚樂於羣下甚苦帝黙然後遂爲之希出明帝卽位時中書監劉放令孫資見信於主制斷時政大臣莫不交好而毘不與往來毘子敞諫曰今劉孫用事衆皆影附大人宜小降意和光同塵不然必有謗言毘正色曰主上雖未稱聰明不爲闇劣吾之立身自有本末就劉孫不平不過令吾不作三公而巳何危害之有焉有大丈夫欲爲公而毀其高節者耶冗從僕射畢䡄表言尚書僕射王思精勤舊吏忠亮計略不如辛毘毘宜代思帝以訪放資放資對曰陛下用思者誠欲取其效力不貴虛名也毘實亮􅀡然性剛而專聖慮所當深察也遂不用出爲衛尉楊阜字義山天水人也爲將作大匠時初治宮室發美女充後庭數出入弋獵阜上疏曰陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善治總觀季世放盪之惡政所謂善治者務儉約重民力也所謂惡政者從心恣欲觸情而發也惟陛下稽古世代之初所以明赫及季世所以衰弱至于泯滅近覽漢末之變足以動心誡懼矣曩使桓靈不廢高祖之法文景之恭儉太祖雖有神武於何所施其能耶而陛下何由處斯尊哉今吳蜀未定軍旅在外願陛下動則三思慮而後行重愼出入以往鑒來言之若輕成敗甚重詔報曰間得密表先陳往古明王聖主以諷闇政切至之辭􅅃誠篤實將順匡救備悉矣覽思苦言吾甚嘉之遷少府後詔大議政治之不便於民者阜議以爲致治在於任賢興國在於務農若舍賢而任所私此忘治之甚者也廣開宮館高爲臺榭以妨民務此害農之甚者也百工不敦其器而競作竒巧以合上欲此傷本之甚者也孔子曰苛政甚於猛虎今守功文俗之吏爲政不通治體苟好煩苛此亂民之甚者也當今之急宜去四甚帝旣新作許昌宮又營洛陽宮殿觀閣阜上疏曰古之聖帝明王未有極宮室之高麗以雕弊百姓之財力者也桀作琁室􅁚廊紂爲傾宮鹿臺以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子二世而滅夫不度萬人之力以從耳目之欲未有不亡者陛下當以堯舜禹湯文武爲法則夏桀殷紂楚靈秦皇爲深誡巍巍大業猶恐失之不夙夜敬止允恭恤民而自逸唯宮室是侈是飾必有顚覆危亡之禍方今二虜合從謀危宗廟十萬之軍東西奔赴邊境無一日之娛農夫廢業民有饑色陛下不是爲憂而營作宮室無有巳時君作元首臣爲股肱存亡一體得失同之臣雖駑怯敢忘爭臣之義言不切至不足以感寤陛下陛下不察臣言恐皇祖烈考之祚將墜于地使臣身死有補萬一則死之日猶生之年也奏御天子感其忠言手筆詔答高堂隆字升平泰山人也爲散騎常侍靑龍中大治殿舍西取長安大鐘隆上疏曰昔周景王不儀刑文武之明德忽公旦之聖制旣鑄大錢又作大鐘單穆公諫而不聽泠州鳩對而不從遂迷不反周德以衰良史記焉以爲永鑒然今之小人好說秦漢之奢靡以盪聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神明之休也是日帝幸上方隆與卞蘭從帝以隆表授蘭使難隆曰興衰在政樂何爲也化之不明豈鐘之罪隆對曰夫禮樂者爲治之大本也故簫韶九成鳳皇來儀雷鼓六變天神以降政是以平刑是以錯和之至也新聲發響商辛以殞大鐘旣鑄周景以弊存亡之機恆由此作安在廢興之不階也君擧必書古之道也作而不法何以示後帝稱善遷侍中猶領太史令崇華殿灾詔問隆此何咎於禮寧有祈禳之義乎對曰夫灾變之發皆所以明敎戒也惟率禮脩德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火爲灾此人君苟飾宮室不知百姓空竭故天應之以旱火從高殿起也上天降鑒故譴吿陛下陛下宜增崇人道以答天意陵霄闕始搆有鵲巢其上帝以問隆對曰詩云惟鵲有巢惟鳩居之今興宮室而鵲巢之此宮室未成身不得居之象也夫天道無親唯與善人不可不深慮夏商之季皆繼體也不欽承上天之明命惟讒諂是從廢德適欲故其亡也忽焉臣備腹心苟可以繁祉聖躬安存社稷雖􅁅身破族猶生之年也豈憚忤逆之灾而令陛下不聞至言乎於是帝改容動色帝愈增崇宮殿雕飾觀閣鑿太行之石英采穀城之文石起景陽山於芳林之園建昭陽殿於大極之北鑄作黃龍鳳鳥奇偉之獸飾陵雲臺陵霄闕百役繁興作者萬數公卿以下至於學生莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂没民物隆上疏切諫曰昔在伊唐洪水滔天灾眚之甚莫過於彼力役之興莫久於此堯舜君臣南面而巳禹敷九州庶士庸􅈴各有等差君子小人物有服章今無若時之急而使公卿大夫並與厮徒共供事役聞之四夷非嘉聲也􅂷之竹帛非令名也是以古先哲王畏上天之明命矜矜業業惟恐有違灾異旣發懼而脩政未有不延期流祚者也爰及末葉闇君荒主不崇先王之令䡄不納正士之􅀡言以遂其情志恬忽變戒未有不至於顚覆者也秦始皇不築道德之基而築阿房之宮不憂蕭墻之變而脩長城之役當其君臣爲此計也亦欲立萬世之業使子孫長有天下豈意一朝匹夫大呼而天下傾覆哉故臣以爲使先代之君知其所行必將至於敗則弗爲之矣是以亡國之主自謂不亡然後至於亡賢聖之君自謂將亡然後至於不亡昔漢文帝稱爲賢主躬行約儉惠下養民而賈誼方之以爲天下倒縣可爲痛哭者一可爲流涕者二可爲長歎息者三況今天下雕弊民無儋石之儲國無終年之畜外有彊敵六軍暴邊內興土功州郡騷動若有冦警則臣懼板築之士不能投命虜庭矣又將吏奉祿稍見折減方之於昔五分居一夫祿賜穀帛人主之所以惠養吏民而爲之司命者也若今有廢是奪其命旣得之而又失之此生怨之府也今陛下所與共坐廊廟治天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見豐省而不敢以吿從命奔走唯恐不勝是則具臣非鯁輔也昔李斯敎秦二世曰爲人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷議其不正諫而爲世誡書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉隆疾篤口占上疏曰臣常疾世主莫不思紹堯舜湯武之治而蹈踵桀紂幽厲之跡莫不蚩笑季世惑亂亡國之主而不登踐虞夏殷周之䡄悲夫尋觀三代之有天下聖賢相承歷載數百尺土莫非其有一民莫非其臣癸辛之徒恃其旅力知足以拒諫才足以飾非諂諛是尚臺觀是崇淫樂是好倡優是悅上天不蠲眷然迴顧宗國爲墟天子之尊湯武有之豈伊異人皆明王之胄也且當六國之時天下殷熾秦旣兼之不脩聖道乃搆阿房之宮築長城之守矜夸中國威服百蠻天下震竦道路以目自謂本枝百世永􅂷洪暉豈悟二世而滅社稷崩圯哉臣觀黃初之際異類之鳥育長燕巢口爪胷赤此魏室之大異也宜防鷹掦之臣於蕭墻之內可選諸王使君國典兵往往棊跱鎭撫皇畿翼亮帝室昔周之東遷晉鄭是依漢呂之亂實賴朱虛蓋前代之明鑒也夫皇天無親唯德是輔民詠德政則延期過歷下有怨歎則掇錄授能由此觀之則天下之天下也非獨陛下之天下也臣百疾所鍾氣力稍微輙自輿出還舍若遂沈淪魂而有知結草以報田豫字國讓漁陽人也爲護烏丸校尉魏略曰鮮卑素利等數來客見多以牛馬遺豫豫轉送官胡乃密懷金三十斤謂豫曰我見公貧故前後遺公牛馬公輙送官今密以此上公可以爲家資豫張袖受之答其厚意胡去之後皆悉付外於是詔褒之曰昔魏絳開懷以納戎今卿擧袖以受狄金朕甚嘉焉乃賜靑縑五百匹也徐邈字景山燕國人也爲涼州刺史西域流通荒戎入貢皆邈勛也賞賜皆散與將士無入家者妻子衣食不充天子聞而嘉之隨時供給其家彈邪繩枉州界肅淸嘉平六年朝廷追思淸節之士詔曰夫顯賢表德聖王所重擧善而敎仲尼所美故司空徐邈征東將軍胡質衛尉田豫皆服職前朝歷事四世出統戎馬入讚庶政忠淸在公憂國忘私不營產業身没之後家無餘財朕甚嘉之其賜邈等家穀二千斛錢三十萬布吿天下王昶字文舒太原人也遷兗州刺史爲兄子及子作名字皆依謙實以見其意故兄子黙字處靜沈字處道其子渾字玄冲深字道仲遂書戒之曰夫人爲子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首而立身之本也孝敬則宗族安之仁義則鄕黨重之此行成於內名著於外者矣若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛僞之累朋黨則有彼此之患此二者之戒照然著明而循覆車滋衆逐末彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之累悔吝之咎語曰不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保世持家永全福祿者也欲使汝曹立身行巳遵儒者之敎履道家之言故以玄黙冲虛爲名欲使汝曹顧名思義不敢違越也古者盤杅有銘几杖有誡俯仰察焉用無過行況在巳名可不戒之哉夫物速成則疾亡晩就則善終朝華之草夕而零落松栢之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范匄對秦客至武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三郤爲戮於晉王叔􅀒罪於周不唯矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以爲伸讓以爲得弱以爲強鮮不遂矣夫毀譽愛惡之原而禍福之機也是以聖人愼之孔子曰吾之於人誰毀誰譽如有所譽必有所試以聖人之德猶尚如此況庸庸之徒而輕毀譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得聞口不可得道也斯戒至矣人或毀巳當退而求之於身若巳有可毀之行則彼言當矣若巳無可毀之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毀巳而忿者惡醜聲之加人也人報者滋甚不如黙而自脩也諺曰救寒莫如重裘止謗莫如自脩斯言信矣若與是非之士凶險之人近猶不可況與對校乎其害深矣可不愼與吾與時人從事雖出處不同然各有所取潁川郭伯益好尚通達敏而有知其爲人弘曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之眤之不願兒子爲之北海徐偉長不治名高不求苟得澹然自守唯道是務其有所是非則託古人以見其意當時無所襃貶吾敬之重之願兒子師之樂安任昭先淳粹履道內敏外恕處不避洿怯而義勇吾友之善之願兒子遵之若引而申之觸類而長之汝其庶幾擧一隅耳及其用財先九族其施舍務周急其出入存故老其議論貴無貶其進仕尚忠節其取人務道實其處世戒驕淫其貧賤愼無戚其進退念合宜其行事加九思如此而巳吾復何憂哉鍾會字士季潁川人也司馬文王欲圖蜀以會爲鎭西將軍從駱谷入姜維等悉降會詔以會爲司徒會內有異志因鄧艾承制專事密白艾有反狀世語曰會善効人書於劍閣要艾章表白事皆易其言令辭指悖傲多自矜伐也於是檻車徵艾艾旣禽而會獨統大衆威震西土自謂功名蓋世不可復爲人下遂謀反諸軍兵殺會漢晉春秋曰文王聞鍾會功曹向雄之收葬會也召而責之曰往王經之死卿哭於東市而我不問也今鍾會躬爲叛逆而又輙收葬若復相容其如王法何雄曰昔先王掩骸埋胔仁流朽骨當時豈先卜其功罪而後收葬哉今王誅旣加於法巳備雄感義收葬敎亦無闕法立於上敎弘於下以此訓物雄曰可矣何必使雄背死違生以立於時殿下讎對枯骨損之中野百歲之後爲臧􅀗所笑豈仁賢所掩哉王悅之與宴談而遣之習鑿齒曰向伯茂可謂勇於蹈義也哭王經而哀感市人葬鍾會而義動明主彼皆忠烈奮勁知死而往非存生也尋其奉死之心可以見事生之情覽其忠貞之節足以愧背義之士矣王加禮而遣可謂明達矣羣書治要卷第二十六
